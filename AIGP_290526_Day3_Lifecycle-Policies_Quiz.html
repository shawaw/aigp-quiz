<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIGP Quiz — Day 3 · Lifecycle Policies (I.C)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #1a5c3a;
    --accent-light: #e8f5ee;
    --accent-mid: #2d7a52;
    --text: #1a1a1a;
    --text-muted: #5a5a5a;
    --bg: #ffffff;
    --bg-off: #f8f9f8;
    --border: #d8e4dd;
    --red: #c0392b;
    --red-light: #fdf0ee;
    --green: #1a7a3a;
    --green-light: #eaf7ef;
    --blue: #1a4a8a;
    --blue-light: #e8f0fa;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); font-size: 15px; line-height: 1.7; color: var(--text); background: var(--bg-off); min-height: 100vh; }
  .app { max-width: 680px; margin: 0 auto; padding: 24px 16px 64px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .topbar-title { font-size: 13px; font-weight: 600; color: var(--accent); }
  .session-id { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; }
  .progress-wrap { background: var(--border); border-radius: 4px; height: 5px; margin-bottom: 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s ease; }
  .q-card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .q-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .q-num { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
  .comp-chip { font-family: var(--font-mono); font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; background: var(--accent-light); color: var(--accent); }
  .retrieval-chip { font-family: var(--font-mono); font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #fff3cd; color: #7a5a00; font-weight: 500; }
  .q-stem { font-size: 15px; font-weight: 500; line-height: 1.6; margin-bottom: 18px; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option { display: flex; align-items: flex-start; gap: 12px; border: 2px solid var(--border); border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: border-color 0.15s, background 0.15s; user-select: none; }
  .option:hover { border-color: var(--accent-mid); background: var(--accent-light); }
  .option.selected { border-color: var(--blue); background: var(--blue-light); }
  .option.correct { border-color: var(--green); background: var(--green-light); }
  .option.incorrect { border-color: var(--red); background: var(--red-light); }
  .option.locked { cursor: default; }
  .opt-letter { font-family: var(--font-mono); font-size: 13px; font-weight: 500; min-width: 20px; color: var(--text-muted); padding-top: 1px; }
  .option.selected .opt-letter { color: var(--blue); }
  .option.correct .opt-letter { color: var(--green); }
  .option.incorrect .opt-letter { color: var(--red); }
  .opt-text { font-size: 14px; line-height: 1.6; }
  .retrieval-banner { background: #fff8e6; border: 1px solid #f0d080; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #6a4a00; display: flex; gap: 10px; align-items: flex-start; }
  .retrieval-banner .icon { font-size: 16px; }
  .nav-row { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
  .btn { padding: 10px 22px; border: none; border-radius: 8px; font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:not(:disabled):hover { background: var(--accent-mid); }
  .btn-submit { background: #7a1a1a; color: #fff; }
  .btn-submit:not(:disabled):hover { background: #9a2020; }
  #results-screen { display: none; }
  .results-header { background: var(--accent); color: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; text-align: center; }
  .results-score { font-size: 52px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
  .results-title { font-size: 16px; opacity: 0.85; margin-bottom: 16px; }
  .results-counts { display: flex; justify-content: center; gap: 20px; font-family: var(--font-mono); font-size: 13px; }
  .count-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .count-num { font-size: 22px; font-weight: 700; }
  .review-section { margin-bottom: 12px; }
  .review-header { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; user-select: none; }
  .review-header:hover { background: var(--bg-off); }
  .review-outcome { width: 20px; height: 20px; border-radius: 50%; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
  .review-outcome.correct { background: var(--green-light); color: var(--green); }
  .review-outcome.incorrect { background: var(--red-light); color: var(--red); }
  .review-q-preview { font-size: 13px; flex: 1; color: var(--text-muted); }
  .review-chevron { font-size: 12px; color: var(--text-muted); transition: transform 0.2s; }
  .review-chevron.open { transform: rotate(180deg); }
  .review-body { background: var(--bg); border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; padding: 14px 16px; font-size: 13px; display: none; }
  .review-answer-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; font-size: 13px; }
  .ans-label { font-weight: 600; min-width: 110px; flex-shrink: 0; }
  .ans-correct { color: var(--green); }
  .ans-incorrect { color: var(--red); }
  .explanation { background: var(--bg-off); border-left: 3px solid var(--accent); padding: 10px 12px; border-radius: 0 6px 6px 0; margin-top: 10px; font-size: 13px; line-height: 1.65; }
  .bok-chip { display: inline-block; background: var(--accent-light); color: var(--accent); font-family: var(--font-mono); font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-top: 6px; }
  .tricky-flag { display: inline-block; background: #fff3cd; color: #7a5a00; font-family: var(--font-mono); font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }
  .save-confirm { margin-top: 20px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
  .save-confirm .save-status { color: var(--accent); font-weight: 500; }
  .results-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .btn-secondary { background: var(--bg); color: var(--accent); border: 2px solid var(--accent); padding: 9px 18px; border-radius: 8px; font-family: var(--font-body); font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-secondary:hover { background: var(--accent-light); }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-title">AIGP Quiz — Day 3 · Lifecycle Policies</div>
    <div class="session-id" id="session-id-badge">S···</div>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="progress-bar" style="width:0%"></div></div>
  <div id="quiz-screen">
    <div class="retrieval-banner" id="retrieval-banner">
      <span class="icon">🔁</span>
      <span><strong>Retrieval warm-up</strong> — these 5 questions strengthen memory of Days 1 and 2 before today's new content on I.C Lifecycle Policies.</span>
    </div>
    <div class="q-card" id="q-card">
      <div class="q-meta">
        <span class="q-num" id="q-num">Q1 of 15</span>
        <span class="comp-chip" id="comp-chip">I.A</span>
        <span class="retrieval-chip" id="retrieval-chip" style="display:none">Retrieval</span>
      </div>
      <div class="q-stem" id="q-stem"></div>
      <div class="options" id="options"></div>
    </div>
    <div class="nav-row">
      <button class="btn btn-primary" id="next-btn" disabled onclick="nextQuestion()">Next →</button>
      <button class="btn btn-submit" id="submit-btn" style="display:none" disabled onclick="submitQuiz()">Submit &amp; review results</button>
    </div>
  </div>
  <div id="results-screen">
    <div class="results-header">
      <div class="results-score" id="results-score">—</div>
      <div class="results-title">Day 3 · Lifecycle Policies (I.C)</div>
      <div class="results-counts">
        <div class="count-item"><span class="count-num" id="res-correct">—</span><span>Correct</span></div>
        <div class="count-item"><span class="count-num" id="res-incorrect">—</span><span>Incorrect</span></div>
        <div class="count-item"><span class="count-num" id="res-skipped">0</span><span>Skipped</span></div>
        <div class="count-item"><span class="count-num" id="res-total">15</span><span>Total</span></div>
      </div>
    </div>
    <div id="review-container"></div>
    <div class="save-confirm"><span class="save-status" id="save-status">Saving results…</span><br><span id="save-detail"></span></div>
    <div class="results-actions"><button class="btn-secondary" onclick="exportHistory()">Export history JSON</button></div>
  </div>
</div>
<script>
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbyCG5oTGoPsjE9ytN3NJbsAv45GO0_uxb5gjXL7K8trVSiOfG05tQ0LV3wnjtuj7Bir/exec";
const QUESTIONS = [
  {id:"DI-IA-001",day:1,week:1,domain:"Domain I",comp:"I.A",isRetrieval:true,stem:"A fintech company deploys a credit scoring AI. The model produces accurate results on average but the governance team cannot explain why individual applicants are approved or denied. Which unique AI characteristic identified in the BOK MOST directly describes this problem?",options:{A:"Data dependency — the model requires large volumes of data to function",B:"Opacity — the model's decision process is not transparent or interpretable",C:"Speed and scale — the model processes thousands of applications simultaneously",D:"Probabilistic outputs — the model assigns likelihood scores rather than definitive decisions"},correct:"B",explanation:"The BOK identifies opacity (also called lack of explainability or transparency) as a unique characteristic of AI that requires governance. When a model cannot explain individual decisions, it cannot be audited for fairness or challenged by affected individuals."},
  {id:"DI-IA-002",day:1,week:1,domain:"Domain I",comp:"I.A",isRetrieval:true,stem:"An AI system used for employee performance reviews consistently rates female employees lower than male employees with equivalent performance records. Which principle of responsible AI, as defined in the BOK, is MOST directly violated?",options:{A:"Safety and reliability — the system does not perform consistently across all conditions",B:"Privacy and security — employee performance data is being misused",C:"Fairness — the system produces discriminatory outcomes across a protected group",D:"Human-centricity — employees were not consulted during system design"},correct:"C",explanation:"The BOK identifies fairness as a core responsible AI principle specifically concerned with equitable treatment across groups. Systematically lower ratings for female employees is a fairness failure."},
  {id:"DI-IB-001",day:2,week:1,domain:"Domain I",comp:"I.B",isRetrieval:true,stem:"A healthcare organisation wants governance decisions to reflect clinical, legal, IT, and patient-safety perspectives equally. According to BOK I.B, which performance indicator MOST directly addresses this objective?",options:{A:"Define roles and responsibilities for AI governance stakeholders",B:"Create and deliver a training and awareness program to all stakeholders",C:"Establish cross-functional collaboration in the AI governance program",D:"Differentiate approaches to AI governance based upon company size and maturity"},correct:"C",explanation:"PI I.B.2 specifically addresses establishing cross-functional collaboration to ensure efficacy and diversity of expertise and perspective in the governance program."},
  {id:"DI-IB-002",day:2,week:1,domain:"Domain I",comp:"I.B",isRetrieval:true,stem:"A software company builds a large language model and licenses it to a bank, which integrates it into a customer service chatbot. Under the BOK's governance framework, which classification BEST describes these three parties?",options:{A:"The software company is the developer/provider; the bank is the deployer; customers are users",B:"The software company is the provider; the bank and its customers are both users",C:"The bank is the provider because it controls deployment; the software company is a vendor",D:"All three are considered AI users because all interact with the AI output"},correct:"A",explanation:"The BOK distinguishes developers/providers (those who build and supply AI), deployers (organisations that integrate and deploy AI), and users (individuals who interact with the output)."},
  {id:"DI-IB-003",day:2,week:1,domain:"Domain I",comp:"I.B",isRetrieval:true,stem:"A multinational corporation operating in 12 countries is deciding whether to implement one standardised AI governance framework or allow local adaptation. According to BOK I.B, which PI MOST directly guides this decision?",options:{A:"Define roles and responsibilities for AI governance stakeholders",B:"Differentiate approaches to AI governance based on company size, maturity, industry, products and services, objectives and risk tolerance",C:"Establish cross-functional collaboration in the AI governance program",D:"Create and deliver a training and awareness program on AI governance"},correct:"B",explanation:"BOK I.B explicitly states that governance approaches should be differentiated based on company size, maturity, industry, products, objectives, and risk tolerance."},
  {id:"DI-IC-001",day:3,week:1,domain:"Domain I",comp:"I.C",isRetrieval:false,stem:"A bank's AI governance framework includes policies for model development, training, testing, and deployment. An internal audit finds there are no policies covering what happens when a deployed model produces unexpected outputs or causes harm. According to BOK I.C, which lifecycle stage is MOST directly absent?",options:{A:"Use case assessment",B:"Data acquisition and use",C:"Documentation and reporting",D:"Incident management"},correct:"D",explanation:"BOK I.C PI 1 requires policies covering all lifecycle stages, explicitly including incident management. The scenario describes a response gap — no policy for when a model causes harm."},
  {id:"DI-IC-002",day:3,week:1,domain:"Domain I",comp:"I.C",isRetrieval:false,stem:"An insurance company's data governance policy was written in 2020 and addresses consent for data collection, retention schedules, and data subject access requests. In 2025 the company deployed a claims AI that trains on policyholder data. What action does BOK I.C require?",options:{A:"Create a new AI data policy to run alongside the existing data governance policy",B:"Evaluate the existing data governance policy and update it to address AI-specific requirements",C:"Apply the existing policy as-is, since consent to data collection implicitly covers model training",D:"Defer to the data privacy team, as data governance falls outside the AI governance professional's scope"},correct:"B",explanation:"BOK I.C PI 2 requires AI governance professionals to evaluate and update existing policies for AI — not merely add supplementary ones alongside."},
  {id:"DI-IC-003",day:3,week:1,domain:"Domain I",comp:"I.C",isRetrieval:false,stem:"A retail company allows employees to use a popular third-party AI writing tool. The legal team raises a concern that employees may be submitting commercially sensitive information to the external AI platform. Under BOK I.C, which third-party risk management mechanism MOST directly addresses this?",options:{A:"Supply chain risk policies",B:"Procurement due diligence assessments",C:"Acceptable use policies",D:"Human resources AI policies"},correct:"C",explanation:"BOK I.C PI 3 identifies acceptable use as one of four third-party risk vectors. An acceptable use policy defines which third-party AI tools employees may use and what data may be submitted."},
  {id:"DI-IC-004",day:3,week:1,domain:"Domain I",comp:"I.C",isRetrieval:false,stem:"A consumer goods company's ethics committee reviews a new AI personalisation system only after the data science team has completed model development and testing. According to BOK I.C, what governance principle has been compromised?",options:{A:"Documentation and reporting — the ethics review should have been recorded from the start",B:"Third-party risk management — the data science vendor should have been assessed earlier",C:"Ethics by design — ethical review should occur at the use case assessment stage, not after development",D:"Cross-functional collaboration — the ethics committee was excluded from the development team"},correct:"C",explanation:"BOK I.C PI 1 explicitly names ethics by design as a governance requirement at the use case assessment stage. Design choices that embed risk should be caught before the system is built, not after."},
  {id:"DI-IC-005",day:3,week:1,domain:"Domain I",comp:"I.C",isRetrieval:false,stem:"A pharmaceutical company uses a third-party AI diagnostic tool. The vendor silently updates the underlying model every quarter. The company has no contractual right to be notified. Six months after an update, an adverse patient outcome is linked to a change in the model's decision logic. Under BOK I.C, which policy failure MOST directly caused this gap?",options:{A:"Failure to implement policies for deployment and monitoring under PI 1",B:"Failure to update the data governance policy for AI under PI 2",C:"Failure to establish contracts and assessments for third-party risk management under PI 3",D:"Failure to conduct a use case assessment before deploying the diagnostic tool"},correct:"C",explanation:"BOK I.C PI 3 requires contracts and assessments to manage third-party risk. A critical component is contractual obligation for vendors to notify of material model changes."},
  {id:"DI-IC-006",day:3,week:1,domain:"Domain I",comp:"I.C",isRetrieval:false,stem:"An AI governance audit finds the deployment monitoring policy tracks model accuracy but has no escalation path to the governance function when anomalies are detected, and no connection to incident management. This finding MOST directly reflects:",options:{A:"A failure to establish cross-functional collaboration in the governance program under I.B",B:"A failure to implement interconnected lifecycle policies covering monitoring through incident management under PI 1",C:"A failure to evaluate and update the monitoring policy for AI under PI 2",D:"A failure to manage supply chain risk from the AI infrastructure vendor under PI 3"},correct:"B",explanation:"BOK I.C PI 1 requires policies that provide oversight across ALL lifecycle stages. The scenario identifies a gap between deployment/monitoring and incident management — PI 1 requires these stages to form an interconnected framework."},
  {id:"DI-IC-007",day:3,week:1,domain:"Domain I",comp:"I.C",isRetrieval:false,stem:"A global technology company has separate cybersecurity, data privacy, and intellectual property policies owned by different teams. As it deploys AI, the AI governance professional must determine the correct approach under BOK I.C PI 2. Which action is BOK-correct?",options:{A:"Replace all three policies with a single unified AI governance policy owned by the AI governance team",B:"Evaluate each policy individually and update it to address AI-specific risks and requirements",C:"Create a separate overarching AI policy that takes precedence over the three existing policies",D:"Maintain the existing policies unchanged, as AI risks are addressed in dedicated AI use case assessments"},correct:"B",explanation:"BOK I.C PI 2 states: evaluate and update existing policies for AI. The operative words are evaluate and update — not replace, not supplement, not leave unchanged."},
  {id:"DI-IC-008",day:3,week:1,domain:"Domain I",comp:"I.C",isRetrieval:false,stem:"A CFO argues that documentation is already handled informally through project management practices and formal lifecycle documentation requirements are unnecessary. What is the BEST BOK-grounded response?",options:{A:"Documentation as a lifecycle stage is optional for low-risk AI systems under EU AI Act proportionality principles",B:"Systematic documentation enables oversight, accountability, audit trails, and regulatory evidence — informal practices are insufficient for governance purposes",C:"The ISO 42001 standard mandates formal documentation, so the requirement is an external compliance obligation",D:"Documentation is primarily needed for high-risk AI and can be scaled back for operational systems"},correct:"B",explanation:"BOK I.C PI 1 explicitly includes documentation and reporting as a lifecycle stage requiring policy coverage. Accountability without an audit trail is meaningless — decisions cannot be reviewed or learned from if not recorded systematically."},
  {id:"DI-IC-009",day:3,week:1,domain:"Domain I",comp:"I.C",isRetrieval:false,stem:"An AI ethics committee approved an AI hiring tool 12 months ago. A recent external audit reveals the tool consistently screens out candidates from certain geographic regions — a risk not identified during approval. Which lifecycle policy failure MOST directly enabled this outcome?",options:{A:"Failure to conduct an adequate use case assessment at the ethics by design stage, where geographic bias risk should have been evaluated",B:"Failure to update the company's data privacy policy for AI under I.C PI 2",C:"Failure to manage third-party vendor supply chain risk under I.C PI 3",D:"Failure to implement an acceptable use policy for the hiring team using the AI tool"},correct:"A",explanation:"BOK I.C PI 1 identifies ethics by design as a governance requirement at the use case assessment stage. Geographic screening bias should have been identified and mitigated before the tool was deployed."},
  {id:"DI-IC-010",day:3,week:1,domain:"Domain I",comp:"I.C",isRetrieval:false,stem:"An organisation's legal team proposes that the AI governance professional's responsibility under I.C is fully discharged once a comprehensive AI policy document is published. The governance professional disagrees. Which BOK principle BEST supports the governance professional's position?",options:{A:"A published policy satisfies I.C if it covers all eight lifecycle stages by name",B:"I.C requires policies to be created, implemented, updated, and extended to manage third-party risk — publication alone does not constitute implementation or ongoing management",C:"Under I.B, the governance professional's role is limited to communicating policies, not enforcing them",D:"Governance obligations under I.C are fulfilled when a cross-functional team has reviewed and approved the policy"},correct:"B",explanation:"BOK I.C PI 1, PI 2, and PI 3 each use active management verbs: create AND implement (PI 1), evaluate AND update (PI 2), create AND update AND implement (PI 3). Governance is an ongoing process, not a publishing event."}
];
let currentIndex = 0;
let answers = {};
const sessionId = "S" + Date.now();
document.getElementById('session-id-badge').textContent = sessionId.slice(0, 12);
renderQuestion();
function renderQuestion() {
  const q = QUESTIONS[currentIndex];
  const total = QUESTIONS.length;
  document.getElementById('progress-bar').style.width = ((currentIndex / total) * 100) + '%';
  document.getElementById('q-num').textContent = `Q${currentIndex + 1} of ${total}`;
  document.getElementById('comp-chip').textContent = q.comp;
  const retrievalChip = document.getElementById('retrieval-chip');
  const retrievalBanner = document.getElementById('retrieval-banner');
  if (q.isRetrieval) { retrievalChip.style.display = 'inline-block'; retrievalBanner.style.display = 'flex'; }
  else { retrievalChip.style.display = 'none'; retrievalBanner.style.display = 'none'; }
  document.getElementById('q-stem').textContent = q.stem;
  const optionsEl = document.getElementById('options');
  optionsEl.innerHTML = '';
  ['A','B','C','D'].forEach(letter => {
    const div = document.createElement('div');
    div.className = 'option';
    div.dataset.letter = letter;
    div.innerHTML = `<span class="opt-letter">${letter}</span><span class="opt-text">${q.options[letter]}</span>`;
    div.addEventListener('click', () => selectOption(letter));
    optionsEl.appendChild(div);
  });
  if (answers[currentIndex] !== undefined) lockOptions(answers[currentIndex], q.correct);
  const nextBtn = document.getElementById('next-btn');
  const submitBtn = document.getElementById('submit-btn');
  if (currentIndex === total - 1) { nextBtn.style.display = 'none'; submitBtn.style.display = 'inline-block'; submitBtn.disabled = answers[currentIndex] === undefined; }
  else { nextBtn.style.display = 'inline-block'; nextBtn.disabled = answers[currentIndex] === undefined; submitBtn.style.display = 'none'; }
}
function selectOption(letter) {
  if (answers[currentIndex] !== undefined) return;
  answers[currentIndex] = letter;
  lockOptions(letter, QUESTIONS[currentIndex].correct);
  if (currentIndex === QUESTIONS.length - 1) document.getElementById('submit-btn').disabled = false;
  else document.getElementById('next-btn').disabled = false;
}
function lockOptions(selected, correct) {
  const options = document.querySelectorAll('#options .option');
  options.forEach(opt => {
    opt.classList.add('locked');
    const l = opt.dataset.letter;
    if (l === correct) opt.classList.add('correct');
    else if (l === selected && selected !== correct) opt.classList.add('incorrect');
    opt.removeEventListener('click', selectOption);
  });
}
function nextQuestion() {
  if (currentIndex < QUESTIONS.length - 1) { currentIndex++; renderQuestion(); }
}
function submitQuiz() {
  let correct = 0, incorrect = 0;
  QUESTIONS.forEach((q, i) => { if (answers[i] === q.correct) correct++; else incorrect++; });
  const score = Math.round((correct / QUESTIONS.length) * 100);
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('results-score').textContent = score + '%';
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-incorrect').textContent = incorrect;
  document.getElementById('res-total').textContent = QUESTIONS.length;
  const container = document.getElementById('review-container');
  container.innerHTML = '';
  let history = [];
  try { history = JSON.parse(localStorage.getItem('aigp_quiz_history') || '[]'); } catch(e) {}
  QUESTIONS.forEach((q, i) => {
    const userAns = answers[i];
    const isCorrect = userAns === q.correct;
    let wrongCount = 0;
    history.forEach(session => { if (session.questions) { const prev = session.questions.find(pq => pq.id === q.id); if (prev && !prev.correct) wrongCount++; } });
    if (!isCorrect) wrongCount++;
    const section = document.createElement('div');
    section.className = 'review-section';
    const preview = q.stem.length > 80 ? q.stem.slice(0, 80) + '…' : q.stem;
    const trickyHtml = wrongCount >= 2 ? `<span class="tricky-flag">⚑ Tricky — missed ${wrongCount}×</span>` : '';
    section.innerHTML = `<div class="review-header" onclick="toggleReview(this)"><div class="review-outcome ${isCorrect ? 'correct' : 'incorrect'}">${isCorrect ? '✓' : '✗'}</div><div class="review-q-preview">Q${i+1} · ${q.comp} · ${preview}</div><span class="review-chevron">▾</span></div><div class="review-body"><div class="review-answer-row"><span class="ans-label">Your answer:</span><span class="${isCorrect ? 'ans-correct' : 'ans-incorrect'}">${userAns} — ${q.options[userAns]}</span></div>${!isCorrect ? `<div class="review-answer-row"><span class="ans-label">Correct answer:</span><span class="ans-correct">${q.correct} — ${q.options[q.correct]}</span></div>` : ''}<div class="explanation">${q.explanation}${trickyHtml}</div><div class="bok-chip">BOK ${q.comp} — Lifecycle Policies</div></div>`;
    container.appendChild(section);
  });
  saveSession(correct, incorrect, score);
}
function toggleReview(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.review-chevron');
  const isOpen = body.style.display === 'block';
  body.style.display = isOpen ? 'none' : 'block';
  chevron.classList.toggle('open', !isOpen);
}
function saveSession(correct, incorrect, score) {
  const sessionData = { sessionId, title: "AIGP Quiz — Day 3 · Competency I.C", week: 1, day: 3, filename: "AIGP_290526_Day3_Lifecycle-Policies_Quiz.html", ts: new Date().toISOString(), score, correct, incorrect, total: QUESTIONS.length, questions: QUESTIONS.map((q, i) => ({ id: q.id, day: q.day, week: q.week, domain: q.domain, comp: q.comp, isRetrieval: q.isRetrieval, correct: answers[i] === q.correct, skipped: answers[i] === undefined, userAns: answers[i] || null, correctAns: q.correct, qText: q.stem.slice(0, 80) })) };
  fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'saveQuizResult', data: sessionData }) }).catch(() => {});
  let history = [];
  try { history = JSON.parse(localStorage.getItem('aigp_quiz_history') || '[]'); } catch(e) {}
  history.push(sessionData);
  localStorage.setItem('aigp_quiz_history', JSON.stringify(history));
  const attemptNum = history.length;
  document.getElementById('save-status').textContent = '✓ Results saved';
  document.getElementById('save-detail').textContent = `Session ${sessionId.slice(0,12)} · Attempt #${attemptNum} · ${new Date().toLocaleString('en-SG')}`;
}
function exportHistory() {
  let history = [];
  try { history = JSON.parse(localStorage.getItem('aigp_quiz_history') || '[]'); } catch(e) {}
  const blob = new Blob([JSON.stringify(history, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'aigp_quiz_history.json'; a.click();
  URL.revokeObjectURL(url);
}
</script>
