const QUIZ_DATA = {

  webhookUrl: "https://script.google.com/macros/s/AKfycbyCG5oTGoPsjE9ytN3NJbsAv45GO0_uxb5gjXL7K8trVSiOfG05tQ0LV3wnjtuj7Bir/exec",
  questions: [
    { id: "DIV-IVC-001", comp: "IV.C", pi: "IV.C.1", isRetrieval: false, bokRef: "IV.C.1 — Apply the policies, procedures, best practices and ethical considerations to the deployment of an AI system (e.g., data governance, risk management, issue management, and user training)", stem: "A retail bank deploys an AI loan decisioning system. A governance audit reveals front-line staff are using the system daily without any structured training on its limitations, acceptable use scope or escalation procedures. Which action should the AI governance lead prioritize under IV.C.1?", options: { A: "Develop and deliver structured user training on the system's limitations, acceptable use boundaries and escalation procedures for front-line staff.", B: "Immediately suspend loan processing operations until all front-line staff complete a mandatory certification on the AI system's capabilities.", C: "Update the vendor contract to add a training obligation clause requiring the provider to train all bank staff before use.", D: "Commission an independent third-party audit of all loan decisions since deployment to identify errors attributable to untrained users." }, correct: "A", explanation: "User training is explicitly listed in IV.C.1 — Apply the policies, procedures, best practices and ethical considerations to the deployment of an AI system (e.g., data governance, risk management, issue management, and user training). B is disproportionate — IV.C.7 Deactivation and Localization Controls requires regulatory or performance failure triggers before suspension. C addresses IV.B.1 vendor and licensing risk, not IV.C.1 deployment governance. D describes a IV.C.3 Periodic Assessment activity, not the training gap itself." },
    { id: "DIV-IVC-002", comp: "IV.C", pi: "IV.C.2", isRetrieval: false, bokRef: "IV.C.2 — Conduct continuous monitoring of the AI model and system, and establish a regular schedule for maintenance, updates and retraining", stem: "A healthcare insurer's AI claims triage system was deployed 18 months ago using pre-pandemic training data. No model review has been scheduled since deployment. What is the primary IV.C governance gap?", options: { A: "The insurer has not published a transparency notice for claimants affected by automated triage decisions under its jurisdiction.", B: "The vendor has not provided updated model documentation or retraining logs as required by the license agreement.", C: "No continuous monitoring schedule or retraining plan has been established, creating unmanaged risk of data and concept drift.", D: "The system has not undergone a post-deployment privacy impact assessment as required by applicable data protection law." }, correct: "C", explanation: "IV.C.2 — Conduct continuous monitoring of the AI model and system, and establish a regular schedule for maintenance, updates and retraining. Eighteen months without a review schedule is a clear IV.C.2 failure. A concerns IV.C.6 External Communication Plans. B is a IV.B.1 vendor and licensing agreement issue. D relates to II.A.3 obligations on data controllers, not IV.C.2." },
    { id: "DIV-IVC-003", comp: "IV.C", pi: "IV.C.3", isRetrieval: false, bokRef: "IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety (e.g., audits, red teaming, threat modeling and security testing)", stem: "An e-commerce platform's generative AI recommendation engine is alleged to be vulnerable to adversarial prompt manipulation. The governance team schedules a review. Which activity most directly fulfills the IV.C.3 obligation?", options: { A: "Retraining the model on a filtered dataset from which known adversarial examples have been identified and removed.", B: "Conducting threat modeling and security testing to assess the system's vulnerability to adversarial input manipulation.", C: "Issuing a public statement acknowledging the researcher's findings and committing to a remediation timeline.", D: "Suspending the system and requiring the vendor to review the model weights before further operation resumes." }, correct: "B", explanation: "IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety (e.g., audits, red teaming, threat modeling and security testing). Threat modeling and security testing are explicitly listed. Retraining (A) is a IV.C.2 Continuous Monitoring and retraining action, not an assessment. A public statement (C) is an IV.C.6 External Communication Plans action. Requiring vendor review (D) is a IV.B.1 vendor and licensing concern." },
    { id: "DIV-IVC-004", comp: "IV.C", pi: "IV.C.4", isRetrieval: false, bokRef: "IV.C.4 — Document incidents, issues, risks and post-market monitoring plans", stem: "A logistics company's AI route optimization system produces suboptimal routes during peak demand, causing delivery delays. The operations team resolves the issue internally but creates no formal record. Which governance obligation is violated?", options: { A: "Continuous monitoring under IV.C.2 — the team should have detected the degradation proactively before it caused external delivery failures.", B: "Periodic assessment under IV.C.3 — a scheduled audit or red-team exercise should have identified this systemic weakness earlier.", C: "Deactivation controls under IV.C.7 — the system should have been suspended during the incident to prevent operational harm.", D: "Incident documentation under IV.C.4 — all incidents, issues and risks must be formally recorded regardless of the resolution path." }, correct: "D", explanation: "IV.C.4 — Document incidents, issues, risks and post-market monitoring plans. All incidents must be formally recorded regardless of how they were resolved. A describes a IV.C.2 Continuous Monitoring gap, which is also present, but the violation producing the missing record is IV.C.4. B describes IV.C.3 Periodic Assessment. C describes IV.C.7 Deactivation and Localization Controls — which are not triggered until regulatory or performance conditions warrant it." },
    { id: "DIV-IVC-005", comp: "IV.C", pi: "IV.C.5", isRetrieval: false, bokRef: "IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms", stem: "A social media platform deploys a content recommendation AI to increase engagement with friends' posts. The model is later found to amplify politically polarizing content — a use case it was never designed or validated for. Which IV.C obligation is most directly implicated?", options: { A: "Continuous monitoring under IV.C.2 to detect changes in recommendation patterns and trigger a retraining review immediately.", B: "External communication plans under IV.C.6 to notify affected users about the model's unintended influence on their content.", C: "Forecasting and reducing risks of secondary or unintended uses and downstream harms, as required by IV.C.5.", D: "Periodic audits and red teaming under IV.C.3 to assess the system's performance and reliability over time." }, correct: "C", explanation: "IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms. The model's amplification of polarizing content is a secondary use risk and downstream harm — it was never validated for content influence. IV.C.2 Continuous Monitoring (A) might detect the pattern but does not impose the proactive harm-prevention obligation. IV.C.6 External Communication Plans (B) governs stakeholder notification, not harm prevention. IV.C.3 Periodic Assessment (D) is an assessment activity, not a forecasting obligation." },
    { id: "DIV-IVC-006", comp: "IV.C", pi: "IV.C.6", isRetrieval: false, bokRef: "IV.C.6 — Establish external communication plans", stem: "During a regulatory inspection, an inspector asks a telecommunications company to produce its plan for communicating AI-driven decisions and incidents to customers and regulators. The governance team has no such documentation. Which IV.C PI is unmet?", options: { A: "IV.C.6 — Establish external communication plans, which requires deployers to have documented plans for communicating with external stakeholders.", B: "IV.C.1 — Apply deployment policies and procedures, which requires issue management to be embedded in the deployment governance framework.", C: "IV.C.4 — Document post-market monitoring plans, which requires forward-looking structured plans for post-deployment oversight.", D: "IV.C.2 — Conduct continuous monitoring, which requires a real-time tracking mechanism for the AI system's operational performance." }, correct: "A", explanation: "IV.C.6 — Establish external communication plans. This PI governs how deployers communicate AI decisions, incidents and performance concerns to regulators, users and the public. IV.C.1 Deployment Governance (B) addresses issue management within the deployment framework, not external communication. IV.C.4 Documentation (C) covers incident records and post-market monitoring plans, not communication plans for regulators. IV.C.2 Continuous Monitoring (D) governs real-time monitoring infrastructure." },
    { id: "DIV-IVC-007", comp: "IV.C", pi: "IV.C.7", isRetrieval: false, bokRef: "IV.C.7 — Create and implement a policy and controls to deactivate or localize an AI system as necessary (e.g., due to regulatory requirements or performance issues)", stem: "A government agency uses an AI permit screening system. A new regulation requires all public sector AI systems to be re-certified before year-end. The system has not been re-certified. What does IV.C.7 require of the deployer?", options: { A: "Update the post-market monitoring plan to track the re-certification deadline and assign an internal owner to manage compliance.", B: "Conduct a red-team exercise to assess the system's security and reliability before initiating the re-certification process.", C: "Issue a public disclosure explaining the re-certification requirement and confirming the system continues to operate compliantly.", D: "Deactivate or localize the system until it satisfies the new regulatory re-certification requirements, as explicitly required by IV.C.7." }, correct: "D", explanation: "IV.C.7 — Create and implement a policy and controls to deactivate or localize an AI system as necessary (e.g., due to regulatory requirements or performance issues). Mandatory re-certification is a regulatory requirement — the explicit IV.C.7 trigger for deactivation. Updating a monitoring plan (A) addresses IV.C.4 Documentation. Red-team exercises (B) address IV.C.3 Periodic Assessment. A public disclosure (C) addresses IV.C.6 External Communication Plans." },
    { id: "DIV-IVC-008", comp: "IV.C", pi: "IV.C.1", isRetrieval: false, bokRef: "IV.C.1 — Apply the policies, procedures, best practices and ethical considerations to the deployment of an AI system (e.g., data governance, risk management, issue management, and user training)", stem: "A governance review finds an AI hiring tool is being applied to candidate screening for job categories outside its validated scope, with no risk management protocols applied to these expanded uses. What does this describe?", options: { A: "A failure under IV.C.3 Periodic Assessment, which should have detected the scope expansion through structured audit or red-team activities.", B: "A failure under IV.C.1 Deployment Governance to apply policies, procedures and risk management to the AI system's deployment and use.", C: "A failure under IV.C.5 Secondary Use Risk to forecast and prevent unauthorized scope expansion through proactive harm-prevention planning.", D: "A failure under IV.C.2 Continuous Monitoring to establish a retraining schedule that would have detected scope creep through output monitoring." }, correct: "B", explanation: "IV.C.1 — Apply the policies, procedures, best practices and ethical considerations to the deployment of an AI system (e.g., data governance, risk management, issue management, and user training). Applying the tool to unvalidated categories without risk management controls is a IV.C.1 deployment governance failure. IV.C.3 Periodic Assessment (A) might detect it but is not the obligation for applying governance at deployment. IV.C.5 (C) addresses downstream harm forecasting — a parallel concern but not the root obligation. IV.C.2 (D) governs continuous monitoring, not deployment policy application." },
    { id: "DIV-IVC-009", comp: "IV.C", pi: "IV.C.2", isRetrieval: false, bokRef: "IV.C.2 — Conduct continuous monitoring of the AI model and system, and establish a regular schedule for maintenance, updates and retraining", stem: "Six months after deploying a credit scoring model, a governance team detects significant model drift through performance metric reviews. They schedule immediate retraining and establish a quarterly review cadence going forward. Which IV.C obligation does this most directly satisfy?", options: { A: "IV.C.3 Periodic Assessment — conducting structured audits to assess the AI system's performance, reliability and safety.", B: "IV.C.4 Incident Documentation — documenting the issues and risks discovered during the post-deployment performance review.", C: "IV.C.2 Continuous Monitoring — conducting continuous monitoring and establishing a regular schedule for maintenance, updates and retraining.", D: "IV.C.1 Deployment Governance — applying risk management policies and procedures to the deployment and ongoing use of the AI system." }, correct: "C", explanation: "IV.C.2 — Conduct continuous monitoring of the AI model and system, and establish a regular schedule for maintenance, updates and retraining. Detecting drift through ongoing performance metrics and scheduling retraining with a quarterly cadence is a textbook IV.C.2 action. IV.C.3 Periodic Assessment (A) covers scheduled structured assessments like audits and red teaming — distinct from ongoing performance monitoring. IV.C.4 Documentation (B) is a parallel obligation but not what this action primarily satisfies. IV.C.1 Deployment Governance (D) covers the initial application of policies at deployment." },
    { id: "DIV-IVC-010", comp: "IV.C", pi: "IV.C.5", isRetrieval: false, bokRef: "IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms", stem: "A home insurer's AI pricing model uses no protected characteristics directly. A regulator flags that its outputs correlate strongly with racial demographics through postal code proxy variables. Under IV.C, which obligation should have governed proactive management of this risk?", options: { A: "IV.C.5 — forecasting and reducing risks of secondary or unintended uses and downstream harms, including indirect discriminatory outcomes.", B: "IV.C.3 — conducting periodic audits and security testing to assess the system's performance and detect discriminatory output patterns.", C: "IV.C.1 — applying ethical considerations to the deployment of the AI system, including fairness and bias review protocols.", D: "IV.C.2 — conducting continuous monitoring of the AI system to detect changes in output distributions over time." }, correct: "A", explanation: "IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms. Proxy-variable racial correlation is an unintended downstream harm — the model was not designed to discriminate but its outputs do. IV.C.3 Periodic Assessment (B) might detect the pattern but is not the proactive forecasting obligation. IV.C.1 Deployment Governance (C) covers ethical considerations at deployment — relevant but IV.C.5 is the specific PI for downstream harm prevention. IV.C.2 Continuous Monitoring (D) would detect output drift but does not require forecasting discriminatory downstream effects." },
    { id: "DIV-IVC-011", comp: "IV.C", pi: "IV.C.4", isRetrieval: false, bokRef: "IV.C.4 — Document incidents, issues, risks and post-market monitoring plans", stem: "A medical device company deploys an AI diagnostic support system. Eighteen months post-deployment, a regulator requests the post-market monitoring plan. The company produces incident logs but no structured plan document. Which specific IV.C.4 requirement is unmet?", options: { A: "The company failed to document the risk assessment conducted before releasing the system into production environments.", B: "The company failed to establish a maintenance and retraining schedule for the system as required under IV.C.2 Continuous Monitoring.", C: "The company failed to prepare transparency disclosures for medical professionals using the system as required under IV.C.6.", D: "The company failed to document a post-market monitoring plan — a distinct deliverable explicitly required by IV.C.4." }, correct: "D", explanation: "IV.C.4 — Document incidents, issues, risks and post-market monitoring plans. The post-market monitoring plan is a distinct deliverable from incident logs — IV.C.4 requires both. Pre-deployment risk assessment documentation (A) is a III.A.5 Governing AI Development obligation. Retraining schedule (B) concerns IV.C.2 Continuous Monitoring. Transparency disclosures for medical professionals (C) concern IV.C.6 External Communication Plans or, on the developer side, III.C.6 Release and Monitoring." },
    { id: "DIV-IVC-012", comp: "IV.C", pi: "IV.C.7", isRetrieval: false, bokRef: "IV.C.7 — Create and implement a policy and controls to deactivate or localize an AI system as necessary (e.g., due to regulatory requirements or performance issues)", stem: "A deployer's AI content moderation system performs poorly for a regional language dialect. Local regulators are signaling an imminent enforcement action. What governance control should the deployer invoke first under IV.C.7?", options: { A: "Retrain the model on regional dialect data immediately to resolve the performance gap before formal regulatory action begins.", B: "Localize or deactivate the system in that market under IV.C.7 until the performance issue has been resolved.", C: "Establish an external communication plan under IV.C.6 to notify affected regional users of the system's known limitations.", D: "Commission an independent performance audit under IV.C.3 to formally assess and document the system's regional performance gaps." }, correct: "B", explanation: "IV.C.7 — Create and implement a policy and controls to deactivate or localize an AI system as necessary (e.g., due to regulatory requirements or performance issues). Regional performance failure is an explicit IV.C.7 trigger. Retraining (A) is a IV.C.2 Continuous Monitoring action but not the immediate governance response when regulators are threatening enforcement. External communications (C) concern IV.C.6 and are a parallel obligation. Performance audit (D) concerns IV.C.3 Periodic Assessment." },
    { id: "DIV-IVC-013", comp: "IV.C", pi: "IV.C.3", isRetrieval: false, bokRef: "IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety (e.g., audits, red teaming, threat modeling and security testing)", stem: "A cybersecurity firm's deployed threat detection AI is due for its annual review. The governance team wants to go beyond performance dashboards and actively simulate adversarial attack scenarios to identify exploitable vulnerabilities. Which IV.C.3 activity does this describe?", options: { A: "Red teaming the model by simulating adversarial attack scenarios to identify vulnerabilities that could be exploited in production.", B: "Reviewing the model card and conformity assessment to determine whether deployment conditions have changed since initial release.", C: "Updating the post-market monitoring plan to incorporate adversarial threat scenarios identified during the annual governance review.", D: "Conducting a data lineage review to verify that training data inputs have not been corrupted or tampered with." }, correct: "A", explanation: "IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety (e.g., audits, red teaming, threat modeling and security testing). Red teaming through adversarial simulation is explicitly listed under IV.C.3. Reviewing the model card (B) is a III.C.1 Release and Monitoring readiness activity. Updating the monitoring plan (C) concerns IV.C.4 Documentation. Data lineage review (D) is a III.B.2 Data Governance and Training activity." },
    { id: "DIV-IVC-014", comp: "IV.C", pi: "IV.C.1", isRetrieval: false, bokRef: "IV.C.1 — Apply the policies, procedures, best practices and ethical considerations to the deployment of an AI system (e.g., data governance, risk management, issue management, and user training)", stem: "A fintech licenses an AI credit scoring model from a third-party provider. The fintech controls deployment parameters, user access and use case scope. Under IV.C.1, which party bears primary responsibility for deployment governance including issue management and user training?", options: { A: "The model provider, because it developed, trained and maintains the underlying model that produces the credit scoring output.", B: "Both parties equally, because the licensing agreement creates co-equal governance obligations at the point of deployment.", C: "The fintech deployer, because IV.C Govern Deployment and Use governs the deployer's function and responsibilities.", D: "The regulator, because financial services AI governance is a supervisory function that cannot be delegated to private parties." }, correct: "C", explanation: "IV.C.1 — Apply the policies, procedures, best practices and ethical considerations to the deployment of an AI system. IV.C Govern Deployment and Use places deployment-stage governance obligations on the deployer. The model provider (A) bears III.A Governing AI Development and III.C Release and Monitoring obligations. Shared responsibility (B) may exist contractually but IV.C locates the deployment governance obligation with the deployer. The regulator (D) oversees compliance but does not bear the operational governance obligation." },
    { id: "DIV-IVC-015", comp: "IV.C", pi: "IV.C.6", isRetrieval: false, bokRef: "IV.C.6 — Establish external communication plans", stem: "An autonomous vehicle company's AI driving system is involved in three minor incidents in one month. No injuries occur but the pattern raises concerns. The team prepares an internal technical summary. Which IV.C obligation remains unsatisfied?", options: { A: "Documentation under IV.C.4, which requires formal records of all incidents regardless of injury outcome or severity level.", B: "Periodic assessment under IV.C.3, which requires structured audits or red-team exercises to investigate recurring performance patterns.", C: "Secondary harm forecasting under IV.C.5, which requires analysis of whether a three-incident pattern signals broader downstream harm.", D: "External communication plans under IV.C.6, which governs how stakeholders and regulators are notified about AI system incidents." }, correct: "D", explanation: "IV.C.6 — Establish external communication plans. An internal technical summary satisfies internal documentation but not the obligation to notify external stakeholders and regulators. IV.C.4 Documentation (A) may be satisfied if the internal summary is formal. IV.C.3 Periodic Assessment (B) would address structural safety gaps — relevant but not the specific unfulfilled obligation here. IV.C.5 Secondary Use Risk (C) concerns unintended use harms, not recurring incident notification." },
    { id: "DIV-IVC-016", comp: "IV.C", pi: "IV.C.5", isRetrieval: false, bokRef: "IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms", stem: "A hospital deploys an AI model licensed for clinical note summarization. A department head begins using it to generate patient prognosis estimates — a function it was never validated for. What should the AI governance officer address first under IV.C?", options: { A: "Update the vendor licensing agreement to add a clause explicitly prohibiting secondary uses of the clinical AI system.", B: "Invoke IV.C.1 Deployment Governance and IV.C.5 Secondary Use Risk to enforce deployment policies and manage downstream harm.", C: "Commission an independent clinical validation study to determine whether the model's prognosis outputs meet clinical accuracy standards.", D: "Retrain the model to formally incorporate prognostic capability within its validated and licensed operational scope." }, correct: "B", explanation: "IV.C.1 — Apply the policies, procedures, best practices and ethical considerations to deployment — and IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms. The unauthorized prognosis use is both a deployment policy violation (IV.C.1) and an unintended secondary use creating downstream harm risk (IV.C.5). Amending the vendor contract (A) addresses IV.B.1 vendor and licensing terms — useful but not the immediate governance response. An independent validation study (C) is a IV.C.3-type activity but not the first step. Retraining (D) would expand scope rather than address the current unauthorized use." },
    { id: "DIV-IVC-017", comp: "IV.C", pi: "IV.C.2", isRetrieval: false, bokRef: "IV.C.2 — Conduct continuous monitoring of the AI model and system, and establish a regular schedule for maintenance, updates and retraining", stem: "A deployer maintains a real-time dashboard tracking the AI system's output distribution, latency and error rates, with automated alerts triggering when any metric deviates beyond a defined threshold. This infrastructure primarily satisfies which IV.C obligation?", options: { A: "Continuous monitoring under IV.C.2, which requires ongoing operational visibility into the AI model and system's behaviour.", B: "Periodic activities under IV.C.3, which includes structured assessments of performance, reliability and safety at scheduled intervals.", C: "Documentation under IV.C.4, which requires formal records of incidents, issues and risks when thresholds are breached or alerts fire.", D: "Deployment governance under IV.C.1, which requires applying risk management policies and procedures to the AI system's deployment." }, correct: "A", explanation: "IV.C.2 — Conduct continuous monitoring of the AI model and system. A real-time dashboard with automated deviation alerts is the defining infrastructure of continuous monitoring. IV.C.3 Periodic Assessment (B) covers scheduled structured assessments like audits and red teaming — distinct from real-time operational dashboards. IV.C.4 Documentation (C) is triggered by the alerts the dashboard generates, not the dashboard infrastructure itself. IV.C.1 Deployment Governance (D) covers the initial and ongoing application of governance policies, not the monitoring infrastructure." },
    { id: "DIV-IVC-018", comp: "IV.C", pi: "IV.C.7", isRetrieval: false, bokRef: "IV.C.7 — Create and implement a policy and controls to deactivate or localize an AI system as necessary (e.g., due to regulatory requirements or performance issues)", stem: "A consumer lender receives notice that a data protection authority has suspended the legal basis for processing credit applicant data in a jurisdiction where its AI model operates. Which IV.C.7 action is required?", options: { A: "Notify affected applicants of the data processing suspension under IV.C.6 and await further guidance from the authority.", B: "Conduct an emergency audit under IV.C.3 Periodic Assessment to assess the impact of the suspended legal basis on outputs.", C: "Deactivate or localize the AI system in that jurisdiction under IV.C.7 until a compliant legal basis is restored.", D: "Update the post-market monitoring plan under IV.C.4 to formally document the regulatory development and its compliance implications." }, correct: "C", explanation: "IV.C.7 — Create and implement a policy and controls to deactivate or localize an AI system as necessary (e.g., due to regulatory requirements or performance issues). A suspended legal basis is a regulatory requirement — the explicit IV.C.7 trigger for deactivation or localization. Notifying applicants (A) addresses IV.C.6 External Communication Plans — a parallel but secondary obligation. An emergency audit (B) addresses IV.C.3 Periodic Assessment — relevant but not the primary required action. Updating the monitoring plan (D) addresses IV.C.4 Documentation." },
    { id: "DIV-IVC-019", comp: "IV.C", pi: "IV.C.4", isRetrieval: false, bokRef: "IV.C.4 — Document incidents, issues, risks and post-market monitoring plans", stem: "A governance lead discovers the team has managed all AI system performance issues through informal Slack messages and emails, with no formal incident register. When a regulator requests documentation, no coherent audit trail exists. Which IV.C obligation was violated?", options: { A: "IV.C.2 Continuous Monitoring — the informal approach meant drift and performance issues were not formally tracked or governed.", B: "IV.C.1 Deployment Governance — issue management policies were not operationalised at deployment as the framework required.", C: "IV.C.3 Periodic Assessment — structured audits should have identified the absence of a formal incident management process.", D: "IV.C.4 Incident Documentation — incidents, issues and risks must be formally documented; informal communications do not satisfy this obligation." }, correct: "D", explanation: "IV.C.4 — Document incidents, issues, risks and post-market monitoring plans. Informal Slack messages and emails do not satisfy the formal documentation obligation — regulators cannot audit a chat thread. A IV.C.2 Continuous Monitoring gap (A) is also present but the violation producing the absent audit trail is IV.C.4. IV.C.1 Deployment Governance (B) requires embedding issue management policies — a contributing failure, but IV.C.4 is the documentation obligation. IV.C.3 Periodic Assessment (C) would be a relevant detection mechanism but is not the violated documentation obligation." },
    { id: "DIV-IVC-020", comp: "IV.C", pi: "IV.C.1", isRetrieval: false, bokRef: "IV.C.1 — Apply the policies, procedures, best practices and ethical considerations to the deployment of an AI system (e.g., data governance, risk management, issue management, and user training)", stem: "A governance review identifies four gaps: no structured user training program; no external stakeholder communication plan; model drift detected but no retraining scheduled; and three undocumented incidents. To which IV.C PIs do these four gaps respectively map?", options: { A: "All four fall under IV.C.1 alone — user training, communication, monitoring and documentation are all deployment governance obligations.", B: "They map to IV.C.1 (user training), IV.C.6 (external comms), IV.C.2 (retraining schedule) and IV.C.4 (incident documentation) respectively.", C: "Only gaps 3 and 4 fall under IV.C; user training belongs to I.B Organizational Governance and communications to III.C Release and Monitoring.", D: "All four fall under IV.C.4 alone, as that PI serves as the documentation umbrella for all deployment operational failures." }, correct: "B", explanation: "IV.C.1 — Apply policies including user training; IV.C.6 — Establish external communication plans; IV.C.2 — Continuous monitoring and retraining schedule; IV.C.4 — Document incidents, issues and risks. Each gap maps to a distinct PI. A is wrong — IV.C.1 covers only the user training gap, not all four. C is wrong — user training is explicitly within IV.C.1 Deployment Governance (not I.B.3 Training and Awareness under Organizational Governance), and external communication is IV.C.6 (not III.C.6 Release and Monitoring). D is wrong — IV.C.4 covers documentation, not monitoring infrastructure or communication plans." },
    { id: "DI-IA-017", comp: "I.A", pi: "I.A.3", isRetrieval: true, bokRef: "I.A.3 — Identify the unique characteristics of AI that require a comprehensive approach to governance (e.g., complexity, opacity, autonomy, speed and scale, potential for harm or misuse, data dependency, and probabilistic versus deterministic outputs)", stem: "A company's AI model performs differently across demographic groups despite receiving identical inputs. When audited, the model cannot explain the reasoning behind specific predictions. Which I.A.3 characteristic most directly explains why this requires governance action?", options: { A: "Autonomy — the model operates independently of human direction, making oversight mechanisms necessary to catch differential outputs.", B: "Data dependency — the model's differential performance is wholly attributable to the quality and diversity of its training data.", C: "Opacity — the model cannot explain its internal reasoning, making accountability difficult and bias detection structurally impaired.", D: "Speed and scale — the model processes large volumes of decisions too rapidly to allow case-by-case human review." }, correct: "C", explanation: "I.A.3 — Identify the unique characteristics of AI that require a comprehensive approach to governance (e.g., complexity, opacity, autonomy, speed and scale, potential for harm or misuse, data dependency, and probabilistic versus deterministic outputs). Opacity means the model's reasoning cannot be interrogated, making accountability and bias detection structurally difficult. Autonomy (A) concerns independent operation, not explainability gaps. Data dependency (B) is an I.A.3 characteristic but describes the training data source, not the inability to explain individual outputs. Speed and scale (D) concerns volume, not explainability." },
    { id: "DII-IIB-017", comp: "II.B", pi: "II.B.2", isRetrieval: true, bokRef: "II.B.2 — Understand how nondiscrimination laws apply to AI (e.g., in the employment, credit, lending, housing and insurance contexts)", stem: "A bank's AI credit scoring model uses postal code as a variable. An applicant denied credit argues the model produces discriminatory outcomes in the lending context, even without using protected characteristics directly. Which II.B framework applies?", options: { A: "Nondiscrimination laws — II.B.2 applies to AI systems producing discriminatory effects in credit and lending contexts.", B: "Consumer protection laws — II.B.3 prohibits unfair and deceptive acts or practices in AI-driven financial product decisions.", C: "Product liability laws — II.B.4 may hold the model provider liable for discriminatory outputs as a design defect.", D: "Intellectual property laws — II.B.1 regulates collection and use of training data that may encode historical discriminatory bias." }, correct: "A", explanation: "II.B.2 — Understand how nondiscrimination laws apply to AI (e.g., in the employment, credit, lending, housing and insurance contexts). Credit and lending is explicitly listed; discriminatory effects through proxy variables are covered regardless of intent. Consumer protection laws (B) address deceptive or unfair practices under II.B.3 Consumer Protection, not discriminatory lending effects. Product liability (C) concerns design and manufacturing defects under II.B.4 Product Liability. Intellectual property laws (D) govern training data rights under II.B.1 Intellectual Property, not bias outcomes." },
