<script>
initQuiz({
  day: 7, week: 1, comp: "Review", topic: "Week 1 Review",
  filename: "AIGP_080626_Day7_Week1-Review_Quiz.html",
  webhookUrl: "https://script.google.com/macros/s/AKfycbyCG5oTGoPsjE9ytN3NJbsAv45GO0_uxb5gjXL7K8trVSiOfG05tQ0LV3wnjtuj7Bir/exec",
  questions: [
    {id:"DI-IA-001",comp:"I.A",isRetrieval:false,
     stem:"A bank's underwriting team asks why a deep learning loan-default model requires additional governance compared to their existing rule-based scorecard. Which AI characteristic most directly explains the governance gap?",
     options:{A:"The AI model processes more data per second than the scorecard",B:"The AI model was trained using proprietary customer data",C:"The AI model's decision path cannot be inspected or explained, unlike the explicit rules in the scorecard",D:"The AI model produces higher accuracy rates on held-out test sets"},
     correct:"C",
     explanation:"C is correct. Opacity — inability to inspect the decision path — is the characteristic under I.A.3 that most directly distinguishes AI from rule-based systems and drives the governance gap. A and B describe features, not governance rationales. D describes performance, not a characteristic requiring intervention.",
     bokRef:"I.A.3 — Identify the unique characteristics of AI that require a comprehensive approach to governance (e.g., complexity, opacity, autonomy, speed and scale, potential for harm or misuse, data dependency, and probabilistic versus deterministic outputs)."},

    {id:"DI-IA-002",comp:"I.A",isRetrieval:false,
     stem:"A content moderation AI systematically suppresses posts from minority-language communities at higher rates than majority-language posts. The harm affects an identifiable group rather than specific individuals. Which I.A.2 harm category best classifies this?",
     options:{A:"Harm to groups — the AI systematically and disproportionately affects a defined community",B:"Organizational harm — the platform faces reputational damage",C:"Societal harm — overall public discourse is reduced across all users equally",D:"Individual harm — each minority-language user experiences a personal loss"},
     correct:"A",
     explanation:"A is correct. I.A.2 identifies harms to individuals, groups, organizations, and society as distinct categories. The harm here targets an identifiable group systematically — the defining feature of group-level harm. Individual harm requires disaggregated per-person impact. Societal harm is diffuse and non-targeted.",
     bokRef:"I.A.2 — Identify the types of risks and harms posed by AI to individuals, groups, organizations and society."},

    {id:"DI-IA-003",comp:"I.A",isRetrieval:false,
     stem:"A healthcare AI flags high-risk patients but provides no explanation. Clinicians accept flags without review. Which responsible AI principle is most directly violated?",
     options:{A:"Fairness — the system must produce equal outcomes across patient demographics",B:"Safety and reliability — the system must achieve a clinical accuracy benchmark",C:"Privacy and security — patient data used for inference must be encrypted at rest",D:"Accountability and human-centricity — humans must be able to understand and contest AI decisions, especially in high-stakes contexts"},
     correct:"D",
     explanation:"D is correct. I.A.4 identifies accountability and human-centricity as a responsible AI principle. When clinicians cannot review or contest a flag, the accountability chain is broken. Fairness (A) relates to demographic equity. Safety (B) relates to accuracy. Privacy (C) is irrelevant to the explainability gap.",
     bokRef:"I.A.4 — Identify and apply the common principles of responsible AI (e.g., fairness, safety and reliability, privacy and security, transparency and explainability, accountability and human-centricity)."},

    {id:"DI-IA-004",comp:"I.A",isRetrieval:false,
     stem:"A regulator asks a company to classify its customer service product. The system uses a large language model to generate responses dynamically, adapting to any topic without pre-programmed rules. Which classification is most accurate?",
     options:{A:"Narrow AI — it is limited to customer service use cases",B:"Generative AI — it produces novel content through learned patterns rather than fixed rules, creating distinct governance concerns around accuracy and hallucination",C:"Autonomous agent — it takes actions without human instruction",D:"Supervised learning model — it was trained on labelled customer interaction data"},
     correct:"B",
     explanation:"B is correct. I.A.1 covers definitions and types of AI. Generative AI produces novel outputs from learned patterns and presents distinct governance considerations (hallucination, copyright, deception) not shared by rule-based systems. A conflates task breadth with generation method. C confuses generative with agentic AI. D describes a training method, not a system type.",
     bokRef:"I.A.1 — Know the generally accepted definitions and types of AI."},

    {id:"DI-IB-005",comp:"I.B",isRetrieval:false,
     stem:"An AI governance lead discovers that procurement approved a new AI vendor contract without legal, data privacy, or HR input. Which I.B gap does this most directly reflect?",
     options:{A:"Absence of a training program — team members did not understand AI terminology",B:"Inadequate role definitions — no one was designated AI governance owner for procurement",C:"Failure to establish cross-functional collaboration — the governance program lacked a mechanism requiring multi-function review for AI procurement decisions",D:"Insufficient governance differentiation — a large company should have more complex approval workflows"},
     correct:"C",
     explanation:"C is correct. I.B.2 requires establishing cross-functional collaboration for efficacy and diversity of expertise. A siloed procurement approval reflects the absence of that structural mechanism. A and B are contributing factors, but the proximate cause is the failure to require cross-function involvement.",
     bokRef:"I.B.2 — Establish cross-functional collaboration in the AI governance program (e.g., for efficacy and diversity of expertise and perspective)."},

    {id:"DI-IB-006",comp:"I.B",isRetrieval:false,
     stem:"A company appointed a CAIO three months ago. An AI incident occurs and no one can identify who was responsible for approving the system's deployment. What does this most directly indicate?",
     options:{A:"Roles and responsibilities were not clearly defined — the governance program lacked a documented accountability map linking each lifecycle stage to a named function",B:"The CAIO lacked authority — the role should have veto power over all AI deployments",C:"Training was inadequate — the business unit head should have known their approval obligations",D:"Cross-functional collaboration was excessive — too many stakeholders created diffusion of accountability"},
     correct:"A",
     explanation:"A is correct. I.B.1 requires defining roles and responsibilities. When no one can identify who approved a deployment, the accountability map is missing. B assumes a structural authority solution — but the root cause is clarity of roles. C and D are secondary.",
     bokRef:"I.B.1 — Define roles and responsibilities for AI governance stakeholders."},

    {id:"DI-IB-007",comp:"I.B",isRetrieval:false,
     stem:"A European bank uses an AI model provided by a US company. Which entity bears primary EU AI Act compliance obligations for the model's high-risk classification?",
     options:{A:"The US company — it developed the model and retains IP ownership",B:"Whoever places the AI system on the EU market or puts it into service — which could be the bank, the US company, or an EU-based importer, depending on the commercial arrangement",C:"The European bank in all cases, because the system is deployed within EU territory",D:"Both entities equally — the Act imposes joint liability on all supply chain parties"},
     correct:"B",
     explanation:"B is correct. I.B.5 and II.C.6 establish that role determines obligation. Primary provider obligations fall on whoever places the system on the EU market. IP ownership (A) does not determine regulatory responsibility. Territorial use alone (C) is insufficient. Joint liability (D) overstates the Act's position.",
     bokRef:"I.B.5 — Identify differences among AI developers, providers, deployers and users from a governance perspective (e.g., with respect to responsibilities, opportunities and needs)."},

    {id:"DI-IB-008",comp:"I.B",isRetrieval:false,
     stem:"A 12-person AI startup asks whether they need the same AI governance program as a 50,000-employee financial institution. What is the correct governance response?",
     options:{A:"Yes — regulatory requirements are the same regardless of company size; scale the program proportionally",B:"Yes — the startup should adopt the full program immediately to avoid technical debt as they scale",C:"No — startups are exempt from AI governance requirements under most current frameworks",D:"No — governance approaches should be differentiated based on company size, maturity, industry, products, objectives and risk tolerance"},
     correct:"D",
     explanation:"D is correct. I.B.4 explicitly requires differentiating governance approaches based on company size, maturity, industry, products, objectives, and risk tolerance. A conflates regulatory floor with governance design. B applies a scale argument but I.B.4 requires current-state differentiation. C is factually wrong.",
     bokRef:"I.B.4 — Differentiate approaches to AI governance based upon company size, maturity, industry, products and services, objectives and risk tolerance."},

    {id:"DI-IC-009",comp:"I.C",isRetrieval:false,
     stem:"A manufacturing company is procuring an AI quality inspection system from an external vendor. Which governance instrument most directly addresses the third-party risk created by this procurement?",
     options:{A:"An internal AI ethics policy that the vendor is required to acknowledge",B:"A privacy impact assessment covering the data the vendor will process",C:"A vendor contract with explicit obligations on data governance, audit rights, performance standards, and liability allocation for AI-related failures",D:"A training program delivered to the procurement team on AI terminology and risk"},
     correct:"C",
     explanation:"C is correct. I.C.3 requires creating contracts to manage third-party risk including procurement. The contract creates enforceable obligations. An ethics policy acknowledgement (A) is non-binding. A PIA (B) is a unilateral internal assessment. Training (D) improves capability but does not govern the vendor relationship.",
     bokRef:"I.C.3 — Create, update and implement policies, assessments and contracts to manage third-party risk (e.g., procurement, supply chain, human resources and acceptable use)."},

    {id:"DI-IC-010",comp:"I.C",isRetrieval:false,
     stem:"A company has a mature information security policy and data retention policy. Can these simply be extended to cover new AI deployments? What is the correct approach under I.C.2?",
     options:{A:"Create entirely new AI-specific policies from scratch — existing policies are insufficient and should be retired",B:"Evaluate existing policies for AI-specific gaps and update them to explicitly cover AI contexts (e.g., does the retention policy address training data lineage?)",C:"Apply existing policies as-is — general security and retention principles are technology-neutral and cover AI by default",D:"Defer to AI vendor policies — third-party providers bear responsibility for ensuring their systems comply"},
     correct:"B",
     explanation:"B is correct. I.C.2 requires evaluating and updating existing policies for AI. The key word is 'update' — not replace wholesale (A) nor ignore gaps (C). Existing policies have value but need AI-specific gaps closed. D is wrong — deployers cannot outsource governance obligations to vendors.",
     bokRef:"I.C.2 — Evaluate and update existing policies (e.g., data privacy, security, data governance and intellectual property) for AI."},

    {id:"DI-IC-011",comp:"I.C",isRetrieval:false,
     stem:"An AI system used in medical claims adjudication has been in production for eight months without any formal monitoring policy. Which lifecycle stage policy is most urgently missing?",
     options:{A:"Deployment and monitoring policy — the system is in production with no mechanism to detect performance degradation, model drift, or harm",B:"Training and testing policy — the model may have been inadequately validated before deployment",C:"Data acquisition and use policy — the claims data used for training may not have been lawfully collected",D:"Ethics by design policy — the use case assessment should have identified ethical risks prior to development"},
     correct:"A",
     explanation:"A is correct. I.C.1 lists deployment and monitoring as an explicit lifecycle stage requiring policy. The system is already in production — the most urgent gap is the absence of monitoring. B, C, and D address earlier lifecycle stages and cannot retroactively fix the current production monitoring gap.",
     bokRef:"I.C.1 — Create and implement policies to ensure oversight and accountability across all AI life cycle stages (e.g., use case assessment, risk management, ethics by design, data acquisition and use, model and system development, training and testing, deployment and monitoring, documentation and reporting, and incident management)."},

    {id:"DI-IC-012",comp:"I.C",isRetrieval:false,
     stem:"An AI recruitment tool incorrectly classifies a qualified candidate as low-priority. The candidate complains formally. The AI governance team has no documented procedure for handling this. What does this most directly indicate?",
     options:{A:"The ethics by design stage was not executed — the system should not have deployed without ethical review",B:"The training and testing policy is deficient — the classification error indicates inadequate model validation",C:"The data governance policy failed — the candidate's data was not handled lawfully",D:"The incident management policy is absent — there is no procedure to receive, investigate, and respond to complaints about AI-driven decisions"},
     correct:"D",
     explanation:"D is correct. I.C.1 explicitly includes incident management as a lifecycle stage requiring policy. The complaint is an incident, and the absence of any documented procedure is the direct governance failure. A and B describe earlier lifecycle failures. C is plausible but the question asks about handling the complaint.",
     bokRef:"I.C.1 — Create and implement policies to ensure oversight and accountability across all AI life cycle stages (e.g., use case assessment, risk management, ethics by design, data acquisition and use, model and system development, training and testing, deployment and monitoring, documentation and reporting, and incident management)."},

    {id:"DII-IIA-013",comp:"II.A",isRetrieval:false,
     stem:"A logistics company uses AI to automatically score job applicants and exclude all those below 70 points — no human reviews exclusions. An applicant asks why they were rejected. Under GDPR-equivalent law, what obligation does this trigger?",
     options:{A:"The company must provide a copy of all personal data processed about the applicant",B:"The company must cease automated scoring immediately pending a data protection impact assessment",C:"The company must inform the applicant of the logic involved and provide the right to obtain human review",D:"The company must delete the applicant's data within 30 days of the request"},
     correct:"C",
     explanation:"C is correct. II.A.3 covers automated decision-making obligations. When AI makes decisions with significant effects (employment exclusion qualifies), the data subject has the right to meaningful information about the logic and the right to human review. A describes subject access rights — also applicable but not the primary trigger. B overstates — DPIAs are required in advance, not as a complaint remedy. D is a separate right.",
     bokRef:"II.A.3 — Understand how obligations on data controllers apply to AI (e.g., regarding privacy impact assessments, use of third-party processors, cross-border data transfers, data subject rights, automated decision making, incident management, breach notification and record keeping)."},

    {id:"DII-IIA-014",comp:"II.A",isRetrieval:false,
     stem:"A media company trained a recommendation AI on viewing history to predict content preferences. It now wants to use the same model to predict subscription likelihood and target upsell ads. The privacy notice described data use as 'improving content recommendations.' What privacy principle is at stake?",
     options:{A:"Data minimization — the model is using more data than necessary for the new purpose",B:"Purpose limitation — using data collected for one declared purpose for a materially different commercial purpose requires a new lawful basis or compatible purpose assessment",C:"Transparency — users were not told about the AI's role in content recommendations",D:"Privacy by design — the system was not built with subscription targeting in mind from the start"},
     correct:"B",
     explanation:"B is correct. II.A.1 covers purpose limitation — data collected under one declared purpose cannot be repurposed without a new lawful basis or compatibility assessment. Subscription upsell targeting is materially different from 'improving content recommendations.' A concerns data volume, not repurposing. C may also be an issue but purpose limitation is the primary doctrine. D is a design principle, not the legal constraint on repurposing.",
     bokRef:"II.A.1 — Understand how transparency, choice, lawful basis and purpose limitation requirements apply to AI."},

    {id:"DII-IIA-015",comp:"II.A",isRetrieval:false,
     stem:"An insurer is building an AI claims assessment tool. The data scientist proposes collecting all available health records, social media, and location history to maximize predictive accuracy. As the AI governance lead, what is your primary legal objection?",
     options:{A:"Data minimization requires collecting only data that is adequate, relevant, and limited to what is necessary for the specified purpose — collecting all available data violates this principle",B:"The model will be less accurate if trained on irrelevant data, so minimizing the training set improves performance",C:"Health and location data cannot be used in insurance AI under any circumstances",D:"Social media data cannot be used because there is no direct contractual relationship with the data subject"},
     correct:"A",
     explanation:"A is correct. II.A.2 covers data minimization as applied to AI. Collecting all available data to maximize accuracy violates the 'limited to what is necessary' principle. B reframes a legal rule as a technical efficiency argument. C overstates — sensitive data can be processed under appropriate conditions. D is partially true for consent but misses that other lawful bases may apply.",
     bokRef:"II.A.2 — Understand how data minimization and privacy by design requirements apply to AI."},

    {id:"DII-IIA-016",comp:"II.A",isRetrieval:false,
     stem:"A retailer deploys facial recognition at store entrances to identify known shoplifters. The system processes facial geometry of every person entering. What is the most significant legal challenge from a data privacy perspective?",
     options:{A:"Transparency — customers must be informed that a camera system is in use",B:"Purpose limitation — facial recognition for loss prevention is incompatible with a retail service relationship",C:"Data minimization — storing facial images of all customers creates excessive retention",D:"Sensitive data requirements — facial geometry is biometric data subject to heightened protection, requiring an explicit legal basis and stringent controls beyond standard personal data"},
     correct:"D",
     explanation:"D is correct. II.A.4 covers sensitive or special categories of data including biometrics. Facial geometry processed for identification is biometric data, triggering a stricter threshold — explicit consent or statutory necessity — before any other analysis applies. A, B, and C are valid but apply to standard personal data; biometric heightened threshold must be addressed first.",
     bokRef:"II.A.4 — Understand the requirements that apply to sensitive or special categories of data (e.g., biometrics)."},

    {id:"DII-IIB-017",comp:"II.B",isRetrieval:false,
     stem:"An e-commerce platform's AI generates product descriptions that occasionally claim features the product does not have (e.g., 'waterproof' for a non-waterproof item). The platform publishes these without review. Which area of law most directly creates liability?",
     options:{A:"Product liability — the false description constitutes a manufacturing defect in the product listing",B:"Intellectual property law — the AI may have reproduced copyrighted marketing copy from competitors",C:"Consumer protection law — publishing false product attributes constitutes an unfair or deceptive act regardless of whether a human or AI generated the claim",D:"Discrimination law — customers who rely on false descriptions are harmed as a group"},
     correct:"C",
     explanation:"C is correct. II.B.3 covers consumer protection laws prohibiting unfair and deceptive acts or practices. A false product description is a deceptive act. The AI origin provides no defence — the platform published it. A relates to physical product defects. B is a separate risk not triggered by false attribute claims. D requires differential treatment based on protected characteristics.",
     bokRef:"II.B.3 — Understand how consumer protection laws apply to AI (e.g., prohibiting unfair and deceptive acts or practices)."},

    {id:"DII-IIB-018",comp:"II.B",isRetrieval:false,
     stem:"A bank's AI loan approval system shows equivalent credit scores accepted at different rates depending on applicant zip code, which correlates strongly with racial demographics. The bank argues there was no discriminatory intent. What is the most accurate legal assessment?",
     options:{A:"The bank has no liability because the AI acted autonomously and there was no discriminatory intent",B:"The bank may face liability for disparate impact discrimination even without intent — if outcomes correlate with a protected characteristic and there is no compelling business justification, nondiscrimination law applies",C:"The bank's liability is limited to civil penalties because criminal discrimination requires proof of intent",D:"The bank can cure the issue by removing zip code as a variable — disparate impact ceases once the proxy variable is removed"},
     correct:"B",
     explanation:"B is correct. II.B.2 covers nondiscrimination laws in credit and lending. Disparate impact doctrine imposes liability based on outcome distribution, not intent. A is wrong — intent is not required. C conflates civil and criminal standards misleadingly. D is wrong — removing zip code may not eliminate disparate impact if other correlated variables remain; the output distribution must be tested.",
     bokRef:"II.B.2 — Understand how nondiscrimination laws apply to AI (e.g., in the employment, credit, lending, housing and insurance contexts)."},

    {id:"DII-IIB-019",comp:"II.B",isRetrieval:false,
     stem:"A tech company trains an LLM on a dataset scraped from the internet, including copyrighted news articles, books, and academic papers, without licensing agreements. A publisher sues. Under which IP law principle is the company most at risk?",
     options:{A:"Unlicensed reproduction of copyrighted works during training may infringe reproduction rights, and no bright-line AI training exception exists in most jurisdictions",B:"The company has a fair use defence because the training process is transformative and non-commercial",C:"Copyright does not apply to AI training data because the model does not reproduce the works verbatim in its outputs",D:"The publisher's claim will fail because scraping publicly accessible content is legal under most national laws"},
     correct:"A",
     explanation:"A is correct. II.B.1 covers IP laws applied to AI training data. The legal status of training data ingestion is contested in most jurisdictions and no universal exception exists. B overstates fair use — commercial models have weaker transformative claims. C is factually wrong — reproduction during training can infringe. D confuses accessibility with reproduction rights.",
     bokRef:"II.B.1 — Understand how intellectual property laws apply to AI (e.g., prohibiting or limiting use of data for AI training)."},

    {id:"DII-IIB-020",comp:"II.B",isRetrieval:false,
     stem:"A hospital's AI diagnostic tool incorrectly classifies a patient's tumour as benign. Investigation shows a known flaw in the model's training design caused the misclassification. The vendor was aware of the flaw. Under product liability law, which theory most directly applies?",
     options:{A:"Manufacturing defect — each unit of the AI produces a different output and this was one defective instance",B:"Failure to warn — the vendor should have disclosed the model's accuracy limitations",C:"Design defect — a known flaw in the model's fundamental design causes it to be unreasonably dangerous",D:"Strict liability does not apply to AI because software is not a physical product"},
     correct:"C",
     explanation:"C is correct. II.B.4 covers product liability including design defects. A design defect exists when the fundamental design renders the product unreasonably dangerous. A known training design flaw causing systematic misclassification is a design defect. A (manufacturing) describes production variation. B (failure to warn) is secondary when the flaw is known. D is jurisdictionally incorrect — several jurisdictions extend product liability to software.",
     bokRef:"II.B.4 — Understand how product liability laws apply to AI (e.g., prohibiting design and manufacturing defects)."},

    {id:"DII-IIC-021",comp:"II.C",isRetrieval:false,
     stem:"A company places a high-risk AI credit scoring system on the EU market. Which set of obligations must it maintain throughout the system's operational lifetime, not just at launch?",
     options:{A:"A one-time conformity assessment and CE marking — once certified, the system can operate without further updates",B:"Quarterly model accuracy benchmarks published on the EU AI Office registry",C:"Annual retraining of the model to incorporate new data",D:"Continuous risk management documentation, technical documentation updates, post-market monitoring logs, and incident reporting for serious incidents"},
     correct:"D",
     explanation:"D is correct. II.C.2 covers high-risk AI requirements — risk management, technical documentation, conformity assessments, and record keeping — all ongoing, not one-time certifications. A is wrong — high-risk AI requires continuous post-market monitoring. B (quarterly public benchmarks) is not an Act requirement. C (annual retraining) is a design choice, not a legal obligation.",
     bokRef:"II.C.2 — Understand the key requirements around risk management, data governance, technical documentation, conformity/impact assessments and record keeping."},

    {id:"DII-IIC-022",comp:"II.C",isRetrieval:false,
     stem:"Under the EU AI Act, a high-risk AI used in border control biometric identification must allow humans to override its output. A border control agency argues this is operationally impractical during peak hours and wants to run it fully autonomously. What is the correct governance response?",
     options:{A:"Human oversight is a mandatory requirement for high-risk AI — operational inconvenience does not create an exemption, and the agency must redesign the workflow to maintain human review capability",B:"The agency may apply for a temporary waiver from the national supervisory authority during peak periods",C:"The Act permits autonomous operation of biometric systems in border control if the system exceeds a specified accuracy threshold",D:"Human oversight is required only for decisions involving detention — identification alone can be automated"},
     correct:"A",
     explanation:"A is correct. II.C.3 requires human oversight for high-risk AI — a hard requirement, not a best practice. Operational inconvenience is not a recognized exemption. B — waivers are not provided for this purpose. C is wrong — accuracy thresholds do not replace the human oversight requirement. D misreads the Act — biometric identification is subject to oversight requirements independently.",
     bokRef:"II.C.3 — Understand the key requirements around human oversight, transparency and notification, and quality management."},

    {id:"DII-IIC-023",comp:"II.C",isRetrieval:false,
     stem:"A government official asks whether the OECD AI Principles require her country to enact specific AI legislation to comply. What is the accurate answer?",
     options:{A:"Yes — OECD membership creates a binding legal obligation to transpose the principles into national law within two years",B:"No — the OECD AI Principles are non-binding soft law representing a political commitment by endorsing governments, not an enforceable legal obligation",C:"Yes — the OECD principles have direct legal effect in EU member states because the EU endorsed them through the AI Act",D:"No — the OECD AI Principles apply only to private sector AI developers, not to government policy"},
     correct:"B",
     explanation:"B is correct. II.D.1 covers the OECD principles, which are non-binding soft law. Endorsing governments make a political commitment but face no enforceable obligation to enact legislation. A overstates OECD authority. C is wrong — OECD endorsement did not give principles direct EU legal effect. D is wrong — OECD principles apply across sectors including public authorities.",
     bokRef:"II.D.1 — Understand the Organisation for Economic Co-operation and Development (OECD) principles, framework, policies and recommended practices for trustworthy AI."},

    {id:"DII-IIC-024",comp:"II.C",isRetrieval:false,
     stem:"A company wants to demonstrate to enterprise clients that it has a rigorous, independently verifiable AI management system. Which standard is most suitable, and why?",
     options:{A:"ISO 22989 — it provides authoritative definitions for AI terms used in contracts and procurement",B:"NIST AI RMF — it is a structured risk management framework that can be independently assessed",C:"OECD AI Principles — they represent international consensus that satisfies enterprise due diligence",D:"ISO 42001 — it is a certifiable AI management system standard enabling third-party audit and certification, analogous to ISO 27001 for information security"},
     correct:"D",
     explanation:"D is correct. II.D.3 covers ISO AI standards. ISO 42001 is the only option certifiable by an accredited body. ISO 22989 (A) is a terminology standard. NIST AI RMF (B) is voluntary with no international certification pathway. OECD principles (C) are non-binding with no verification mechanism.",
     bokRef:"II.D.3 — Understand the core ISO AI standards (i.e., 22989, 42001 and 42005)."},

    {id:"DII-IIC-025",comp:"II.C",isRetrieval:false,
     stem:"A US software company sells an AI-powered HR screening tool to a French company that uses it to filter job applications from EU residents. The US company has no EU presence. Which party most likely bears primary provider obligations under the EU AI Act?",
     options:{A:"The US company — it developed the system and is responsible for its design",B:"Neither party — the Act does not apply to US-developed software used in the EU if the developer has no EU establishment",C:"The French company — if it places the system into service in the EU and the US provider has no EU representative, the deployer may assume deemed provider obligations",D:"The EU AI Office — it is responsible for compliance when no EU-based provider exists"},
     correct:"C",
     explanation:"C is correct. II.C.6 covers organizational context obligations. Where a provider is outside the EU with no EU representative, a deployer putting the system into service may assume provider-equivalent obligations. A is wrong — the Act applies based on market placement, not origin. B is wrong — the Act explicitly applies to systems used in the EU. D is wrong — the EU AI Office is a supervisory body.",
     bokRef:"II.C.6 — Understand the differences in requirements based on organizational context (e.g., providers, deployers, importers and distributors)."},

    {id:"DII-IIC-R01",comp:"II.C",isRetrieval:true,
     stem:"[RETRIEVAL — II.C.1] A city government deploys an AI that scores citizens on civic behaviour — traffic compliance, social media posts, tax payment history — and uses scores to restrict access to public services, licenses, and education. Under the EU AI Act, how must this practice be classified?",
     options:{A:"Prohibited — government social scoring that causes detrimental treatment of persons based on social behaviour is explicitly prohibited regardless of system accuracy",B:"High risk — social scoring by public authorities is classified as high risk and subject to conformity assessment",C:"Limited risk — the system must disclose that decisions are AI-assisted but may continue operating",D:"Minimal risk — government scoring systems using objective behavioural criteria fall outside the Act's risk tiers"},
     correct:"A",
     explanation:"A is correct. II.C.1 covers risk classification. Social scoring by public authorities leading to detrimental treatment is explicitly prohibited. It is not subject to a conformity assessment (B) — prohibition is a complete ban with no compliance pathway. Limited risk (C) and minimal risk (D) apply to non-prohibited systems only.",
     bokRef:"II.C.1 — Understand the risk classification framework for AI (e.g., prohibited/high/limited/minimal risk) and what systems/uses fall into each category."},

    {id:"DII-IIC-R02",comp:"II.C",isRetrieval:true,
     stem:"[RETRIEVAL — II.C.1] An online retailer deploys an AI chatbot for customer complaints. The chatbot is designed to appear human and does not identify itself as AI. Under the EU AI Act's risk classification, which tier applies and what obligation does it create?",
     options:{A:"High risk — chatbots handling financial transactions require conformity assessment and human oversight",B:"Limited risk — chatbots intended to interact with humans must disclose their AI nature; failure to disclose is a violation of this tier's transparency obligation",C:"Minimal risk — customer service chatbots are explicitly excluded from the Act's risk tiers",D:"Prohibited — AI systems that can deceive users into thinking they are human are banned under the Act"},
     correct:"B",
     explanation:"B is correct. II.C.1 classifies AI chatbots as limited risk, triggering a specific transparency obligation: the user must be informed they are interacting with an AI system. A (high risk) applies to specific Annex-listed sectors; general customer service is not listed. C is wrong — chatbots are within the limited-risk tier. D overstates — the Act bans subliminal manipulation, not all AI impersonation; the chatbot obligation is limited-risk, not prohibited.",
     bokRef:"II.C.1 — Understand the risk classification framework for AI (e.g., prohibited/high/limited/minimal risk) and what systems/uses fall into each category."},
