<title>AIGP Quiz — Day 2 · I.B Governance Structures</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #1a5c3a;
    --accent-light: #e8f5ee;
    --accent-mid: #2d7a52;
    --text: #1a1a1a;
    --text-mid: #4a4a4a;
    --text-light: #6b6b6b;
    --border: #e0e0e0;
    --bg: #ffffff;
    --bg-alt: #f8f8f8;
    --correct: #1a7a3a;
    --correct-bg: #e8f5ee;
    --incorrect: #7a1a1a;
    --incorrect-bg: #fceae8;
    --selected: #1a4a7a;
    --selected-bg: #e8f0f8;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.65;
    color: var(--text);
    background: #f2f2f2;
    min-height: 100vh;
  }
  .app-frame {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 0 80px;
  }

  /* ---- Top bar ---- */
  .top-bar {
    background: var(--accent);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .top-bar .quiz-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .top-bar .session-id {
    font-family: var(--font-mono);
    font-size: 10px;
    opacity: 0.7;
    letter-spacing: 0.04em;
  }

  /* ---- Progress bar ---- */
  .progress-wrap {
    background: rgba(255,255,255,0.2);
    height: 4px;
  }
  .progress-fill {
    height: 4px;
    background: #ffffff;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* ---- Question card ---- */
  .question-card {
    background: var(--bg);
    margin: 20px 16px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .q-header {
    padding: 14px 20px;
    background: var(--bg-alt);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .q-counter {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-light);
    font-weight: 500;
  }
  .q-chips {
    display: flex;
    gap: 6px;
  }
  .chip {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 3px;
    letter-spacing: 0.04em;
  }
  .chip.domain { background: var(--accent-light); color: var(--accent); }
  .chip.retrieval { background: #fff3cd; color: #7a5c00; }
  .chip.tricky { background: #fceae8; color: #7a1a1a; }

  .q-body { padding: 20px; }
  .q-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 20px;
  }

  /* ---- Options ---- */
  .options { display: grid; gap: 10px; }
  .option {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 13px 16px;
    border: 2px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--bg);
  }
  .option:hover { border-color: #aaaaaa; background: var(--bg-alt); }
  .option.selected {
    border-color: var(--selected);
    background: var(--selected-bg);
  }
  .option.correct-ans {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .option.wrong-ans {
    border-color: var(--incorrect);
    background: var(--incorrect-bg);
  }
  .option.disabled { cursor: default; pointer-events: none; }
  .opt-letter {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-light);
    padding-top: 2px;
    min-width: 20px;
  }
  .option.selected .opt-letter { color: var(--selected); }
  .option.correct-ans .opt-letter { color: var(--correct); }
  .option.wrong-ans .opt-letter { color: var(--incorrect); }
  .opt-text { font-size: 14px; line-height: 1.6; }

  /* ---- Navigation ---- */
  .q-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .btn {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary {
    background: var(--accent);
    color: #ffffff;
  }
  .btn-primary:hover:not(:disabled) { background: var(--accent-mid); }
  .btn-secondary {
    background: var(--bg-alt);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover:not(:disabled) { background: #eeeeee; }
  .btn-submit {
    background: #1a4a7a;
    color: #ffffff;
  }
  .btn-submit:hover:not(:disabled) { background: #153a62; }

  /* ---- Results screen ---- */
  .results-screen {
    display: none;
  }
  .results-header {
    background: var(--accent);
    color: #fff;
    padding: 32px 24px;
    text-align: center;
  }
  .results-header h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .score-pct {
    font-size: 52px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 8px;
  }
  .score-sub {
    font-size: 14px;
    opacity: 0.85;
  }
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 16px;
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-size: 24px;
    font-weight: 700;
    display: block;
  }
  .stat-label {
    font-size: 12px;
    opacity: 0.75;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* ---- Review section ---- */
  .review-section {
    padding: 16px;
  }
  .review-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-light);
    padding: 8px 4px 12px;
  }
  .review-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .review-item-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
  }
  .review-item-header:hover { background: var(--bg-alt); }
  .result-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-correct { background: var(--correct); }
  .dot-incorrect { background: var(--incorrect); }
  .dot-skipped { background: #aaaaaa; }
  .review-q-text {
    font-size: 13px;
    color: var(--text-mid);
    flex: 1;
    line-height: 1.5;
  }
  .review-chevron {
    font-size: 11px;
    color: var(--text-light);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .review-body {
    display: none;
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg-alt);
  }
  .review-body.open { display: block; }
  .answer-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 13px;
  }
  .answer-label {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
    align-self: flex-start;
    margin-top: 1px;
  }
  .your-correct { background: var(--correct-bg); color: var(--correct); }
  .your-incorrect { background: var(--incorrect-bg); color: var(--incorrect); }
  .correct-label { background: var(--correct-bg); color: var(--correct); }
  .explanation {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text-mid);
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .bok-tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--accent);
    color: #fff;
    padding: 2px 8px;
    border-radius: 3px;
    margin-top: 8px;
  }
  .tricky-flag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 10px;
    background: #fceae8;
    color: #7a1a1a;
    padding: 2px 8px;
    border-radius: 3px;
    margin-left: 6px;
  }

  /* ---- Save confirmation ---- */
  .save-confirm {
    margin: 16px;
    padding: 14px 16px;
    background: var(--accent-light);
    border: 1px solid #b8d9c8;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    line-height: 1.7;
  }
  .save-confirm .save-title {
    font-weight: 500;
    margin-bottom: 4px;
  }
  .results-actions {
    margin: 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
</style>

<script>
// ---- Session ID ----
const SESSION_ID = 'S' + Date.now();
document.getElementById('sessionIdDisplay').textContent = SESSION_ID;

// ---- Quiz Data ----
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbyCG5oTGoPsjE9ytN3NJbsAv45GO0_uxb5gjXL7K8trVSiOfG05tQ0LV3wnjtuj7Bir/exec';

const questions = [
  {
    id: 'DI-IB-001',
    comp: 'I.B',
    isRetrieval: false,
    text: 'FinServ Corp has AI systems deployed across eight business units. Each BU has developed its own AI policies independently over three years. The enterprise risk committee notes that governance quality varies widely and a regulatory audit is expected. Which governance model should the AI Governance Lead recommend, and why?',
    options: [
      'Centralized model — consolidate all governance authority into a single AI office to ensure consistency across all business units.',
      'Decentralized model — retain BU autonomy since they understand their own AI systems better than any central function.',
      'Federated model — establish enterprise-wide standards and risk frameworks centrally while BUs retain implementation accountability.',
      'Outsource the governance function to a third-party AI risk consultant to bring immediate external expertise.'
    ],
    correct: 'C',
    explanation: 'The federated model is correct because it addresses the core problem — inconsistent governance — without creating a bottleneck that would impede eight active BU programs. A centralized model would create governance delays across a large, established organization (I.B-4). The decentralized model perpetuates the very inconsistency the regulator will scrutinize. Outsourcing governance does not discharge the organization\'s accountability — accountability cannot be delegated to a vendor. The federated model enables consistent enterprise standards (second-line function) with BU-level ownership and compliance accountability (first-line). This is the recommended default structure for large, complex organizations.',
    bok: 'I.B — 4: Governance models'
  },
  {
    id: 'DI-IB-002',
    comp: 'I.B',
    isRetrieval: false,
    text: 'A bank\'s AI governance committee is reviewing a new credit-scoring model. The committee chair notes that the model was approved quickly because the data science team was not challenged by anyone with risk management authority. Which gap in the governance structure does this most directly illustrate?',
    options: [
      'Absence of a Chief AI Officer with executive accountability for AI strategy.',
      'Lack of a second-line governance function with standing to challenge first-line AI teams.',
      'Insufficient documentation of the model in the AI inventory.',
      'Failure to notify the data protection authority before deploying the model.'
    ],
    correct: 'B',
    explanation: 'The three lines of defense model requires a distinct second line — risk, compliance, and AI governance — that can independently challenge first-line technology and business decisions. The scenario describes a first-line team (data science) that was not challenged, meaning the second line either did not exist, lacked authority, or was absent from the review process (I.B-2). Option A is plausible but a CAIO is an executive accountability role, not an operational control on individual model approvals. Option C (inventory documentation) is a record-keeping gap, not the cause of unchallenged approval. Option D (DPA notification) is only relevant if the model processes personal data in a way that triggers mandatory notification, which is not stated in the scenario.',
    bok: 'I.B — 2: Integration with existing governance (three lines of defense)'
  },
  {
    id: 'DI-IB-003',
    comp: 'I.B',
    isRetrieval: false,
    text: 'An organization\'s AI Review Committee has five members: the Head of Technology, two business unit representatives whose AI systems are being reviewed, the General Counsel, and the Chief Data Officer. A whistleblower raises concern that committee approvals consistently favour the BUs being reviewed. What is the most significant structural defect in this committee?',
    options: [
      'The committee has too many members; it should be limited to three to ensure efficient decision-making.',
      'The General Counsel should not sit on a committee making AI deployment decisions.',
      'Business unit representatives whose own AI systems are under review create a conflict of interest that undermines the committee\'s independence.',
      'The committee lacks a Chief AI Officer and therefore has no executive accountability for decisions.'
    ],
    correct: 'C',
    explanation: 'A legitimate AI ethics board requires independence — members who review AI systems should not be the same people who own or benefit from those systems. Having BU representatives vote on approvals for their own AI creates a structural conflict of interest that nullifies the oversight purpose of the committee (I.B-3). The committee exists precisely to be an independent check on BU deployments. Option A is incorrect — committee size is not the issue identified. Option B is incorrect — legal counsel is a standard and valuable committee member. Option D may be true but misses the specific defect described in the scenario: the conflict of interest is the primary governance failure here.',
    bok: 'I.B — 3: AI ethics board composition and independence'
  },
  {
    id: 'DI-IB-004',
    comp: 'I.B',
    isRetrieval: false,
    text: 'An insurance company\'s legal team has drafted an "AI Ethics Guideline" recommending that high-risk models undergo bias testing before deployment. Six months later, audit finds that three high-risk models were deployed without bias testing. When legal is asked why, they say the document was advisory. Which level of the policy hierarchy should this requirement have been placed in to create a compliance obligation?',
    options: [
      'A policy document, since policies are the highest-authority documents and carry board-level approval.',
      'A standard, since standards translate policy into specific mandatory requirements with defined testing thresholds.',
      'A procedure, since procedures provide the step-by-step instructions for carrying out the testing.',
      'Guidelines are sufficient — the issue is enforcement, not document classification.'
    ],
    correct: 'B',
    explanation: 'The bias testing requirement is a specific, technical, mandatory requirement — which is the definition of a standard (I.B-6). A policy sets high-level intent ("we will manage AI bias responsibly") but does not specify a testing obligation for a particular risk tier. A standard would state: "All systems classified high-risk must complete bias testing per [methodology] before deployment." A procedure would describe how to execute that testing. Guidelines are non-mandatory by definition, so placing a compliance-critical control at the guideline level creates exactly the gap described. The correct answer is B — the requirement should be a standard, which is mandatory and enforceable.',
    bok: 'I.B — 6: Policy hierarchy — standards are mandatory'
  },
  {
    id: 'DI-IB-005',
    comp: 'I.B',
    isRetrieval: false,
    text: 'A retailer deploys a third-party AI recommendation engine developed by an external vendor. When the AI produces recommendations later found to be discriminatory, the retailer\'s Head of Technology states that liability rests with the vendor who built the model. As an AI governance professional advising the retailer\'s board, what is the most accurate position to take?',
    options: [
      'The Head of Technology is correct — the vendor warrants the model and bears primary accountability for its outputs.',
      'Accountability for AI outcomes remains with the deploying organization regardless of whether the model was developed externally.',
      'Accountability depends on the specific terms of the vendor contract and can be fully transferred via indemnification clauses.',
      'The regulatory authority will determine accountability case by case, so the board need not take a position at this stage.'
    ],
    correct: 'B',
    explanation: 'AI governance frameworks consistently place accountability with the deploying organization. The retailer chose to deploy this AI system, presented its outputs to customers, and is responsible for the consequences of that deployment — regardless of who wrote the underlying model (I.B-7, I.B-5). Third-party vendors are stakeholders in the governance supply chain, subject to due diligence and contractual obligations, but they cannot accept the deployer\'s accountability. Option C is a common misconception: contractual indemnification may shift financial liability between parties but does not satisfy regulatory accountability to affected individuals or supervisory authorities. Option D is incorrect — the board has a governance obligation to take a position, not to wait for regulators.',
    bok: 'I.B — 5, I.B — 7: Accountability and third-party vendor governance'
  },
  {
    id: 'DI-IB-006',
    comp: 'I.B',
    isRetrieval: false,
    text: 'A technology company wants to establish its first formal AI governance function. The CTO proposes that the AI development team own and enforce AI governance, since they best understand the systems. The General Counsel pushes back. What principle best supports the General Counsel\'s concern?',
    options: [
      'The AI development team lacks the legal knowledge required to enforce governance policies.',
      'Governance enforcement by the same function that builds AI systems creates a conflict of interest — the three lines of defense require governance to sit independently of the systems it oversees.',
      'AI governance should be outsourced to avoid the perception of bias.',
      'The CTO is not sufficiently senior to own governance decisions that require board-level accountability.'
    ],
    correct: 'B',
    explanation: 'The three lines of defense model is explicit: the second line (governance, risk, compliance) must be independent of the first line (business and technology operations). Asking the AI development team to govern its own systems collapses the first and second lines together, eliminating independent oversight (I.B-2). This is not primarily a legal expertise issue (Option A) — it is a structural independence problem. The General Counsel\'s concern is principled: governance must have standing to challenge, reject, or require modification of AI systems without being subject to pressure from the teams whose work they are reviewing. Option C is unnecessary since the independence problem can be solved internally. Option D misreads the issue — seniority is not the core concern, independence is.',
    bok: 'I.B — 2: Three lines of defense — independence of second line'
  },
  {
    id: 'DI-IB-007',
    comp: 'I.B',
    isRetrieval: false,
    text: 'A healthcare organization is designing its AI governance structure. The DPO insists she should own the AI governance function. The Chief Risk Officer argues the AI governance function should sit under enterprise risk management. Which assignment best reflects the AIGP BOK\'s framing of these roles?',
    options: [
      'The DPO should own AI governance because GDPR imposes personal data obligations across all AI that processes health information.',
      'The CRO should own AI governance because AI risk is a subset of enterprise risk and must be managed within the ERM framework.',
      'AI governance should be a dedicated function (CAIO or equivalent) that collaborates with both the DPO and CRO, drawing on each within their domains.',
      'AI governance ownership should be decided by the regulator supervising the healthcare sector, not internally determined.'
    ],
    correct: 'C',
    explanation: 'The BOK treats AI governance as a cross-functional discipline that integrates with — but is not subordinated to — existing functions (I.B-1, I.B-2). The DPO\'s role in AI governance is scoped to personal data processing obligations; it does not cover the full scope of responsible AI (bias, safety, transparency, lifecycle management). The CRO\'s role addresses AI risk integration into ERM, but AI governance also encompasses ethics, policy, and stakeholder accountability that extend beyond risk quantification. A dedicated AI governance function — accountable to the CAIO or equivalent — collaborates with both the DPO and CRO on their respective domains. Neither function should subsume AI governance. Option D is incorrect — organizations are expected to design their own governance structures within regulatory parameters.',
    bok: 'I.B — 1, I.B — 2: Role differentiation and governance integration'
  },
  {
    id: 'DI-IB-008',
    comp: 'I.B',
    isRetrieval: false,
    text: 'During a governance audit, reviewers find that when AI system issues escalate from BU owners to the AI governance team, the process stops there — no escalation path exists to executive leadership or the board. What governance control is missing?',
    options: [
      'A RACI matrix defining who is Responsible and Accountable for each AI system.',
      'An escalation mechanism that routes unresolved AI governance issues to executive leadership and, where necessary, the board.',
      'A documented AI inventory listing all systems and their risk classifications.',
      'A training programme ensuring BU owners understand how to operate the escalation process.'
    ],
    correct: 'B',
    explanation: 'An escalation mechanism is a core accountability structure requirement (I.B-5). Without it, AI governance issues can be blocked at the second line (governance team) without reaching the executive or board stakeholders who bear ultimate accountability and have authority to mandate resolution. The RACI matrix (Option A) defines role assignments but is a different control — it would tell you who owns decisions, not whether they can be escalated upward. Option C (AI inventory) is a good governance practice but is not the specific gap described. Option D (training) is an enabling activity but does not address the structural absence of an escalation path. The audit finding specifically identifies a structural gap in the accountability chain, not a documentation or training issue.',
    bok: 'I.B — 5: Accountability frameworks and escalation mechanisms'
  },
  {
    id: 'DI-IB-009',
    comp: 'I.B',
    isRetrieval: false,
    text: 'A government agency has built an AI system that assesses welfare benefit eligibility. The AI governance team identifies key stakeholders but focuses almost entirely on internal stakeholders. Which critical external stakeholder group is most likely being overlooked, and what is the governance implication?',
    options: [
      'External AI vendors who supplied components — their contracts need to be reviewed for liability provisions.',
      'Affected individuals — the benefit claimants whose eligibility decisions are made by the AI — whose rights and legitimate interests must be considered in governance design.',
      'Peer government agencies who could be affected by public perception of AI use in government.',
      'External technology auditors who should be engaged before the system goes live.'
    ],
    correct: 'B',

// ---- State ----
let currentIdx = 0;
let userAnswers = []; // {idx, selected, skipped}
let sessionComplete = false;

// ---- Init ----
function init() {
  for (let i = 0; i < questions.length; i++) {
    userAnswers.push({ idx: i, selected: null, skipped: false });
  }
  renderQuestion(0);
}

// ---- Render question ----
function renderQuestion(idx) {
  const q = questions[idx];
  const total = questions.length;

  // Progress
  document.getElementById('progressBar').style.width = ((idx / total) * 100) + '%';

  // Counter
  document.getElementById('qCounter').textContent = 'Q' + (idx + 1) + ' of ' + total;

  // Chips
  const chips = document.getElementById('qChips');
  chips.innerHTML = '';
  const domainChip = document.createElement('span');
  domainChip.className = 'chip domain';
  domainChip.textContent = q.comp;
  chips.appendChild(domainChip);

  if (q.isRetrieval) {
    const rChip = document.createElement('span');
    rChip.className = 'chip retrieval';
    rChip.textContent = 'Retrieval';
    chips.appendChild(rChip);
  }

  // Check if tricky
  const history = getHistory();
  const missCount = getTrickyCount(history, q.id);
  if (missCount >= 2) {
    const tChip = document.createElement('span');
    tChip.className = 'chip tricky';
    tChip.textContent = '⚑ Tricky';
    chips.appendChild(tChip);
  }

  // Question text
  document.getElementById('qText').textContent = q.text;

  // Options
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.dataset.letter = letters[i];
    div.innerHTML = '<span class="opt-letter">' + letters[i] + '</span><span class="opt-text">' + opt + '</span>';
    div.addEventListener('click', () => selectOption(div, letters[i], idx));
    container.appendChild(div);
  });

  // Next/Submit button
  const btn = document.getElementById('nextBtn');
  btn.disabled = true;
  if (idx === total - 1) {
    btn.textContent = 'Submit & Review →';
    btn.className = 'btn btn-submit';
    btn.onclick = submitQuiz;
  } else {
    btn.textContent = 'Next →';
    btn.className = 'btn btn-primary';
    btn.onclick = nextQuestion;
  }

  // Restore prior selection if any
  const prior = userAnswers[idx];
  if (prior.selected) {
    const allOpts = container.querySelectorAll('.option');
    allOpts.forEach(o => {
      if (o.dataset.letter === prior.selected) o.classList.add('selected');
    });
    btn.disabled = false;
  }
}

// ---- Select option ----
function selectOption(el, letter, idx) {
  if (sessionComplete) return;
  const allOpts = document.querySelectorAll('.option');
  allOpts.forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  userAnswers[idx].selected = letter;
  document.getElementById('nextBtn').disabled = false;
}

// ---- Next question ----
function nextQuestion() {
  if (currentIdx < questions.length - 1) {
    currentIdx++;
    renderQuestion(currentIdx);
  }
}

// ---- Submit ----
function submitQuiz() {
  sessionComplete = true;
  const total = questions.length;
  let correct = 0, incorrect = 0, skipped = 0;

  userAnswers.forEach((a, i) => {
    if (!a.selected) { a.skipped = true; skipped++; }
    else if (a.selected === questions[i].correct) correct++;
    else incorrect++;
  });

  const score = Math.round((correct / total) * 100);

  // Update progress
  document.getElementById('progressBar').style.width = '100%';

  // Show results
  document.getElementById('quizScreen').style.display = 'none';
  const rs = document.getElementById('resultsScreen');
  rs.style.display = 'block';

  document.getElementById('scorePct').textContent = score + '%';
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statIncorrect').textContent = incorrect;
  document.getElementById('statSkipped').textContent = skipped;

  // Build review
  buildReview();

  // Save to localStorage and webhook
  saveSession(score, correct, incorrect, skipped);
}

// ---- Build review ----
function buildReview() {
  const container = document.getElementById('reviewContainer');
  container.innerHTML = '';

  questions.forEach((q, i) => {
    const ua = userAnswers[i];
    const isCorrect = ua.selected === q.correct;
    const isSkipped = !ua.selected;

    const item = document.createElement('div');
    item.className = 'review-item';

    const dotClass = isSkipped ? 'dot-skipped' : isCorrect ? 'dot-correct' : 'dot-incorrect';

    const header = document.createElement('div');
    header.className = 'review-item-header';
    header.innerHTML = `
      <div class="result-dot ${dotClass}"></div>
      <div class="review-q-text">Q${i+1}: ${q.text.substring(0,90)}…</div>
      <span class="review-chevron">▼</span>
    `;
    header.onclick = () => {
      const body = item.querySelector('.review-body');
      body.classList.toggle('open');
      const chev = header.querySelector('.review-chevron');
      chev.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : '';
    };

    const history = getHistory();
    const missCount = getTrickyCount(history, q.id);
    const trickyFlag = missCount >= 2 ? `<span class="tricky-flag">⚑ Tricky — missed ${missCount}x</span>` : '';

    let answerHTML = '';
    if (isSkipped) {
      answerHTML = `<div class="answer-row"><span class="answer-label your-incorrect">Skipped</span><span>—</span></div>`;
    } else {
      const yourClass = isCorrect ? 'your-correct' : 'your-incorrect';
      const yourLabel = isCorrect ? 'Your answer ✓' : 'Your answer ✗';
      answerHTML = `<div class="answer-row"><span class="answer-label ${yourClass}">${yourLabel}</span><span>${ua.selected}: ${q.options['ABCD'.indexOf(ua.selected)]}</span></div>`;
      if (!isCorrect) {
        answerHTML += `<div class="answer-row"><span class="answer-label correct-label">Correct</span><span>${q.correct}: ${q.options['ABCD'.indexOf(q.correct)]}</span></div>`;
      }
    }

    const body = document.createElement('div');
    body.className = 'review-body';
    body.innerHTML = `
      ${answerHTML}
      <div class="explanation">${q.explanation}${trickyFlag}<br><span class="bok-tag">${q.bok}</span></div>
    `;

    item.appendChild(header);
    item.appendChild(body);
    container.appendChild(item);
  });
}

// ---- Save session ----
function saveSession(score, correct, incorrect, skipped) {
  const total = questions.length;
  const ts = new Date().toISOString();

  const sessionData = {
    sessionId: SESSION_ID,
    title: 'AIGP Quiz — Day 2 · Competency I.B',
    week: 1,
    day: 2,
    filename: 'AIGP_290526_Day2_Governance-Structures_Quiz.html',
    ts: ts,
    score: score,
    correct: correct,
    incorrect: incorrect,
    total: total,
    skipped: skipped,
    questions: userAnswers.map((a, i) => ({
      id: questions[i].id,
      day: 2,
      week: 1,
      domain: 'Domain I',
      comp: questions[i].comp,
      isRetrieval: questions[i].isRetrieval,
      correct: a.selected === questions[i].correct,
      skipped: a.skipped,
      userAns: a.selected || null,
      correctAns: questions[i].correct,
      qText: questions[i].text.substring(0, 80)
    }))
  };

  // Save to localStorage
  let history = [];
  try { history = JSON.parse(localStorage.getItem('aigp_quiz_history') || '[]'); } catch(e) {}
  history.push(sessionData);
  localStorage.setItem('aigp_quiz_history', JSON.stringify(history));

  const attemptNum = history.length;

  // Show confirmation
  document.getElementById('saveDetails').innerHTML =
    'Session: ' + SESSION_ID + '<br>' +
    'Attempt: #' + attemptNum + '<br>' +
    'Saved: ' + new Date(ts).toLocaleString('en-SG', {timeZone: 'Asia/Singapore'}) + ' SGT';

  // Send to webhook
  fetch(WEBHOOK_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(sessionData)
  }).then(() => {
    document.getElementById('saveConfirm').innerHTML =
      '<div class="save-title">✓ Results saved — Google Sheets updated</div>' +
      '<div id="saveDetails">Session: ' + SESSION_ID + '<br>Attempt: #' + attemptNum + '<br>Saved: ' + new Date(ts).toLocaleString('en-SG', {timeZone: 'Asia/Singapore'}) + ' SGT</div>';
  }).catch(() => {
    document.getElementById('saveConfirm').innerHTML =
      '<div class="save-title">✓ Results saved to localStorage</div>' +
      '<div id="saveDetails">Session: ' + SESSION_ID + '<br>Attempt: #' + attemptNum + '<br>Google Sheets will sync on next connection.</div>';
  });
}

// ---- History helpers ----
function getHistory() {
  try { return JSON.parse(localStorage.getItem('aigp_quiz_history') || '[]'); } catch(e) { return []; }
}

function getTrickyCount(history, questionId) {
  let count = 0;
  history.forEach(session => {
    if (!session.questions) return;
    session.questions.forEach(q => {
      if (q.id === questionId && q.correct === false && !q.skipped) count++;
    });
  });
  return count;
}

// ---- Export ----
function exportHistory() {
  const history = getHistory();
  const blob = new Blob([JSON.stringify(history, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'aigp_quiz_history_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ---- Start ----
init();
</script>
