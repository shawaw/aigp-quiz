<style>
  :root {
    --accent: #1a5c3a;
    --accent-light: #e8f5ee;

    --correct: #1a7a3a;

  * { box-sizing: border-box; margin: 0; padding: 0; }

    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.65;
    color: var(--text);

  .top-bar .quiz-title { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; }

  .progress-wrap { background: rgba(255,255,255,0.2); height: 4px; }
  .progress-fill { height: 4px; background: #ffffff; transition: width 0.3s ease; width: 0%; }
  .question-card { background: var(--bg); margin: 20px 16px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .q-header { padding: 14px 20px; background: var(--bg-alt); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }

  .q-chips { display: flex; gap: 6px; }

  .chip.domain { background: var(--accent-light); color: var(--accent); }
  .chip.retrieval { background: #fff3cd; color: #7a5c00; }
  .chip.tricky { background: #fceae8; color: #7a1a1a; }

  .option { display: flex; gap: 12px; align-items: flex-start; padding: 13px 16px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; transition: border-color 0.15s, background 0.15s; background: var(--bg); }
  .option:hover { border-color: #aaaaaa; background: var(--bg-alt); }
  .option.selected { border-color: var(--selected); background: var(--selected-bg); }
  .option.correct-ans { border-color: var(--correct); background: var(--correct-bg); }
  .option.wrong-ans { border-color: var(--incorrect); background: var(--incorrect-bg); }

  .option.correct-ans .opt-letter { color: var(--correct); }
  .option.wrong-ans .opt-letter { color: var(--incorrect); }
  .opt-text { font-size: 14px; line-height: 1.6; }
  .q-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
  .btn { font-family: var(--font-body); font-size: 14px; font-weight: 600; padding: 10px 22px; border-radius: 6px; border: none; cursor: pointer; transition: opacity 0.15s; }

  .btn-secondary { background: var(--bg-alt); color: var(--text); border: 1px solid var(--border); }

  .results-screen { display: none; }
  .results-header { background: var(--accent); color: #fff; padding: 32px 24px; text-align: center; }
  .results-header h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .score-pct { font-size: 52px; font-weight: 700; line-height: 1; margin-bottom: 8px; }

  .stats-row { display: flex; justify-content: center; gap: 24px; margin-top: 16px; }

  .review-section { padding: 16px; }
  .review-title { font-size: 13px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-light); padding: 8px 4px 12px; }
  .review-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
  .review-item-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; user-select: none; }
  .review-item-header:hover { background: var(--bg-alt); }
  .result-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-correct { background: var(--correct); }
  .dot-incorrect { background: var(--incorrect); }
  .dot-skipped { background: #aaaaaa; }
  .review-q-text { font-size: 13px; color: var(--text-mid); flex: 1; line-height: 1.5; }
  .review-chevron { font-size: 11px; color: var(--text-light); transition: transform 0.2s; flex-shrink: 0; }
  .review-body { display: none; padding: 14px 16px; border-top: 1px solid var(--border); background: var(--bg-alt); }
  .review-body.open { display: block; }
  .answer-row { display: flex; gap: 10px; margin-bottom: 10px; font-size: 13px; }
  .answer-label { font-family: var(--font-mono); font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 3px; white-space: nowrap; align-self: flex-start; margin-top: 1px; }
  .your-correct { background: var(--correct-bg); color: var(--correct); }
  .your-incorrect { background: var(--incorrect-bg); color: var(--incorrect); }
  .correct-label { background: var(--correct-bg); color: var(--correct); }
  .explanation { font-size: 13px; line-height: 1.65; color: var(--text-mid); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .bok-tag { display: inline-block; font-family: var(--font-mono); font-size: 10px; background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 3px; margin-top: 8px; }
  .tricky-flag { display: inline-block; font-family: var(--font-mono); font-size: 10px; background: #fceae8; color: #7a1a1a; padding: 2px 8px; border-radius: 3px; margin-left: 6px; }
  .save-confirm { margin: 16px; padding: 14px 16px; background: var(--accent-light); border: 1px solid #b8d9c8; border-radius: 8px; font-family: var(--font-mono); font-size: 12px; color: var(--accent); line-height: 1.7; }
  .save-confirm .save-title { font-weight: 500; margin-bottom: 4px; }
  .results-actions { margin: 16px; display: flex; gap: 10px; flex-wrap: wrap; }

<script>
const SESSION_ID = 'S' + Date.now();
document.getElementById('sessionIdDisplay').textContent = SESSION_ID;
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbyCG5oTGoPsjE9ytN3NJbsAv45GO0_uxb5gjXL7K8trVSiOfG05tQ0LV3wnjtuj7Bir/exec';
const questions = [
  { id:'DI-IB-001', comp:'I.B', isRetrieval:false, text:'FinServ Corp has AI systems deployed across eight business units. Each BU has developed its own AI policies independently over three years. The enterprise risk committee notes that governance quality varies widely and a regulatory audit is expected. Which governance model should the AI Governance Lead recommend, and why?', options:['Centralized model — consolidate all governance authority into a single AI office to ensure consistency across all business units.','Decentralized model — retain BU autonomy since they understand their own AI systems better than any central function.','Federated model — establish enterprise-wide standards and risk frameworks centrally while BUs retain implementation accountability.','Outsource the governance function to a third-party AI risk consultant to bring immediate external expertise.'], correct:'C', explanation:'The federated model addresses the core problem — inconsistent governance — without creating a bottleneck across eight active BU programs. Centralized creates delays at scale (I.B-4). Decentralized perpetuates the inconsistency regulators will scrutinize. Outsourcing does not discharge accountability — it cannot be delegated to a vendor. The federated model enables consistent enterprise standards (second line) with BU-level ownership (first line). This is the recommended default for large, complex organizations.', bok:'I.B-4: Governance models' },
  { id:'DI-IB-002', comp:'I.B', isRetrieval:false, text:'A bank\'s AI governance committee is reviewing a new credit-scoring model. The committee chair notes that the model was approved quickly because the data science team was not challenged by anyone with risk management authority. Which gap in the governance structure does this most directly illustrate?', options:['Absence of a Chief AI Officer with executive accountability for AI strategy.','Lack of a second-line governance function with standing to challenge first-line AI teams.','Insufficient documentation of the model in the AI inventory.','Failure to notify the data protection authority before deploying the model.'], correct:'B', explanation:'The three lines of defense requires a distinct second line — risk, compliance, AI governance — that can independently challenge first-line technology decisions. The scenario shows a first-line team unchallenged, meaning the second line was absent or lacked authority (I.B-2). A CAIO (Option A) is an executive accountability role, not an operational control on model approvals. Option C is a record-keeping gap. Option D is only relevant if personal data processing triggers mandatory DPA notification, which is not stated.', bok:'I.B-2: Three lines of defense' },
  { id:'DI-IB-003', comp:'I.B', isRetrieval:false, text:'An organization\'s AI Review Committee has five members: the Head of Technology, two business unit representatives whose AI systems are being reviewed, the General Counsel, and the Chief Data Officer. A whistleblower raises concern that approvals consistently favour the BUs being reviewed. What is the most significant structural defect?', options:['The committee has too many members; it should be limited to three for efficiency.','The General Counsel should not sit on a committee making AI deployment decisions.','Business unit representatives whose own AI systems are under review create a conflict of interest that undermines the committee\'s independence.','The committee lacks a Chief AI Officer and therefore has no executive accountability for decisions.'], correct:'C', explanation:'A legitimate AI ethics board requires independence — reviewers must not own or benefit from the systems under review. BU representatives voting on approvals for their own AI creates a structural conflict of interest that nullifies oversight (I.B-3). Option A: committee size is not the identified issue. Option B: legal counsel is standard and valuable. Option D may be true but misses the specific defect — the conflict of interest is the primary governance failure.', bok:'I.B-3: AI ethics board independence' },
  { id:'DI-IB-004', comp:'I.B', isRetrieval:false, text:'An insurance company\'s legal team drafted an "AI Ethics Guideline" recommending high-risk models undergo bias testing before deployment. Six months later, audit finds three high-risk models were deployed without bias testing. Legal says the document was advisory. Which policy hierarchy level should this requirement have been placed in?', options:['A policy document — policies carry board-level approval and highest authority.','A standard — standards translate policy into specific mandatory requirements with defined thresholds.','A procedure — procedures provide step-by-step instructions for carrying out the testing.','Guidelines are sufficient — the issue is enforcement, not document classification.'], correct:'B', explanation:'A bias testing requirement is specific, technical, and mandatory — that is the definition of a standard (I.B-6). Policy sets intent ("we manage AI bias responsibly"). A standard mandates: "All high-risk systems must complete bias testing per [methodology] before deployment." A procedure describes how. Guidelines are non-mandatory by definition — placing a compliance-critical control at guideline level creates exactly this gap. Standards are mandatory and enforceable.', bok:'I.B-6: Standards in the policy hierarchy' },
  { id:'DI-IB-005', comp:'I.B', isRetrieval:false, text:'A retailer deploys a third-party AI recommendation engine. When it produces discriminatory recommendations, the Head of Technology says liability rests with the vendor who built the model. As an AI governance professional advising the board, what is the most accurate position?', options:['The Head of Technology is correct — the vendor warrants the model and bears primary accountability.','Accountability for AI outcomes remains with the deploying organization regardless of whether the model was built externally.','Accountability depends on contract terms and can be fully transferred via indemnification clauses.','The regulatory authority will determine accountability case by case, so no position is needed now.'], correct:'B', explanation:'AI governance frameworks place accountability with the deploying organization. The retailer chose to deploy this AI, presented its outputs to customers, and is responsible for the consequences — regardless of who wrote the model (I.B-5, I.B-7). Vendors are supply-chain stakeholders subject to due diligence and contracts, but they cannot accept the deployer\'s accountability. Option C: indemnification may shift financial liability but does not satisfy regulatory accountability to affected individuals. Option D: the board has a governance obligation to take a position.', bok:'I.B-5, I.B-7: Deployer accountability' },
  { id:'DI-IB-006', comp:'I.B', isRetrieval:false, text:'A technology company wants to establish its first AI governance function. The CTO proposes the AI development team should own and enforce AI governance since they best understand the systems. The General Counsel pushes back. What principle best supports the General Counsel?', options:['The AI development team lacks the legal knowledge required to enforce governance policies.','Governance enforcement by the function that builds AI systems creates a conflict — the three lines of defense require governance to sit independently of the systems it oversees.','AI governance should be outsourced to avoid the perception of bias.','The CTO is not sufficiently senior to own governance decisions requiring board-level accountability.'], correct:'B', explanation:'The three lines of defense is explicit: the second line (governance, risk, compliance) must be independent of the first line (business, technology). Asking developers to govern their own systems collapses first and second lines, eliminating oversight (I.B-2). This is not primarily a legal expertise issue (Option A) — it is a structural independence problem. Governance needs standing to challenge and reject AI systems without pressure from the teams it reviews. Option C: outsourcing is unnecessary; Option D: seniority is not the core issue.', bok:'I.B-2: Independence of second line' },
  { id:'DI-IB-007', comp:'I.B', isRetrieval:false, text:'A healthcare organization is designing its AI governance structure. The DPO insists she should own the AI governance function. The CRO argues AI governance should sit under enterprise risk management. Which assignment best reflects the AIGP BOK?', options:['The DPO should own AI governance because GDPR imposes personal data obligations across all health-data AI.','The CRO should own AI governance because AI risk is a subset of enterprise risk.','AI governance should be a dedicated function (CAIO or equivalent) that collaborates with both the DPO and CRO within their domains.','AI governance ownership should be decided by the sector regulator, not internally.'], correct:'C', explanation:'The BOK treats AI governance as a cross-functional discipline that integrates with but is not subordinated to existing functions (I.B-1, I.B-2). The DPO\'s scope is personal data processing — it does not cover full responsible AI (bias, safety, transparency, lifecycle). The CRO addresses AI risk integration into ERM but governance also encompasses ethics, policy, and stakeholder accountability beyond risk quantification. A dedicated AI governance function collaborates with both. Neither should subsume it. Option D incorrectly defers an internal governance design decision to regulators.', bok:'I.B-1, I.B-2: Role differentiation' },
  { id:'DI-IB-008', comp:'I.B', isRetrieval:false, text:'A governance audit finds that when AI system issues escalate from BU owners to the AI governance team, the process stops there — no escalation path exists to executive leadership or the board. What governance control is missing?', options:['A RACI matrix defining who is Responsible and Accountable for each AI system.','An escalation mechanism that routes unresolved governance issues to executive leadership and, where necessary, the board.','A documented AI inventory listing all systems and their risk classifications.','A training programme ensuring BU owners understand how to operate the escalation process.'], correct:'B', explanation:'An escalation mechanism is a core accountability structure requirement (I.B-5). Without it, AI governance issues can stall at the second line without reaching executive or board stakeholders who have authority to mandate resolution. Option A (RACI) defines role assignments but not whether issues can be escalated upward. Option C (AI inventory) is good practice but not the specific gap. Option D (training) is enabling activity, not a structural fix. The audit identified a structural gap in the accountability chain.', bok:'I.B-5: Escalation mechanisms' },
  { id:'DI-IB-009', comp:'I.B', isRetrieval:false, text:'A government agency built an AI system to assess welfare benefit eligibility. The governance team focuses almost entirely on internal stakeholders. Which critical external stakeholder group is most likely overlooked, and what is the governance implication?', options:['External AI vendors who supplied components — their contracts need liability review.','Affected individuals — the benefit claimants subject to AI-made eligibility decisions — whose rights must be considered in governance design.','Peer government agencies who could be affected by public perception of government AI.','External technology auditors who should be engaged before go-live.'], correct:'B', explanation:'Affected individuals are the most critical overlooked stakeholder. In high-stakes public sector AI, people subject to automated or AI-assisted decisions have rights — including to understand and contest decisions — that must be built into the governance framework (I.B-7). Ignoring them creates gaps in human oversight, appeals processes, and transparency. Option A (vendors) is valid but lower priority than direct impact on individual rights. Option C is speculative. Option D (auditors) is an assurance activity, not a stakeholder engagement in governance design.', bok:'I.B-7: Affected individuals as external stakeholders' },
  { id:'DI-IB-010', comp:'I.B', isRetrieval:false, text:'A company\'s AI policy states: "The organization is committed to responsible and ethical use of AI." Compliance has flagged three AI systems with no risk assessment, two with training data of unknown provenance, and one deployed without a privacy impact assessment. What layer of the governance framework is the primary failure?', options:['The AI policy is too vague — it must be rewritten to specify prohibited uses and mandatory controls.','The AI standards layer is missing or unenforced — policy intent is not translated into specific mandatory operational requirements.','The compliance team lacks authority — they can flag issues but cannot mandate remediation.','Internal audit failed to identify these earlier, representing a third-line breakdown.'], correct:'B', explanation:'The policy exists but operational failures persist at system level — missing risk assessments, unknown data provenance, absent PIAs. These are precisely what AI standards mandate (I.B-6). Standards translate policy intent: "all AI systems must complete a risk assessment," "training data provenance must be documented," "PIAs required for personal data processing." Without enforceable standards, policy commitments produce no operational change. Option A has some merit but the policy is not the primary issue — the missing standards layer is. Option C conflates authority with structure. Option D identifies a symptom, not the root cause.', bok:'I.B-6: Standards bridge policy and operations' },
  { id:'DI-IB-011', comp:'I.B', isRetrieval:false, text:'An organization operates a federated AI governance model. A business unit deploys an AI hiring tool its BU AI Owner approved locally, claiming it met BU-level standards. Enterprise AI governance later finds it fails the enterprise minimum standard for bias testing. Who bears accountability, and what does this reveal?', options:['The enterprise AI governance team — they set the standards and should have reviewed the deployment.','The BU AI Owner — they approved a deployment that did not meet the enterprise standard they were required to apply.','Accountability is shared equally between enterprise governance and the BU AI Owner.','The CAIO bears full accountability since all AI governance flows to the executive level.'], correct:'B', explanation:'In the federated model, the BU AI Owner holds first-line accountability for ensuring AI systems comply with enterprise standards (I.B-4, I.B-5). The enterprise governance function sets minimum standards; BUs are responsible for meeting them. The BU AI Owner approved a non-compliant deployment — that is a first-line accountability failure. This also illustrates a federated model risk: standards may be misinterpreted at BU level, requiring monitoring and spot-check mechanisms. Option A inappropriately shifts blame — enterprise governance need not pre-approve every BU deployment (that would be centralized). Option C (shared) is imprecise. Option D is too broad.', bok:'I.B-4, I.B-5: Federated accountability' },
  { id:'DI-IB-012', comp:'I.B', isRetrieval:false, text:'A financial institution\'s CRO wants to integrate AI risk into the existing ERM framework. The AI governance team argues AI risk is fundamentally different and needs a completely separate process. Which position is more consistent with the AIGP BOK?', options:['The CRO\'s position — AI risk should be integrated into ERM, with AI governance complementing rather than replacing existing risk structures.','The AI governance team\'s position — AI risk has unique characteristics (opacity, emergent behaviour, data dependency) that make standard ERM tools inadequate.','Neither — the regulator should determine how AI risk is managed within financial institutions.','Both are equally valid; the choice depends on risk maturity and should be made by the board.'], correct:'A', explanation:'The BOK explicitly states AI governance should integrate with and complement existing governance frameworks including ERM (I.B-2). This does not mean AI risk is identical to other risk categories — it means AI risk should be incorporated within the ERM taxonomy with appropriate adaptations, not siloed in a separate process. Separate processes create coordination failures, escalation gaps, and inconsistent risk treatment. The AI team\'s concern about unique AI characteristics is valid but argues for adapting ERM, not replacing it. Option C defers an internal governance design decision to regulators. Option D implies equal validity — the BOK is directional toward integration.', bok:'I.B-2: Integration with ERM' },
  { id:'DI-IB-013', comp:'I.B', isRetrieval:false, text:'A company is formalizing its AI ethics board. The General Counsel recommends decisions should be advisory only so business units retain full deployment authority. The CAIO pushes back. Which argument best supports the CAIO?', options:['An advisory-only board cannot satisfy regulatory requirements for mandatory pre-deployment review.','An advisory-only board lacks the formal decision-making authority required for an AI ethics board to function as a meaningful governance control.','Advisory boards create legal liability since recommendations, once documented, may be used against the company.','An advisory board requires higher quorum, making it more expensive to operate.'], correct:'B', explanation:'An AI ethics board\'s governance value derives from authority to approve, reject, or require modification of AI deployments — not merely to provide opinions that can be ignored (I.B-3). An advisory-only board is governance form without substance: it can identify risks but cannot stop a deployment, so high-risk AI can proceed despite identified concerns. Option A has some merit in specific jurisdictions but is narrower than the BOK principle. Option C conflates governance design with legal risk management. Option D is irrelevant. Core principle: oversight without authority is not governance.', bok:'I.B-3: Ethics board authority' },
  { id:'DI-IB-014', comp:'I.B', isRetrieval:false, text:'An HR system uses AI to screen applicants and automatically reject those below a score threshold. Built by a third-party vendor. The HR Head says she is accountable for hiring decisions but not for how the AI arrives at scores. How do you characterize this accountability gap?', options:['This is valid — accountability for AI scoring methodology properly sits with the vendor who designed the model.','The HR Head has accepted accountability for outcomes but disclaimed accountability for the process that produces them — which is not sustainable in AI governance.','The gap is a legal one that should be resolved by contract with the vendor.','This reflects the limits of human accountability where AI operates autonomously — not all AI decisions can be attributed to a human.'], correct:'B', explanation:'In AI governance, accountability covers both the outcomes a system produces and the process by which it produces them (I.B-5). Accepting accountability for outputs while disclaiming accountability for the mechanism creates a fundamental gap: if the scoring is biased or discriminatory, there is no accountable owner. The BOK requires an accountable AI owner who can answer for the system in its entirety. Option A incorrectly transfers accountability to the vendor. Option C may address financial liability but not governance accountability. Option D is incorrect — human accountability for AI decisions is a foundational AIGP principle.', bok:'I.B-5: Accountability scope — process and outcomes' },
  { id:'DI-IB-015', comp:'I.B', isRetrieval:false, text:'A startup with 50 employees has deployed three AI systems. The founding team argues formal governance structures with committees, boards, and a policy hierarchy are disproportionate for their size. Which response best reflects appropriate governance proportionality?', options:['The founding team is correct — formal governance is only required when subject to sector-specific AI regulation.','Governance should be proportionate to size, risk profile, and complexity — a startup can implement lightweight but formal governance without building a large committee infrastructure.','All organizations deploying AI must implement the full governance structure regardless of size — AI risk does not scale with company size.','The startup should engage an external AI governance consultant to manage all requirements, removing the need for internal structures.'], correct:'B', explanation:'The BOK acknowledges proportionality — governance should scale to the size, risk profile, and complexity of the organization and its AI systems (I.B-4, I.B-6). A 50-person startup does not need a 12-person ethics board. It does need: an identified accountable AI owner, a policy statement, documented standards for each system\'s specific risks, and a lightweight review process. "Proportionate but formal" is the correct framing. Option A is incorrect — governance obligations arise from AI risk, not only regulatory designation. Option C is incorrect — one-size-fits-all governance is not the BOK\'s position. Option D externalizes accountability, which cannot be delegated.', bok:'I.B-4, I.B-6: Proportionate governance' }
];
let currentIdx = 0;
let userAnswers = [];
let sessionComplete = false;
function init() {
  for (let i = 0; i < questions.length; i++) userAnswers.push({ idx:i, selected:null, skipped:false });
  renderQuestion(0);
}
function renderQuestion(idx) {
  const q = questions[idx];
  const total = questions.length;
  document.getElementById('progressBar').style.width = ((idx/total)*100)+'%';
  document.getElementById('qCounter').textContent = 'Q'+(idx+1)+' of '+total;
  const chips = document.getElementById('qChips');
  chips.innerHTML = '';
  const dc = document.createElement('span'); dc.className='chip domain'; dc.textContent=q.comp; chips.appendChild(dc);
  if (q.isRetrieval) { const rc=document.createElement('span'); rc.className='chip retrieval'; rc.textContent='Retrieval'; chips.appendChild(rc); }
  const history = getHistory();
  const mc = getTrickyCount(history, q.id);
  if (mc>=2) { const tc=document.createElement('span'); tc.className='chip tricky'; tc.textContent='Tricky'; chips.appendChild(tc); }
  document.getElementById('qText').textContent = q.text;
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.options.forEach((opt,i) => {
    const div = document.createElement('div');
    div.className='option'; div.dataset.letter=letters[i];
    div.innerHTML='<span class="opt-letter">'+letters[i]+'</span><span class="opt-text">'+opt+'</span>';
    div.addEventListener('click', () => selectOption(div, letters[i], idx));
    container.appendChild(div);
  });
  const btn = document.getElementById('nextBtn');
  btn.disabled = true;
  if (idx===total-1) { btn.textContent='Submit & Review'; btn.className='btn btn-submit'; btn.onclick=submitQuiz; }
  else { btn.textContent='Next'; btn.className='btn btn-primary'; btn.onclick=nextQuestion; }
  const prior = userAnswers[idx];
  if (prior.selected) {
    container.querySelectorAll('.option').forEach(o => { if (o.dataset.letter===prior.selected) o.classList.add('selected'); });
    btn.disabled = false;
  }
}
function selectOption(el, letter, idx) {
  if (sessionComplete) return;
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  userAnswers[idx].selected = letter;
  document.getElementById('nextBtn').disabled = false;
}
function nextQuestion() { if (currentIdx<questions.length-1) { currentIdx++; renderQuestion(currentIdx); } }
function submitQuiz() {
  sessionComplete = true;
  const total = questions.length;
  let correct=0, incorrect=0, skipped=0;
  userAnswers.forEach((a,i) => {
    if (!a.selected) { a.skipped=true; skipped++; }
    else if (a.selected===questions[i].correct) correct++;
    else incorrect++;
  });
  const score = Math.round((correct/total)*100);
  document.getElementById('progressBar').style.width='100%';
  document.getElementById('quizScreen').style.display='none';
  const rs = document.getElementById('resultsScreen'); rs.style.display='block';
  document.getElementById('scorePct').textContent=score+'%';
  document.getElementById('statCorrect').textContent=correct;
  document.getElementById('statIncorrect').textContent=incorrect;
  document.getElementById('statSkipped').textContent=skipped;
  buildReview();
  saveSession(score, correct, incorrect, skipped);
}
function buildReview() {
  const container = document.getElementById('reviewContainer');
  container.innerHTML = '';
  questions.forEach((q,i) => {
    const ua = userAnswers[i];
    const isCorrect = ua.selected===q.correct;
    const isSkipped = !ua.selected;
    const item = document.createElement('div'); item.className='review-item';
    const dotClass = isSkipped?'dot-skipped':isCorrect?'dot-correct':'dot-incorrect';
    const header = document.createElement('div'); header.className='review-item-header';
    header.innerHTML=`<div class="result-dot ${dotClass}"></div><div class="review-q-text">Q${i+1}: ${q.text.substring(0,90)}...</div><span class="review-chevron">&#9660;</span>`;
    header.onclick=()=>{ const b=item.querySelector('.review-body'); b.classList.toggle('open'); header.querySelector('.review-chevron').style.transform=b.classList.contains('open')?'rotate(180deg)':''; };
    const history=getHistory(); const mc=getTrickyCount(history,q.id);
    const tf=mc>=2?`<span class="tricky-flag">Tricky - missed ${mc}x</span>`:'';
    let aHTML='';
    if (isSkipped) { aHTML=`<div class="answer-row"><span class="answer-label your-incorrect">Skipped</span><span>-</span></div>`; }
    else {
      const yc=isCorrect?'your-correct':'your-incorrect'; const yl=isCorrect?'Your answer':'Your answer (wrong)';
      aHTML=`<div class="answer-row"><span class="answer-label ${yc}">${yl}</span><span>${ua.selected}: ${q.options['ABCD'.indexOf(ua.selected)]}</span></div>`;
      if (!isCorrect) aHTML+=`<div class="answer-row"><span class="answer-label correct-label">Correct</span><span>${q.correct}: ${q.options['ABCD'.indexOf(q.correct)]}</span></div>`;
    }
    const body=document.createElement('div'); body.className='review-body';
    body.innerHTML=`${aHTML}<div class="explanation">${q.explanation}${tf}<br><span class="bok-tag">${q.bok}</span></div>`;
    item.appendChild(header); item.appendChild(body); container.appendChild(item);
  });
}
function saveSession(score, correct, incorrect, skipped) {
  const total=questions.length; const ts=new Date().toISOString();
  const sessionData={ sessionId:SESSION_ID, title:'AIGP Quiz - Day 2 - Competency I.B', week:1, day:2, filename:'AIGP_290526_Day2_Governance-Structures_Quiz.html', ts, score, correct, incorrect, total, skipped,
    questions:userAnswers.map((a,i)=>({ id:questions[i].id, day:2, week:1, domain:'Domain I', comp:questions[i].comp, isRetrieval:questions[i].isRetrieval, correct:a.selected===questions[i].correct, skipped:a.skipped, userAns:a.selected||null, correctAns:questions[i].correct, qText:questions[i].text.substring(0,80) }))
  };
  let history=[]; try { history=JSON.parse(localStorage.getItem('aigp_quiz_history')||'[]'); } catch(e){}
  history.push(sessionData); localStorage.setItem('aigp_quiz_history', JSON.stringify(history));
  const attemptNum=history.length;
  document.getElementById('saveDetails').innerHTML='Session: '+SESSION_ID+'<br>Attempt: #'+attemptNum+'<br>Saved: '+new Date(ts).toLocaleString('en-SG',{timeZone:'Asia/Singapore'})+' SGT';
  fetch(WEBHOOK_URL,{ method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(sessionData) })
    .then(()=>{ document.getElementById('saveConfirm').innerHTML='<div class="save-title">Results saved - Google Sheets updated</div><div>Session: '+SESSION_ID+'<br>Attempt: #'+attemptNum+'</div>'; })
    .catch(()=>{ document.getElementById('saveConfirm').innerHTML='<div class="save-title">Results saved to localStorage</div><div>Attempt: #'+attemptNum+'</div>'; });
}
function getHistory() { try { return JSON.parse(localStorage.getItem('aigp_quiz_history')||'[]'); } catch(e){ return []; } }
function getTrickyCount(history, questionId) { let c=0; history.forEach(s=>{ if(!s.questions)return; s.questions.forEach(q=>{ if(q.id===questionId&&q.correct===false&&!q.skipped)c++; }); }); return c; }
function exportHistory() { const h=getHistory(); const b=new Blob([JSON.stringify(h,null,2)],{type:'application/json'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download='aigp_quiz_history_'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(u); }
init();
</script>
