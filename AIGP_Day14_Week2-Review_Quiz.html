const QUIZ_DATA = {
  day: 14, week: 2, comp: "Review", topic: "Week 2 Review — Domain III",
  webhookUrl: "https://script.google.com/macros/s/AKfycbyCG5oTGoPsjE9ytN3NJbsAv45GO0_uxb5gjXL7K8trVSiOfG05tQ0LV3wnjtuj7Bir/exec",
  questions: [
    {id:"DIII-IIIA-001",pi:"III.A.1",isRetrieval:false,comp:"III.A",bokRef:"III.A.1 — Define the business context and use case of the AI system.",stem:"A governance team at a logistics company is evaluating whether to deploy a route-optimization AI. Before any technical design begins, which activity does Domain III Governing AI Development require first?",options:{A:"Selecting the AI model architecture based on vendor capability benchmarks and cost estimates",B:"Defining the business context and use case of the AI system before other design activities proceed",C:"Conducting bias testing across candidate datasets to confirm they reflect real-world route conditions",D:"Publishing a model card to communicate planned system capabilities to internal stakeholders"},correct:"B",explanation:"III.A.1 requires defining the business context and use case of the AI system — this is the foundational step in III.A before design proceeds. Model architecture selection (A) is a III.A.3 Applying policies to design activity. Bias testing (C) is a III.B.3 Data Governance, Training and Testing obligation. Model card publication (D) is a III.C.1 Release and Monitoring requirement."},
    {id:"DIII-IIIA-002",pi:"III.A.2",isRetrieval:false,comp:"III.A",bokRef:"III.A.2 — Perform or review an impact assessment on the AI system.",stem:"A bank is designing a credit-scoring model. A project lead argues the impact assessment can wait until deployment since no final decisions have been made yet. What is the correct governance position under III.A.2?",options:{A:"III.A.2 requires performing or reviewing an impact assessment during the design phase, not only at deployment",B:"Impact assessments are triggered by deployment decisions and consumer protection obligations, not design-phase activities",C:"Deferring the assessment to the testing phase is acceptable once the dataset is finalized and validated",D:"Impact assessments are only mandatory for high-risk AI systems under the EU AI Act risk classification framework"},correct:"A",explanation:"III.A.2 states 'Perform or review an impact assessment on the AI system' — this is a design-phase obligation under III.A Governing AI Design and Build. Deferring to deployment (B) or testing (C) is too late. The BOK obligation (D) applies regardless of regulatory risk classification."},
    {id:"DIII-IIIA-003",pi:"III.A.3",isRetrieval:false,comp:"III.A",bokRef:"III.A.3 — Apply the policies, procedures, best practices and ethical considerations to designing and building the AI system (e.g., purpose of AI, requirements gathering, architecture and model selection, human oversight, data analysis, metric and threshold evaluation, stakeholder engagement and feedback, and operational controls).",stem:"During an AI system's architecture review, an engineer proposes removing the human oversight checkpoint to reduce inference latency. The governance lead must evaluate this proposal. Which BOK PI is most directly relevant?",options:{A:"III.A.1, which requires defining the business context and confirming the system's intended purpose before design proceeds",B:"III.A.5, which requires documenting the designing and building process to establish compliance and manage risks",C:"III.A.2, which requires performing or reviewing an impact assessment on the AI system before deployment decisions",D:"III.A.3, which requires applying policies and best practices including human oversight to designing and building the AI system"},correct:"D",explanation:"III.A.3 explicitly lists 'human oversight' among the elements governance must apply when designing and building an AI system. Documentation (B, III.A.5 Document designing and building) records decisions but doesn't govern them. Impact assessment (C, III.A.2) evaluates consequences but is not the design-governance standard. Business context (A, III.A.1) is upstream of specific design controls."},
    {id:"DIII-IIIA-004",pi:"III.A.4",isRetrieval:false,comp:"III.A",bokRef:"III.A.4 — Identify and manage the internal and external risks and contributing factors related to designing and building the AI model and system (e.g., using probability/severity harms matrix, using a risk mitigation hierarchy, stakeholder mapping, use-case evaluation, benchmarking, and pre-deployment pilots and testing).",stem:"A healthcare AI team identifies that a diagnostic model may underperform for patients with rare conditions. They debate whether to document this as residual risk or invest in additional training data. Which BOK framework most directly applies?",options:{A:"III.A.1 use-case evaluation — redefine the scope to formally exclude rare conditions from the system's design intent",B:"III.A.3 requirements gathering — record the limitation in system design requirements and proceed to development",C:"III.A.4 risk management — assess the severity and probability of the harm and apply the risk mitigation hierarchy before accepting residual risk",D:"III.B.4 issue management — defer the decision to the testing team since model performance is a training-phase concern"},correct:"C",explanation:"III.A.4 requires identifying and managing design-phase risks using tools including the 'probability/severity harms matrix' and 'risk mitigation hierarchy.' Scope redefinition (A) avoids the risk without assessing it. Documenting in requirements only (B) doesn't constitute risk management. Deferring to testing (D, III.B.4 Identify and manage issues during testing) bypasses design-phase obligations."},
    {id:"DIII-IIIA-005",pi:"III.A.5",isRetrieval:false,comp:"III.A",bokRef:"III.A.5 — Document the designing and building process (e.g., to establish compliance and manage risks).",stem:"After completing an AI hiring tool's design phase, the governance lead is asked what purposes the BOK specifically identifies for design documentation. Which answer is verbatim with III.A.5?",options:{A:"To establish compliance and manage risks, which are the two purposes the BOK states for design-phase documentation",B:"To satisfy regulatory audit trail requirements and communicate architectural decisions to external reviewers",C:"To record model architecture decisions and provide performance benchmarks for post-deployment comparison",D:"To meet EU AI Act technical documentation requirements and facilitate third-party conformity assessments"},correct:"A",explanation:"III.A.5 states documentation is required 'to establish compliance and manage risks' — verbatim. Regulatory audit trails (B) and external communication are downstream uses, not the BOK's stated purposes. Architecture records and benchmarks (C) describe content, not purpose. EU AI Act (D) names one regulation; the BOK's stated purposes are broader."},
    {id:"DIII-IIIA-006",pi:"III.A.2",isRetrieval:false,comp:"III.A",bokRef:"III.A.2 — Perform or review an impact assessment on the AI system.",stem:"A fintech team building a fraud detection model debates whether the impact assessment should cover only false positives (flagging legitimate transactions) or also false negatives (missing actual fraud). What does the BOK require?",options:{A:"The assessment should focus on false positives because these create direct, traceable harm to identifiable customers",B:"False negatives are a model performance metric addressed in testing, not a harm covered by governance impact assessments",C:"The impact assessment must cover harms to individuals, groups, organizations, and society — including both false positive and false negative scenarios",D:"The BOK delegates impact assessment scope to the model development team's professional judgment and risk appetite"},correct:"C",explanation:"III.A.2 requires performing or reviewing an impact assessment without restricting scope to one error type. I.A.2 Identify risks and harms confirms AI risks include harms to individuals, groups, organizations, and society. Limiting to false positives (A) and treating false negatives as performance-only (B) both narrow the scope. The BOK does not delegate scope to developer discretion (D)."},
    {id:"DIII-IIIA-007",pi:"III.A.4",isRetrieval:false,comp:"III.A",bokRef:"III.A.4 — Identify and manage the internal and external risks and contributing factors related to designing and building the AI model and system (e.g., using probability/severity harms matrix, using a risk mitigation hierarchy, stakeholder mapping, use-case evaluation, benchmarking, and pre-deployment pilots and testing).",stem:"A retail AI team building a recommendation engine identifies the risk that it may amplify filter bubbles, narrowing users' exposure to diverse content. What does applying a risk mitigation hierarchy under III.A.4 require first?",options:{A:"Document the risk as inherent to recommender architecture and record it in the risk register for ongoing monitoring",B:"Evaluate elimination, reduction, and control options in sequence before accepting residual risk from the filter bubble effect",C:"Transfer the risk to users by adding a clear disclosure in the product's terms of service and consent flow",D:"Route the risk to the post-deployment monitoring team since filter bubble effects only emerge at scale over time"},correct:"B",explanation:"III.A.4 references the 'risk mitigation hierarchy' — a structured approach that prioritizes elimination, then reduction, then controls, before residual risk is accepted. Immediate acceptance (A) skips the hierarchy. Disclosure-as-risk-transfer (C) is not a mitigation hierarchy step. Deferring to monitoring (D) bypasses design-phase mitigation entirely."},
    {id:"DIII-IIIA-008",pi:"III.A.3",isRetrieval:false,comp:"III.A",bokRef:"III.A.3 — Apply the policies, procedures, best practices and ethical considerations to designing and building the AI system (e.g., purpose of AI, requirements gathering, architecture and model selection, human oversight, data analysis, metric and threshold evaluation, stakeholder engagement and feedback, and operational controls).",stem:"A governance professional reviews an AI system design where the team selected a black-box deep learning model over an interpretable alternative. The business unit says interpretability isn't a business requirement. What governance consideration is most relevant?",options:{A:"III.A.5 — document the model selection decision in the design records to satisfy compliance obligations",B:"III.A.1 — the business context and use case should drive model selection without governance override",C:"III.A.2 — defer the interpretability question to the impact assessment for resolution at the next review cycle",D:"III.A.3 — architecture and model selection must be evaluated against policies, ethical considerations, and requirements including human oversight and operational controls"},correct:"D",explanation:"III.A.3 explicitly lists 'architecture and model selection' as an element where governance policies and ethical considerations apply. A governance professional cannot defer to business preference alone when III.A.3 requires evaluation against policies. Documentation (A, III.A.5) records the decision but doesn't govern it. Business unit primacy (B) contradicts III.A.3. Impact assessment (C, III.A.2) is a parallel activity, not a design-choice forum."},
    {id:"DIII-IIIA-009",pi:"III.A.3",isRetrieval:false,comp:"III.A",bokRef:"III.A.3 — Apply the policies, procedures, best practices and ethical considerations to designing and building the AI system (e.g., purpose of AI, requirements gathering, architecture and model selection, human oversight, data analysis, metric and threshold evaluation, stakeholder engagement and feedback, and operational controls).",stem:"During an AI system's design phase, the team skips stakeholder feedback sessions because the project timeline is compressed. What is the most precise governance failure this represents?",options:{A:"A III.A.3 failure to include stakeholder engagement and feedback as required when applying governance policies to AI system design",B:"A III.A.5 documentation failure because stakeholder sessions produce evidence records needed for compliance purposes",C:"An I.B.3 training failure because stakeholders who are not engaged are also not receiving required awareness education",D:"A III.C.1 release readiness failure because conformity assessment requires evidence of stakeholder input from all design phases"},correct:"A",explanation:"III.A.3 lists 'stakeholder engagement and feedback' among the considerations that must be applied when designing and building the AI system. Skipping sessions directly violates this PI. Documentation (B, III.A.5) is a consequence, not the root obligation. Training awareness (C, I.B.3 Create training and awareness program) is separate from design-phase engagement. Release readiness (D, III.C.1) is downstream."},
    {id:"DIII-IIIB-001",pi:"III.B.1",isRetrieval:false,comp:"III.B",bokRef:"III.B.1 — Establish and follow the requirements for data governance (e.g., assess and document lawful rights to collect and use data, and assess data quality, quantity, integrity and fit-for-purpose).",stem:"A team sourcing training data for a financial risk AI from three vendors asks what III.B.1 requires before using the data. Which answer is the most complete statement of the obligation?",options:{A:"Verify the data is sourced from vendors with established reputations and document the procurement chain for audit purposes",B:"Conduct privacy impact assessments and ensure GDPR compliance across all personal data collected from the three vendors",C:"Assess and document lawful rights to collect and use the data, and assess data quality, quantity, integrity and fit-for-purpose",D:"Confirm the data is de-identified and representative of the target population before including it in the training pipeline"},correct:"C",explanation:"III.B.1 verbatim requires 'assess and document lawful rights to collect and use data, and assess data quality, quantity, integrity and fit-for-purpose.' Vendor reputation (A) is not the BOK standard. GDPR compliance (B) is one legal framework; the BOK sets its own standard. De-identification and representativeness (D) are partial elements — fit-for-purpose is broader."},
    {id:"DIII-IIIB-002",pi:"III.B.2",isRetrieval:false,comp:"III.B",bokRef:"III.B.2 — Establish and document data lineage and provenance.",stem:"During a post-incident review, auditors ask the AI team to explain what data the model was trained on and how it was transformed before training. The team cannot answer fully. Which BOK requirement was most clearly not met?",options:{A:"III.B.1 — the team failed to assess and document data quality and fit-for-purpose before using it for training",B:"III.B.5 — the training and testing process was not adequately documented to validate results and support compliance",C:"III.B.4 — issues arising during the training process were not identified and managed in a timely manner",D:"III.B.2 — the team failed to establish and document data lineage and provenance as required before training"},correct:"D",explanation:"III.B.2 requires 'establish and document data lineage and provenance' — exactly the information auditors requested. Data quality (A, III.B.1) is a separate obligation about fitness, not traceability. Training process documentation (B, III.B.5 Document training and testing) is broader; III.B.2 is the specific lineage obligation. Issue management (C, III.B.4) addresses problems during training, not data traceability."},
    {id:"DIII-IIIB-003",pi:"III.B.3",isRetrieval:false,comp:"III.B",bokRef:"III.B.3 — Plan and perform training and testing of the AI model and system (e.g., unit, integration, validation, performance, security, bias and interpretability).",stem:"A governance professional reviews a test plan for a new AI model. The plan includes unit tests and performance tests, but not bias tests or interpretability tests. What does the BOK require?",options:{A:"III.B.3 requires bias and interpretability testing as explicitly listed test types — the current plan is incomplete and must be expanded",B:"Bias testing is optional when the model has been validated using historical data with strong overall accuracy metrics",C:"Interpretability testing is only required for high-risk AI systems under the EU AI Act and is not a standalone BOK obligation",D:"The test plan is sufficient once performance benchmarks are met — additional test types are governance enhancements, not requirements"},correct:"A",explanation:"III.B.3 lists 'unit, integration, validation, performance, security, bias and interpretability' as required test types. Bias (B) and interpretability (C) are both explicitly named — not optional based on accuracy or limited to regulatory mandates. Performance benchmark sufficiency (D) contradicts the BOK's comprehensive test list."},
    {id:"DIII-IIIB-004",pi:"III.B.4",isRetrieval:false,comp:"III.B",bokRef:"III.B.4 — Identify and manage issues and risks during training and testing of the AI model and system.",stem:"During integration testing, an AI team discovers the model performs significantly worse on mobile-captured images than desktop images. They log this in a tracking tool but continue to the next phase without escalating or analyzing root cause. What is the governance failure?",options:{A:"III.B.5 — the documentation of the testing process did not capture the performance gap in sufficient detail for compliance purposes",B:"III.B.4 — the team identified an issue during testing but failed to manage it, satisfying only half of the PI's obligation",C:"III.C.2 — continuous monitoring should have detected this device-specific variance before it reached integration testing",D:"III.A.3 — the data collection design failed to require representative device diversity during the requirements-gathering phase"},correct:"B",explanation:"III.B.4 requires identifying AND managing issues during training and testing. Logging without escalation satisfies 'identify' but fails 'manage.' Documentation (A, III.B.5) may be incomplete but is a consequence. Monitoring (C, III.C.2 Continuous monitoring) is post-deployment. Design (D, III.A.3) is upstream — the question concerns the testing-phase response obligation."},
    {id:"DIII-IIIB-005",pi:"III.B.5",isRetrieval:false,comp:"III.B",bokRef:"III.B.5 — Document the training and testing process (e.g., to validate results, establish compliance and manage risks).",stem:"An AI team's testing documentation states the model 'passed all tests.' An auditor asks to see specific test results by category and how findings were resolved. What does III.B.5 require?",options:{A:"Summary documentation is sufficient once the model has passed all required testing gates and is approved for the next phase",B:"Testing documentation is only required when submitting results to external regulatory bodies or certification authorities",C:"Documentation must validate results, establish compliance, and support risk management — a summary statement does not fulfill these three purposes",D:"The auditor's request exceeds BOK requirements — the approved test plan itself constitutes the required documentation artifact"},correct:"C",explanation:"III.B.5 states documentation is required 'to validate results, establish compliance and manage risks.' A single-line summary cannot validate results or enable risk management review. Summary sufficiency (A) fails the validation purpose. Limiting to regulatory submissions (B) mischaracterizes the BOK standard. The test plan alone (D) does not contain results or demonstrate how findings were managed."},
    {id:"DIII-IIIB-006",pi:"III.B.1",isRetrieval:false,comp:"III.B",bokRef:"III.B.1 — Establish and follow the requirements for data governance (e.g., assess and document lawful rights to collect and use data, and assess data quality, quantity, integrity and fit-for-purpose).",stem:"A startup wants to scrape publicly available social media posts to train a sentiment analysis model for HR screening purposes. Before proceeding, the governance lead flags a primary concern. Which BOK requirement is most directly at issue?",options:{A:"III.B.3 — the test plan must include bias testing since scraped social data may carry significant demographic skew",B:"III.A.4 — the risk of using social data should be formally evaluated using the probability/severity harms matrix",C:"III.A.3 — the architecture selection should explicitly consider alternative data sources with clearer governance status",D:"III.B.1 — the team must assess and document its lawful rights to collect and use the social media data before training"},correct:"D",explanation:"III.B.1 requires assessing 'lawful rights to collect and use data' before training. Web scraping may violate platform terms of service or privacy law — a direct III.B.1 concern. Bias testing (A, III.B.3) and risk matrix (B, III.A.4) are important but downstream. Architecture sourcing (C, III.A.3) is a design question; the governance lead's flag concerns data rights specifically."},
    {id:"DIII-IIIB-007",pi:"III.B.3",isRetrieval:false,comp:"III.B",bokRef:"III.B.3 — Plan and perform training and testing of the AI model and system (e.g., unit, integration, validation, performance, security, bias and interpretability).",stem:"After deployment, an AI hiring tool is found to systematically underrank female candidates. A post-mortem review finds the development-phase test suite did not include bias tests. Which BOK governance failure does this represent?",options:{A:"A III.B.3 failure to plan and perform bias testing as one of the explicitly required test types during model development",B:"A III.C.2 failure to establish continuous monitoring that would have detected demographic performance variance post-deployment",C:"A III.A.2 failure to include demographic impact analysis within the design-phase impact assessment on the AI system",D:"A II.B.2 failure to comply with nondiscrimination laws governing AI use in employment screening contexts"},correct:"A",explanation:"The post-mortem identifies a testing-phase gap — III.B.3 lists 'bias' as an explicitly required test type. The root failure is not testing for it. Monitoring (B, III.C.2 Continuous monitoring) applies post-deployment but cannot substitute for pre-deployment bias testing. Impact assessment (C, III.A.2) is parallel. Nondiscrimination law (D, II.B.2 Other laws applying to AI) may also be implicated but the question asks about the testing governance failure."},
    {id:"DIII-IIIB-008",pi:"III.B.4",isRetrieval:false,comp:"III.B",bokRef:"III.B.4 — Identify and manage issues and risks during training and testing of the AI model and system.",stem:"During training of a fraud detection model, the team observes significantly better training loss than validation loss, indicating likely overfitting. They decide to ship the model despite this. Which TWO BOK requirements were most likely violated?",options:{A:"III.B.1 and III.B.5 — failing to assess data quality and failing to document the training process adequately",B:"III.B.4 and III.B.5 — failing to manage the overfitting issue identified during training and failing to document the decision to ship",C:"III.A.4 and III.B.3 — failing to apply risk management in design and failing to include validation testing in the test plan",D:"III.B.2 and III.C.1 — failing to establish data lineage for the training set and failing to satisfy conformity requirements at release"},correct:"B",explanation:"III.B.4 requires identifying AND managing issues during training — overfitting was identified but not managed. III.B.5 requires documentation to validate results and manage risks — shipping without addressing the finding fails the documentation purpose. Data quality (A, III.B.1) and design risk (C, III.A.4) are not the active failures. Data lineage (D, III.B.2) and conformity (III.C.1) are not implicated by overfitting."},
    {id:"DIII-IIIC-001",pi:"III.C.1",isRetrieval:false,comp:"III.C",bokRef:"III.C.1 — Assess readiness, and prepare for release into production (e.g., creating the model card and satisfying conformity requirements).",stem:"A team is preparing to release an AI recommendation model. Their release checklist includes performance benchmarks and security scans, but nothing related to a model card. The governance manager flags this gap. What does III.C.1 require?",options:{A:"Model cards are an industry best practice originating from academic AI research and are not a formal BOK requirement",B:"Model cards are only required for general-purpose AI models subject to EU AI Act transparency obligations",C:"III.C.1 requires assessing readiness and preparing for release, which explicitly includes creating the model card as an example activity",D:"The checklist is complete because model cards are communication tools for external audiences, not internal compliance artifacts"},correct:"C",explanation:"III.C.1 explicitly cites 'creating the model card' as an example of preparing for release. The BOK makes this a governance requirement regardless of whether it originated in academic practice (A) or is mandated by specific regulations (B). Calling it communication-only (D) misses the conformity framing — model cards are part of release readiness under III.C.1 Assess readiness and prepare for release."},
    {id:"DIII-IIIC-002",pi:"III.C.2",isRetrieval:false,comp:"III.C",bokRef:"III.C.2 — Conduct continuous monitoring of the AI system, and establish a regular schedule for maintenance, updates and retraining.",stem:"Six months after deploying a customer churn prediction model, prediction accuracy has declined but the team takes no action, citing that the model passed all pre-deployment tests. What governance failure does this represent?",options:{A:"III.C.2 — the organization failed to conduct continuous monitoring and establish a regular schedule for maintenance and retraining",B:"III.B.3 — the test plan should have included performance degradation scenarios to anticipate post-deployment accuracy decline",C:"III.C.4 — the business team failed to document the performance decline as a formal incident in the organization's incident log",D:"III.A.4 — the risk of post-deployment performance degradation should have been anticipated in the design-phase risk assessment"},correct:"A",explanation:"III.C.2 requires 'conduct continuous monitoring of the AI system, and establish a regular schedule for maintenance, updates and retraining.' No response to declining accuracy is a direct III.C.2 failure. Testing (B, III.B.3) is pre-deployment and doesn't substitute for ongoing monitoring. Incident documentation (C, III.C.4 Manage and document incidents) is a secondary gap. Design risk anticipation (D, III.A.4) doesn't discharge post-deployment governance."},
    {id:"DIII-IIIC-003",pi:"III.C.3",isRetrieval:false,comp:"III.C",bokRef:"III.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety (e.g., audits, red teaming, threat modeling and security testing).",stem:"A financial services AI team conducts annual performance reviews using production logs, but has never performed red teaming or threat modeling. A regulator questions whether this is sufficient. What does III.C.3 require?",options:{A:"Annual performance log reviews are the primary mechanism — red teaming is a cybersecurity practice outside the scope of AI governance",B:"Red teaming is only required for AI systems that process biometric or sensitive personal data under applicable privacy regulations",C:"III.C.3 requires audits only — threat modeling is separately addressed in III.C.5 as part of cross-functional incident analysis",D:"III.C.3 requires periodic activities including audits, red teaming, threat modeling, and security testing to assess performance, reliability, and safety"},correct:"D",explanation:"III.C.3 lists 'audits, red teaming, threat modeling and security testing' as examples of required periodic activities. Production log reviews alone (A) are insufficient. Limiting red teaming to sensitive data (B) has no BOK basis. The III.C.3 / III.C.5 split (C) is incorrect — all four activity types belong to periodic structured assessments under III.C.3 Conduct periodic activities to assess the AI system."},
    {id:"DIII-IIIC-004",pi:"III.C.4",isRetrieval:false,comp:"III.C",bokRef:"III.C.4 — Manage and document incidents, issues and risks.",stem:"An AI-powered loan approval system makes a series of incorrect rejections due to a data pipeline failure. The team fixes the pipeline within 24 hours but creates no formal incident record. What governance obligation was missed?",options:{A:"III.C.2 — continuous monitoring should have detected the pipeline failure before it affected live approval decisions",B:"III.C.4 — the team managed the technical issue but failed to document it as an incident, issue, and associated risk",C:"III.C.5 — the team did not engage cross-functional stakeholders to analyze why the pipeline failure caused approval errors",D:"III.C.6 — the organization was required to make a public disclosure about the service disruption affecting loan decisions"},correct:"B",explanation:"III.C.4 requires 'manage and document incidents, issues and risks.' Fixing the pipeline addresses management but omitting the formal record fails documentation. Monitoring (A, III.C.2) is a detection concern. Cross-functional analysis (C, III.C.5 Collaborate with stakeholders) is a parallel obligation but III.C.4 is the primary documentation failure. Public disclosure (D, III.C.6) may apply depending on regulatory context."},
    {id:"DIII-IIIC-005",pi:"III.C.5",isRetrieval:false,comp:"III.C",bokRef:"III.C.5 — Collaborate with cross-functional stakeholders to understand why incidents arise from AI systems (e.g., brittleness, lack of robustness, lack of quality data, insufficient testing, and model or data drift).",stem:"After three incidents where an AI content moderation system incorrectly escalated user accounts, the AI team concludes the model is working as designed. The governance manager argues this conclusion is insufficient. What does III.C.5 require?",options:{A:"If the model performs to specification, the AI team's conclusion is sufficient and no further governance action is required",B:"Incidents should be reclassified as product defects and handed to the product team for resolution without governance involvement",C:"III.C.5 requires cross-functional collaboration to understand why incidents arise — including investigating factors like brittleness, lack of robustness, and insufficient testing",D:"III.C.5 only applies when incidents involve personal data breaches that trigger mandatory reporting under applicable privacy law"},correct:"C",explanation:"III.C.5 requires 'collaborate with cross-functional stakeholders to understand why incidents arise from AI systems' — explicitly citing brittleness, lack of robustness, and insufficient testing. 'Working as designed' may mean the design is the problem. AI team sufficiency (A) does not meet the cross-functional standard. Product team handoff (B) doesn't constitute governance collaboration. Personal data limitation (D) has no BOK basis."},
    {id:"DIII-IIIC-006",pi:"III.C.6",isRetrieval:false,comp:"III.C",bokRef:"III.C.6 — Make public disclosures to meet transparency obligations (e.g., technical documentation, instructions for use to deployers and post-market monitoring plans).",stem:"A medical AI developer in the EU is releasing a diagnostic aid to hospitals. The hospitals ask what the developer must provide so they can operate the system safely. Which BOK obligation governs the developer's responsibility?",options:{A:"III.C.6, which requires making public disclosures including technical documentation and instructions for use to deployers as part of transparency obligations",B:"II.C.3, which requires human oversight and notification requirements under AI-specific laws including the EU AI Act",C:"III.C.1, which requires creating a model card and satisfying conformity requirements before the system is released",D:"IV.B.1, which requires identifying and evaluating key terms and risks in the vendor or licensing agreement"},correct:"A",explanation:"III.C.6 requires 'technical documentation, instructions for use to deployers and post-market monitoring plans' — exactly what the hospitals need. II.C.3 (B) covers AI-specific law human oversight requirements — related but different. Model card and conformity (C, III.C.1) address release readiness, not deployer communication. Vendor agreement review (D, IV.B.1 Evaluate key terms in vendor agreements) is the deployer's obligation, not the developer's."},
    {id:"DIII-IIIC-007",pi:"III.C.1",isRetrieval:false,comp:"III.C",bokRef:"III.C.1 — Assess readiness, and prepare for release into production (e.g., creating the model card and satisfying conformity requirements).",stem:"An AI team rushes an AI system to production, skipping the conformity assessment and planning to set up monitoring after the launch settles. Which TWO BOK governance failures does this represent?",options:{A:"III.B.5 and III.C.4 — failing to document the testing process and failing to log the launch decision as an incident",B:"III.A.5 and III.C.3 — failing to document the design process and failing to conduct a pre-launch audit assessment",C:"III.B.3 and III.C.5 — failing to complete the required test suite and failing to engage cross-functional stakeholders",D:"III.C.1 and III.C.2 — failing to satisfy conformity requirements before release and failing to establish a monitoring schedule at deployment"},correct:"D",explanation:"III.C.1 requires satisfying conformity requirements before release — skipped here. III.C.2 requires establishing a regular monitoring and retraining schedule at deployment — deferred here. Testing documentation (A, III.B.5) and incident logging (III.C.4) are not the stated failures. Design documentation (B, III.A.5) and periodic audits (III.C.3) are not implicated. Test types (C, III.B.3) predate release."},
    {id:"DIII-IIIC-008",pi:"III.C.3",isRetrieval:false,comp:"III.C",bokRef:"III.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety (e.g., audits, red teaming, threat modeling and security testing).",stem:"During a scheduled red team exercise, the governance team discovers a vulnerability that could allow adversarial manipulation of model outputs. What should happen next under Domain III governance?",options:{A:"Suspend all red team activities and escalate solely to the cybersecurity team — AI governance has completed its role once the exercise is done",B:"Manage and document the finding as an incident or issue under III.C.4 and ensure it informs future periodic assessment planning under III.C.3",C:"Red team findings are advisory only and do not trigger documentation obligations unless they result in actual user-facing harm",D:"Issue an immediate public disclosure under III.C.6 as soon as the vulnerability is discovered, before any internal management steps"},correct:"B",explanation:"III.C.3 Conduct periodic activities and III.C.4 Manage and document incidents work together — a red team finding is precisely the type of issue III.C.4 covers, and it should feed back into III.C.3 planning. Deferring to security-only (A) removes governance oversight. Advisory-only (C) contradicts III.C.4's documentation obligation. Immediate public disclosure (D, III.C.6) is premature — disclosure follows internal management, not precedes it."},
    {id:"DIII-IIIC-RET01",pi:"III.C.2",isRetrieval:true,comp:"III.C",bokRef:"III.C.2 — Conduct continuous monitoring of the AI system, and establish a regular schedule for maintenance, updates and retraining.",stem:"A retail AI team deploys a product recommendation model and states in their monitoring plan that they will 'check performance when issues arise.' There is no fixed review cadence. What is the most accurate governance assessment?",options:{A:"Reactive monitoring is a valid approach when the AI system operates in a low-risk consumer context with limited personal data use",B:"A documented monitoring plan exists, and III.C.2 is satisfied regardless of whether a fixed review schedule is included",C:"III.C.2 requires establishing a regular schedule for maintenance, updates and retraining — reactive-only monitoring does not fulfill this obligation",D:"The absence of a schedule is an incident to be escalated under III.C.4 rather than a monitoring governance gap under III.C.2"},correct:"C",explanation:"III.C.2 verbatim requires 'establish a regular schedule for maintenance, updates and retraining.' Reactive monitoring contradicts the explicit regularity requirement regardless of risk level (A). A plan without a schedule (B) does not satisfy the standard — the schedule itself is the requirement. III.C.4 Manage and document incidents (D) addresses incidents, not the governance design failure of having no monitoring schedule."},
    {id:"DIII-IIIC-RET02",pi:"III.C.2",isRetrieval:true,comp:"III.C",bokRef:"III.C.2 — Conduct continuous monitoring of the AI system, and establish a regular schedule for maintenance, updates and retraining.",stem:"A governance professional is designing a monitoring plan for a credit risk model. A colleague argues the model should only be retrained when a regulator requires it. What does III.C.2 say about the retraining trigger?",options:{A:"Retraining is triggered only by regulatory changes or model accuracy drops exceeding a predefined threshold set by the development team",B:"III.C.2 delegates retraining decisions to the model development team, which sets thresholds based on technical performance indicators",C:"Retraining is only required when the training dataset is refreshed — other performance changes fall outside the III.C.2 obligation",D:"III.C.2 requires establishing a regular schedule for maintenance, updates and retraining as part of continuous monitoring, not solely when regulators require it"},correct:"D",explanation:"III.C.2 does not limit retraining to regulatory triggers. 'Regular schedule' implies proactive, planned governance. Options A, B, and C all impose conditions the BOK text does not support — the schedule must be regular and established upfront."},
    {id:"DIII-IIIC-RET03",pi:"III.C.2",isRetrieval:true,comp:"III.C",bokRef:"III.C.2 — Conduct continuous monitoring of the AI system, and establish a regular schedule for maintenance, updates and retraining.",stem:"An NLP model's prediction accuracy declines over time as customer communication language evolves beyond its training distribution. What term best describes this, and what does III.C.2 require in response?",options:{A:"Data drift — III.C.2 requires continuous monitoring and a regular retraining schedule to detect and respond to such distributional changes",B:"Model brittleness — III.C.5 requires cross-functional collaboration to diagnose the root cause through a formal post-incident review",C:"Concept drift — III.B.4 requires the testing team to identify and manage this as an issue discovered during post-training evaluation",D:"Distribution shift — III.C.3 requires a periodic audit to formally assess system performance and determine whether retraining is warranted"},correct:"A",explanation:"Evolving language patterns represent data drift — inputs shifting away from training distribution. III.C.2's continuous monitoring and regular retraining schedule is designed to detect and respond to this. Cross-functional analysis (B, III.C.5) applies after incidents — it's reactive. III.B.4 Identify and manage issues (C) applies during training/testing, not post-deployment. Periodic audits (D, III.C.3) are structured assessments, not the primary mechanism for detecting gradual drift."},
    {id:"DIII-IIIC-RET04",pi:"III.C.2",isRetrieval:true,comp:"III.C",bokRef:"III.C.2 — Conduct continuous monitoring of the AI system, and establish a regular schedule for maintenance, updates and retraining.",stem:"A governance professional joins a company that monitors only model accuracy, precision, and recall metrics. She argues the monitoring scope is incomplete. What does III.C.2 require to be monitored?",options:{A:"Accuracy, precision, and recall — these are the core statistical indicators III.C.2 is designed to track for ongoing compliance purposes",B:"The AI system as a whole, under a broad monitoring obligation that includes establishing a regular schedule for maintenance, updates, and retraining",C:"Data quality metrics only — model performance monitoring is addressed separately through III.C.3 periodic structured assessments",D:"User feedback and complaint rates as the primary behavioral indicators that supplement traditional statistical performance metrics"},correct:"B",explanation:"III.C.2 requires 'continuous monitoring of the AI system' — the scope is the system as a whole, not just accuracy metrics. The obligation explicitly includes establishing a schedule for maintenance, updates, and retraining. Limiting to statistical metrics (A) is too narrow. Splitting monitoring from performance assessment (C) misreads III.C.2 and III.C.3 Conduct periodic activities as mutually exclusive. User feedback (D) may inform monitoring but is not the BOK's stated scope."},
    {id:"DIII-IIIC-RET05",pi:"III.C.2",isRetrieval:true,comp:"III.C",bokRef:"III.C.2 — Conduct continuous monitoring of the AI system, and establish a regular schedule for maintenance, updates and retraining.",stem:"A software vendor licenses an AI system to a hospital. Post-deployment, model performance degrades due to changed clinical workflows. Both the vendor and hospital claim the other party is responsible for continuous monitoring. Which governance principle applies?",options:{A:"The vendor retains all III.C.2 monitoring obligations as the AI system's developer, regardless of which entity deploys and operates it",B:"The hospital assumes all monitoring obligations upon deployment, fully releasing the vendor from any III.C.2 duties or responsibilities",C:"III.C.2 applies at each governance level — the deployer conducts continuous monitoring of the operating system; the developer retains maintenance and retraining obligations",D:"Monitoring responsibilities are determined solely by contract — III.C.2 does not assign obligations between AI developers and deployers independently"},correct:"C",explanation:"III.C.2 and I.B.5 Identify differences among AI developers, providers, deployers and users indicate monitoring obligations exist at each level. The deployer (hospital) must conduct continuous monitoring; the developer retains maintenance and retraining obligations. Neither party can fully transfer all obligations. Contract terms (D) do not override BOK governance obligations — III.C.2 creates independent standards."}
