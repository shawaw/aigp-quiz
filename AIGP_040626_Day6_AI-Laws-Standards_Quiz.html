<title>AIGP Quiz — Day 6 · AI Laws &amp; Standards</title>

<body>
<div id="quiz-root"></div>
<script src="quiz-engine.js"></script>
<script>
initQuiz({
  day:6, week:1, comp:"II.C+D", topic:"AI Laws & Standards",
  filename:"AIGP_040626_Day6_AI-Laws-Standards_Quiz.html",
  webhookUrl:"https://script.google.com/macros/s/AKfycbyCG5oTGoPsjE9ytN3NJbsAv45GO0_uxb5gjXL7K8trVSiOfG05tQ0LV3wnjtuj7Bir/exec",
  questions:[
    {id:"DI-IA-R01",comp:"I.A",isRetrieval:true,
     stem:"A company's content recommendation engine consistently shows users only content matching their existing beliefs, reinforcing polarisation. Which responsible AI principle is most directly violated?",
     options:{A:"Transparency and explainability",B:"Fairness and human-centricity",C:"Privacy and security",D:"Accountability"},
     correct:"B",
     explanation:"Fairness and human-centricity require AI systems to avoid reinforcing harmful biases and to serve individuals' genuine interests. A system that manipulates beliefs through selective exposure violates these principles. Transparency (A) concerns disclosure, not content selection. Privacy (C) concerns data handling. Accountability (D) concerns responsibility allocation.",
     bokRef:"I.A — Identify and apply the common principles of responsible AI (e.g., fairness, safety and reliability, privacy and security, transparency and explainability, accountability and human-centricity)."},
    {id:"DI-IB-R02",comp:"I.B",isRetrieval:true,
     stem:"A 15-person fintech startup is designing its AI governance structure. It has high risk appetite and operates under financial services regulation. Which factors most directly shape the appropriate governance approach?",
     options:{A:"Number of employees and office locations",B:"Industry, risk tolerance, and company size and maturity",C:"Whether the AI systems use supervised or unsupervised learning",D:"The nationality of the founding team"},
     correct:"B",
     explanation:"The BOK explicitly states governance approaches should be differentiated based on company size, maturity, industry, products and services, objectives and risk tolerance. A fintech startup's industry (financial services regulation) and high risk appetite are directly relevant inputs. Head count alone (A) is insufficient without maturity context. Model type (C) and nationality (D) are not factors the BOK identifies.",
     bokRef:"I.B — Differentiate approaches to AI governance based upon company size, maturity, industry, products and services, objectives and risk tolerance."},
    {id:"DI-IC-R03",comp:"I.C",isRetrieval:true,
     stem:"A retailer's data privacy policy was written before it deployed AI-powered customer profiling. The AI team wants to proceed without amending the existing policy, arguing a separate AI policy is sufficient. What should the AI governance lead recommend?",
     options:{A:"Proceed — a standalone AI policy fully covers the gap",B:"Evaluate and update the existing data privacy policy to address AI-specific requirements",C:"Suspend the AI deployment until the regulator issues AI-specific privacy guidance",D:"Replace the data privacy policy entirely with an AI governance charter"},
     correct:"B",
     explanation:"The BOK requires evaluating and updating existing policies (data privacy, security, data governance, IP) for AI — not replacing them or relying solely on new standalone policies. Existing policies create legal obligations; those obligations must be extended to cover AI use. Option A creates a governance gap. Option C is unnecessarily conservative. Option D risks losing established compliance controls.",
     bokRef:"I.C — Evaluate and update existing policies (e.g., data privacy, security, data governance and intellectual property) for AI."},
    {id:"DII-IIA-R04",comp:"II.A",isRetrieval:true,
     stem:"A bank's AI system automatically rejects loan applications and sends only a generic rejection email with no explanation of the decision logic. A GDPR-supervised applicant requests to know why they were rejected. Which data controller obligation is most directly triggered?",
     options:{A:"Data minimization requirements",B:"Lawful basis and purpose limitation",C:"Data subject rights regarding automated decision-making",D:"Cross-border data transfer restrictions"},
     correct:"C",
     explanation:"GDPR Article 22 gives data subjects the right not to be subject to solely automated decisions with significant effects, and the right to obtain an explanation and request human review. The bank's fully automated rejection without explanation violates these automated decision-making obligations. Data minimization (A) concerns collection volume. Lawful basis (B) concerns the legal ground for processing. Cross-border transfers (D) concern where data flows.",
     bokRef:"II.A — Understand how obligations on data controllers apply to AI (e.g., regarding privacy impact assessments, use of third-party processors, cross-border data transfers, data subject rights, automated decision making, incident management, breach notification and record keeping)."},
    {id:"DII-IIB-R05",comp:"II.B",isRetrieval:true,
     stem:"An AI company trains an image generation model on 50 million photos scraped from artist websites without obtaining licences or permission. Which legal domain is most directly implicated?",
     options:{A:"Consumer protection law — unfair and deceptive practices",B:"Product liability law — design defects",C:"Nondiscrimination law — disparate impact on artists",D:"Intellectual property law — use of data for AI training"},
     correct:"D",
     explanation:"IP law governs whether copyrighted works can be used to train AI models. Scraping without licence raises copyright infringement claims — a live area of litigation in multiple jurisdictions. Consumer protection (A) applies to deceptive acts toward end-users. Product liability (B) concerns physical or functional defects. Nondiscrimination (C) applies to discriminatory outcomes against protected classes, not to commercial licensing of creative works.",
     bokRef:"II.B — Understand how intellectual property laws apply to AI (e.g., prohibiting or limiting use of data for AI training)."},
    {id:"DII-IIC-006",comp:"II.C",isRetrieval:false,
     stem:"A municipal government deploys an AI system that evaluates citizens' compliance with local regulations and uses scores to restrict their access to public transport subsidies and business licences. Under the EU AI Act, how should this system be classified?",
     options:{A:"High-risk — it affects access to essential services",B:"Limited-risk — transparency disclosure is sufficient",C:"Prohibited — social scoring by public authorities is banned",D:"Minimal-risk — it is a government administrative tool"},
     correct:"C",
     explanation:"Social scoring by public authorities — evaluating trustworthiness of natural persons based on social behaviour and restricting rights or services — is explicitly prohibited under the EU AI Act regardless of the context. It is not merely high-risk with requirements; it cannot be placed on the market at all. Options A, B and D all incorrectly imply the system could be used with appropriate safeguards.",
     bokRef:"II.C — Understand the risk classification framework for AI (e.g., prohibited/high/limited/minimal risk) and what systems/uses fall into each category."},
    {id:"DII-IIC-007",comp:"II.C",isRetrieval:false,
     stem:"A bank deploys an AI chatbot on its website that can answer questions about account types and interest rates but cannot approve or deny any financial product. It is presented as 'Ask our assistant.' Which EU AI Act risk tier applies?",
     options:{A:"High-risk — it is in the financial services sector",B:"Limited-risk — chatbots must disclose their AI nature to users",C:"Minimal-risk — it performs no consequential decisions",D:"Prohibited — it could influence financial decisions"},
     correct:"B",
     explanation:"Chatbots fall under the limited-risk tier: they face a transparency obligation requiring disclosure that the user is interacting with an AI, unless this is obvious from context. The financial sector classification does not automatically make a chatbot high-risk — the system must be assessing creditworthiness or making consequential decisions to reach that tier. Minimal-risk (C) would apply to something like a spam filter. Prohibited (D) has no basis here.",
     bokRef:"II.C — Understand the risk classification framework for AI (e.g., prohibited/high/limited/minimal risk) and what systems/uses fall into each category."},
    {id:"DII-IIC-008",comp:"II.C",isRetrieval:false,
     stem:"A provider is preparing to place a high-risk AI system for employment screening on the EU market. Which combination of requirements must be satisfied before market placement?",
     options:{A:"Privacy impact assessment and user acceptance testing only",B:"Technical documentation, conformity assessment, and registration in the EU AI Act database",C:"CE marking obtained via mandatory third-party audit by an EU notified body",D:"A fundamental rights impact assessment completed by the provider"},
     correct:"B",
     explanation:"High-risk AI providers must: prepare technical documentation, conduct a conformity assessment (self-assessment for most high-risk systems), and register in the EU database before placing the system on the market. CE marking follows from conformity assessment for regulated products — it is not a separate standalone requirement. Third-party notified body audit (C) is mandatory only for certain categories (biometric ID, safety components under product safety directives). FRIA (D) is a deployer obligation, not a provider pre-market obligation.",
     bokRef:"II.C — Understand the key requirements around risk management, data governance, technical documentation, conformity/impact assessments and record keeping."},
    {id:"DII-IIC-009",comp:"II.C",isRetrieval:false,
     stem:"A high-risk AI system used in hospital diagnostics makes treatment recommendations. The hospital's protocol requires that an attending physician can pause the system mid-session and review or override any recommendation before it is acted upon. Which EU AI Act requirement does this protocol satisfy?",
     options:{A:"Quality management system requirements",B:"Data governance requirements",C:"Human oversight requirements",D:"Transparency and notification requirements"},
     correct:"C",
     explanation:"The EU AI Act requires that high-risk AI systems allow natural persons to effectively oversee the system's functioning, including the ability to intervene, override or halt the system. The physician's ability to pause and review directly implements the human oversight requirement. Quality management (A) concerns systematic processes, not real-time intervention. Data governance (B) concerns data quality and lineage. Transparency (D) concerns disclosure of AI use to affected parties.",
     bokRef:"II.C — Understand the key requirements around human oversight, transparency and notification, and quality management."},
    {id:"DII-IIC-010",comp:"II.C",isRetrieval:false,
     stem:"An AI lab releases the model weights of its large language model publicly. The model was trained using 5×10²⁴ FLOPs. Which EU AI Act obligations apply to the lab?",
     options:{A:"All GPAI provider obligations including systemic-risk requirements such as red-teaming and incident reporting",B:"Basic GPAI provider obligations only — technical documentation, copyright compliance, and training data summary",C:"No obligations — open-source model releases are fully exempt from the EU AI Act",D:"High-risk AI obligations, since LLMs can be integrated into high-risk applications"},
     correct:"B",
     explanation:"The systemic-risk threshold is 10²⁵ FLOPs. At 5×10²⁴, the model is below this threshold, so systemic-risk obligations (adversarial testing, incident reporting to EU AI Office, cybersecurity measures) do not apply. Basic GPAI provider obligations apply to all GPAI models: technical documentation for downstream providers, EU copyright compliance, and a summary of training data. Open-source does not grant full exemption (C) — only partial relief from some obligations. The GPAI tier is separate from the high-risk tier (D).",
     bokRef:"II.C — Understand the distinct requirements for general-purpose AI models."},
    {id:"DII-IIC-011",comp:"II.C",isRetrieval:false,
     stem:"During a market surveillance investigation, an EU authority finds that a US-based provider submitted materially inaccurate information in response to a formal information request about its AI system. What is the maximum applicable penalty?",
     options:{A:"€35 million or 7% of global annual turnover",B:"€15 million or 3% of global annual turnover",C:"€7.5 million or 1.5% of global annual turnover",D:"No penalty — the company operates outside EU jurisdiction"},
     correct:"C",
     explanation:"The EU AI Act establishes three penalty tiers: prohibited AI violations (€35M/7%), most other obligation violations (€15M/3%), and supplying incorrect information to authorities (€7.5M/1.5%). Submitting inaccurate information to authorities falls in the lowest tier. Jurisdiction (D) is not a valid defence — the Act applies to AI systems placed on the EU market regardless of where the provider is based.",
     bokRef:"II.C — Understand the enforcement framework and penalties for noncompliance."},
    {id:"DII-IIC-012",comp:"II.C",isRetrieval:false,
     stem:"A technology company acquires a high-risk AI recruitment screening tool, adds proprietary bias-weighting algorithms, and re-releases it under its own brand name. How does the EU AI Act classify this company for the modified system?",
     options:{A:"Distributor — it did not build the underlying model",B:"Deployer — it is using the system in a professional context",C:"Provider — it substantially modified the system and placed it on the market under its own name",D:"Importer — it sourced the original system from another provider"},
     correct:"C",
     explanation:"An entity that substantially modifies a high-risk AI system and places it on the market under its own name becomes a provider for that modified system — triggering the full suite of provider obligations: technical documentation, conformity assessment, registration and quality management system. Distributor (A) does not modify the system. Deployer (B) uses but does not substantially modify or re-release. Importer (D) places a third-country system on the EU market without modification.",
     bokRef:"II.C — Understand the differences in requirements based on organizational context (e.g., providers, deployers, importers and distributors)."},
    {id:"DII-IIC-013",comp:"II.C",isRetrieval:false,
     stem:"An EU-based social platform's AI system automatically removes posts flagged as policy violations with no human review at any stage. Thousands of decisions are made daily. Which EU AI Act requirement is most directly implicated?",
     options:{A:"Data governance — training data quality is insufficient",B:"Technical documentation — logs are not maintained",C:"Human oversight — effective monitoring and intervention capability is absent",D:"Quality management system — performance metrics are not tracked"},
     correct:"C",
     explanation:"The EU AI Act requires that high-risk AI systems include measures enabling humans to effectively monitor, understand and intervene in the system's operation, including the ability to stop or override. A system making thousands of consequential content decisions with zero human review violates human oversight requirements. Data governance (A), technical documentation (B) and QMS (D) may also have issues, but the absence of any human oversight is the most direct and specific violation described.",
     bokRef:"II.C — Understand the key requirements around human oversight, transparency and notification, and quality management."},
    {id:"DII-IID-014",comp:"II.D",isRetrieval:false,
     stem:"A governance team debates sequencing: should GOVERN be completed before MAP and MEASURE in the NIST AI RMF? What is the correct understanding?",
     options:{A:"GOVERN must be completed first; it defines all policies before any risk identification begins",B:"GOVERN runs in parallel with MAP, MEASURE and MANAGE — it is not a sequential predecessor step",C:"GOVERN is completed last, after risks have been fully identified, measured and treated",D:"GOVERN is optional for organisations with an existing enterprise risk management framework"},
     correct:"B",
     explanation:"The NIST AI RMF explicitly positions GOVERN as foundational and continuous — it establishes the culture, policies, roles and accountability structures that inform and enable MAP, MEASURE and MANAGE throughout the lifecycle. It is not a phase that must be finished before the others start, nor is it a final step. GOVERN is not optional (D) — it is the function that gives the other three legitimacy and direction.",
     bokRef:"II.D — Understand the NIST AI Risk Management Framework and Playbook (e.g., core functions, categories and subcategories)."},
    {id:"DII-IID-015",comp:"II.D",isRetrieval:false,
     stem:"An AI risk team has catalogued 47 risks associated with a biometric verification system and completed quantitative assessments for each. They now need to select, prioritise and implement controls, and assign ownership for residual risks. Which NIST AI RMF function covers this work?",
     options:{A:"GOVERN",B:"MAP",C:"MEASURE",D:"MANAGE"},
     correct:"D",
     explanation:"MANAGE covers the prioritisation and implementation of risk treatments — controls, mitigation plans, incident response preparation and assignment of residual risk ownership. MAP (B) is the identification and context-setting phase. MEASURE (C) covers analysis and quantification of identified risks. GOVERN (A) provides the overarching policies and accountability structures — it does not handle specific control implementation.",
     bokRef:"II.D — Understand the NIST AI Risk Management Framework and Playbook (e.g., core functions, categories and subcategories)."},
    {id:"DII-IID-016",comp:"II.D",isRetrieval:false,
     stem:"The OECD AI Principles include a requirement that AI actors be accountable for the proper functioning of AI systems and for respect of the other principles. Which of the five OECD principles does this reflect?",
     options:{A:"Inclusive growth, sustainable development and well-being",B:"Robustness, security and safety",C:"Transparency and explainability",D:"Accountability"},
     correct:"D",
     explanation:"The fifth OECD AI Principle is Accountability — AI actors must be accountable for ensuring that AI systems respect the principles. Robustness (B) concerns resilience and safety. Transparency (C) concerns disclosure and explainability of AI systems. Inclusive growth (A) concerns the broad societal benefits of AI. The accountability principle is what binds the others together by assigning responsibility.",
     bokRef:"II.D — Understand the Organisation for Economic Co-operation and Development (OECD) principles, framework, policies and recommended practices for trustworthy AI."},
    {id:"DII-IID-017",comp:"II.D",isRetrieval:false,
     stem:"An organisation wants formal third-party certification to demonstrate its AI governance practices meet an internationally recognised standard. Which ISO standard is the correct basis for this certification?",
     options:{A:"ISO/IEC 22989 — AI concepts and terminology",B:"ISO/IEC 42001 — AI management system",C:"ISO/IEC 42005 — AI system impact assessment",D:"ISO/IEC 27001 — information security management"},
     correct:"B",
     explanation:"ISO/IEC 42001 is the AI Management System (AIMS) standard — the only AI-specific ISO standard that organisations can be formally certified against. It specifies requirements for establishing, implementing, maintaining and improving an AI management system, including an Annex A control set. ISO 22989 (A) is a terminology standard with no certification path. ISO 42005 (C) is guidance for impact assessments, not certifiable. ISO 27001 (D) covers information security, not AI governance specifically.",
     bokRef:"II.D — Understand the core ISO AI standards (i.e., 22989, 42001 and 42005)."},
    {id:"DII-IID-018",comp:"II.D",isRetrieval:false,
     stem:"A product team wants to conduct a structured assessment of who might be harmed by their AI system, what harms may arise, and how those harms could be mitigated before deployment. Which ISO standard provides guidance specifically designed for this purpose?",
     options:{A:"ISO/IEC 22989",B:"ISO/IEC 42001",C:"ISO/IEC 42005",D:"ISO/IEC 27005"},
     correct:"C",
     explanation:"ISO/IEC 42005 provides guidance on AI system impact assessment — a structured process for identifying affected stakeholders, assessing potential harms, and determining mitigations. ISO 22989 (A) covers terminology only. ISO 42001 (B) is the management system standard covering governance processes, not specifically impact assessment methodology. ISO 27005 (D) covers information security risk management, not AI impact assessment.",
     bokRef:"II.D — Understand the core ISO AI standards (i.e., 22989, 42001 and 42005)."},
    {id:"DII-IID-019",comp:"II.D",isRetrieval:false,
     stem:"A government minister claims that the OECD AI Policy Observatory enforces AI standards in member countries and can issue binding compliance orders against organisations. How should an AI governance professional correct this claim?",
     options:{A:"The Observatory enforces voluntary standards only; it cannot issue binding orders",B:"The Observatory is an information and policy-monitoring function — it has no enforcement or standard-setting authority",C:"The Observatory's standards are binding in EU member states through the EU AI Act",D:"The Observatory enforces standards but only in non-EU OECD member countries"},
     correct:"B",
     explanation:"The OECD AI Policy Observatory monitors national AI policies and strategies globally and serves as a knowledge-sharing platform. It has no enforcement authority, issues no binding standards, and cannot direct organisations or governments to comply with anything. All OECD AI Principles are voluntary recommendations to governments. Options A, C and D all incorrectly attribute regulatory or quasi-regulatory power to the Observatory.",
     bokRef:"II.D — Understand the Organisation for Economic Co-operation and Development (OECD) principles, framework, policies and recommended practices for trustworthy AI."},
    {id:"DII-IID-020",comp:"II.D",isRetrieval:false,
     stem:"An AI risk team completed MAP (risk identification) and MEASURE (risk quantification) for a new AI system but has not yet established governance policies, assigned AI risk ownership, or defined escalation procedures. Which NIST AI RMF function gap does this represent?",
     options:{A:"MANAGE — the team has not yet implemented risk controls",B:"GOVERN — foundational governance structures and accountability are missing",C:"MAP — the team has not completed full risk context-setting",D:"MEASURE — quantification without governance benchmarks is incomplete"},
     correct:"B",
     explanation:"GOVERN covers the foundational layer: policies, roles, accountability, culture and oversight structures that enable the organisation to manage AI risks. Without policies defining who owns AI risks or how decisions escalate, MAP and MEASURE outputs have no institutional framework to act on. MANAGE (A) concerns control implementation, which cannot be effective without GOVERN. The described gap is not in identification (MAP/C) or measurement (MEASURE/D) but in the governance infrastructure.",
     bokRef:"II.D — Understand the NIST AI Risk Management Framework and Playbook (e.g., core functions, categories and subcategories)."}
  ]
});
</script>
