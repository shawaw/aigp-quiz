  webhookUrl:"https://script.google.com/macros/s/AKfycbyCG5oTGoPsjE9ytN3NJbsAv45GO0_uxb5gjXL7K8trVSiOfG05tQ0LV3wnjtuj7Bir/exec",
  questions:[
    {id:"DI-IA-001",comp:"I.A",isRetrieval:false,
     stem:"An AI hiring system deployed across a multinational employer screens 500,000 applications monthly. A post-deployment audit finds the model consistently scores candidates from certain demographic groups lower, affecting employment prospects at scale. Which type of risk, as identified in the BOK, does this most directly illustrate?",
     options:{A:"The opacity risk arising from the model's inability to provide interpretable explanations for individual hiring decisions made during screening",B:"The ethics and bias risk combined with complexity and scalability risk, as AI harm propagates across large populations simultaneously",C:"The data dependency risk arising from reliance on historical hiring data that may not reflect current workforce requirements or availability",D:"The misalignment risk from the employer's failure to align the AI system's objectives with its stated organizational hiring values"},
     correct:"B",explanation:"I.A.2 identifies 'ethics and bias risk' and 'complexity and scalability' as types of harm. Large-scale demographic impact is the textbook example of both. A describes opacity (I.A.3). C describes data dependency (I.A.3). D describes misalignment (I.A.2), which is plausible but secondary — the question identifies scale of harm as the dominant feature.",
     bokRef:"I.A.2 — Identify the types of risks and harms posed by AI to individuals, groups, organizations and society (e.g., misalignment with objectives, ethics and bias risk, and complexity and scalability)."},
    {id:"DI-IA-002",comp:"I.A",isRetrieval:false,
     stem:"A government agency deploying a predictive policing AI is challenged by advocates: the system cannot explain why neighborhoods are flagged, and residents have no mechanism to contest outcomes. Which responsible AI principle is most directly implicated?",
     options:{A:"Fairness, because the system may produce racially disparate policing outcomes affecting protected communities disproportionately",B:"Privacy and security, because the system processes sensitive location and behavioral data without adequate minimization or security controls",C:"Safety and reliability, because the model may generate false positives that trigger unnecessary law enforcement responses in residential areas",D:"Transparency, explainability, and accountability with human-centricity, because affected residents lack access to explanations and meaningful contestation"},
     correct:"D",explanation:"I.A.4 lists transparency and explainability, accountability and human-centricity as responsible AI principles. The scenario's twin problems — no explanation and no contestation — map directly to these. A (fairness) is a real concern but secondary to the stated challenge. B and C are not what the scenario describes.",
     bokRef:"I.A.4 — Identify and apply the common principles of responsible AI (e.g., fairness, safety and reliability, privacy and security, transparency and explainability, accountability and human-centricity)."},
    {id:"DI-IA-003",comp:"I.A",isRetrieval:false,
     stem:"A compliance team is defining which systems fall within scope of its AI governance policy. Which of the following best reflects a generally accepted definition of an AI system for governance purposes?",
     options:{A:"A machine-based system that infers from inputs how to generate outputs such as predictions, content, recommendations, or decisions that can influence physical or virtual environments",B:"Any software that automates decision-making, including rule-based expert systems that execute pre-programmed logical instructions without statistical learning",C:"A computational model trained on historical data using machine learning to identify patterns and produce outputs in response to new inputs provided by users",D:"An advanced neural-network algorithm that processes unstructured data to generate human-like outputs across language, vision, or multimodal tasks"},
     correct:"A",explanation:"A reflects the OECD/EU AI Act definition adopted as the generally accepted standard — broad enough to cover ML, symbolic AI, and hybrid systems. B is too broad (pure rule-based systems are generally excluded). C is too narrow (ML only). D is too narrow (neural networks only).",
     bokRef:"I.A.1 — Know the generally accepted definitions and types of AI."},
    {id:"DI-IB-004",comp:"I.B",isRetrieval:false,
     stem:"RetailCo licenses a recommendation AI from ModelVendor and integrates it into its e-commerce platform. RetailCo configures recommendation thresholds and manages data inputs. A customer complains that recommendations caused a privacy harm. How should the governance roles be characterized?",
     options:{A:"ModelVendor is the provider and bears full compliance obligations regardless of how RetailCo has configured the deployment environment for the product",B:"RetailCo is the developer because it modified the model's configuration and is responsible for all design choices contributing to the privacy harm",C:"RetailCo is the deployer bearing operational governance obligations, while ModelVendor as provider retains responsibility for foundational design and compliance documentation",D:"Both parties share identical obligations because co-deployment arrangements eliminate role distinctions and require joint regulatory filings for AI compliance"},
     correct:"C",explanation:"I.B.5 identifies distinct roles. ModelVendor as the party that trained and made the model available is the provider. RetailCo, who uses it in their own operation (configuring and deploying), is the deployer. A incorrectly says ModelVendor bears 'full' obligations. B misidentifies RetailCo as developer — configuration does not equal development. D is wrong; roles remain distinct.",
     bokRef:"I.B.5 — Identify differences among AI developers, providers, deployers and users from a governance perspective (e.g., with respect to responsibilities, opportunities and needs)."},
    {id:"DI-IB-005",comp:"I.B",isRetrieval:false,
     stem:"A 15-person fintech startup with a narrow consumer payments product wants to establish an AI governance program. The CEO asks what governance approach is appropriate. Which recommendation correctly applies BOK guidance on differentiated governance approaches?",
     options:{A:"Adopt the same comprehensive governance structure as large financial institutions to ensure regulatory readiness as the organization scales its AI capabilities",B:"Design a proportionate governance program scaled to the startup's size, maturity, industry context, products, and risk tolerance rather than adopting enterprise-grade frameworks",C:"Defer governance program development until the organization reaches sufficient maturity to implement cross-functional AI committees with dedicated legal and risk resources",D:"Focus governance resources exclusively on applicable payment regulations without extending scope to broader AI-specific governance structures or frameworks"},
     correct:"B",explanation:"I.B.4 explicitly requires differentiation based on company size, maturity, industry, products/services, objectives, and risk tolerance. A proportionate approach is the BOK answer. A ignores differentiation. C (defer) and D (narrow scope only) both fail the I.B.4 requirement.",
     bokRef:"I.B.4 — Differentiate approaches to AI governance based upon company size, maturity, industry, products and services, objectives and risk tolerance."},
    {id:"DI-IB-006",comp:"I.B",isRetrieval:false,
     stem:"An organization launches an AI governance program. The CTO asks who should own AI risk assessment across the business. Which approach to defining roles and responsibilities best reflects BOK guidance under I.B.1?",
     options:{A:"Define specific roles with clear accountability for AI risk assessment, model approval, incident response, and oversight, mapped to existing governance structures and decision rights",B:"Assign all AI governance responsibilities to the Chief Data Officer as the single accountable executive to ensure consistency across all business units",C:"Establish a dedicated AI ethics board composed entirely of external advisors to provide independent oversight while keeping internal teams focused on delivery",D:"Create a rotational AI governance committee drawn from all business units on a quarterly basis to distribute responsibilities equitably across the organization"},
     correct:"A",explanation:"I.B.1 requires defining specific roles and responsibilities for AI governance stakeholders. A maps to this directly — clear accountability, mapped to existing governance. B (single accountable exec) conflicts with I.B.2's cross-functional collaboration principle. C (external only) lacks internal accountability. D (rotational) does not ensure effective, stable governance.",
     bokRef:"I.B.1 — Define roles and responsibilities for AI governance stakeholders."},
    {id:"DI-IB-007",comp:"I.B",isRetrieval:false,
     stem:"A hospital has deployed an AI diagnostic tool. Two months later, clinical staff are observed bypassing the system's confidence flags and entering diagnoses without reviewing AI output. The governance team concludes this reflects a training gap. Which I.B obligation has most likely been inadequately fulfilled?",
     options:{A:"The obligation to define roles and responsibilities for AI governance stakeholders, including clinicians and IT teams involved in system operation and review",B:"The obligation to establish cross-functional collaboration so clinical informatics and governance teams jointly review AI performance and workflow integration",C:"The obligation to differentiate governance approaches based on clinical risk context and the specific characteristics of diagnostic AI tools deployed in patient settings",D:"The obligation to create and deliver a training and awareness program to all stakeholders on AI terminology, strategy, and governance including proper use of AI outputs"},
     correct:"D",explanation:"Staff bypassing the system reflects a failure to ensure they understand how to use it correctly — this is the I.B.3 training and awareness obligation. A relates to I.B.1 (roles). B relates to I.B.2 (cross-functional collaboration). C relates to I.B.4 (differentiated approaches). D (I.B.3) is the direct fit for a training gap.",
     bokRef:"I.B.3 — Create and deliver a training and awareness program to all stakeholders on AI terminology, strategy and governance."},
    {id:"DI-IC-008",comp:"I.C",isRetrieval:false,
     stem:"An AI review team finds that organizational governance policies cover use case assessment, model development, and deployment, but contain no provisions for handling AI-related incidents after they occur. Which AI lifecycle stage is missing from the policies, as required by I.C.1?",
     options:{A:"Ethics by design, which requires embedding ethical considerations into model selection and architecture decisions made during the development stage",B:"Documentation and reporting, which requires maintaining records of model performance, updates, and communications throughout the system's operational period",C:"Incident management, which requires policies for detecting, responding to, and reporting AI-related harms, failures, or adverse outcomes after deployment",D:"Training and testing, which requires documenting the validation methodology and acceptance criteria applied to the model before production release"},
     correct:"C",explanation:"I.C.1 lists nine lifecycle stages explicitly. The scenario describes a post-deployment gap in responding to adverse outcomes — that is incident management. A (ethics by design), B (documentation), and D (training and testing) are all covered per the scenario description. C is the specific gap identified.",
     bokRef:"I.C.1 — Create and implement policies to ensure oversight and accountability across all AI life cycle stages (e.g., use case assessment, risk management, ethics by design, data acquisition and use, model and system development, training and testing, deployment and monitoring, documentation and reporting, and incident management)."},
    {id:"DI-IC-009",comp:"I.C",isRetrieval:false,
     stem:"An organization's data privacy policy prohibits sharing personal data with third parties without consent. A new AI system generates behavioral profiles shared with a marketing partner — an activity not contemplated by the original policy. What does I.C.2 require the organization to do?",
     options:{A:"Evaluate and update the existing data privacy policy to address AI-specific uses including behavioral profiling and AI-enabled third-party sharing, not merely supplement it with addenda",B:"Create a separate standalone AI ethics policy that supersedes the existing data privacy policy for all processing activities performed by AI systems",C:"Obtain new explicit consent from all affected data subjects before proceeding, unless the current privacy notice already covers behavioral profiling broadly",D:"Discontinue the behavioral profiling activity and redesign the AI system's architecture to avoid any processing not contemplated by the original policy"},
     correct:"A",explanation:"I.C.2 requires evaluating and updating existing policies (data privacy, security, data governance, IP) for AI — not just adding an overlay. A correctly describes this obligation. B (separate policy) isn't required by I.C.2. C (consent alone) addresses II.A.1 but not I.C.2. D (discontinue) is too extreme and not what I.C.2 requires.",
     bokRef:"I.C.2 — Evaluate and update existing policies (e.g., data privacy, security, data governance and intellectual property) for AI."},
    {id:"DI-IC-010",comp:"I.C",isRetrieval:false,
     stem:"A financial services firm is evaluating a third-party AI fraud detection vendor and drafting the procurement contract. Which contract provision most directly fulfills the I.C.3 obligation to manage third-party risk through contracts?",
     options:{A:"A warranty clause requiring the vendor to certify that the AI system produces fraud detection decisions that are accurate and verified in all deployment environments",B:"Contractual clauses specifying AI-specific risk management requirements, audit rights, model performance standards, data rights, and incident reporting obligations",C:"A standard indemnification clause holding the vendor liable for all regulatory fines incurred by the financial institution as a result of the AI system's outputs",D:"A termination clause permitting exit within 30 days if the vendor fails any service-level agreement metric during any calendar quarter"},
     correct:"B",explanation:"I.C.3 requires creating and implementing contracts to manage third-party risk across procurement, supply chain, HR, and acceptable use. B is the only option that covers the AI-specific scope required by I.C.3 — audit rights, model standards, data rights, incident reporting. A (warranty only), C (indemnification only), and D (SLA exit only) each address narrow contract mechanics without the governance substance I.C.3 requires.",
     bokRef:"I.C.3 — Create, update and implement policies, assessments and contracts to manage third-party risk (e.g., procurement, supply chain, human resources and acceptable use)."},
    {id:"DI-IC-011",comp:"I.C",isRetrieval:false,
     stem:"An insurer's AI claims system makes incorrect payment denials for 4,000 claimants due to a model error undetected for six months. Post-incident review finds no policy governing how AI adverse outcomes are identified, escalated, or communicated to affected parties. Which lifecycle policy gap does this identify under I.C.1?",
     options:{A:"Deployment and monitoring, because the organization lacked continuous monitoring controls to detect model drift or performance degradation during operation",B:"Documentation and reporting, because the insurer did not maintain logs of AI decisions or produce regular performance reports that would have surfaced the error",C:"Incident management, because there was no policy for detecting, escalating, responding to, or notifying affected parties about adverse AI outcomes once identified",D:"Risk management, because the absence of a risk assessment allowed the model error to persist through the AI system's design and development phase"},
     correct:"C",explanation:"The scenario focuses on the post-detection response gap — no policy for escalation or notification of affected parties. That is incident management. A (monitoring) would have detected the error earlier but the specific policy gap described is post-detection response. B is related but the described gap is response and notification, not record-keeping. D refers to pre-deployment risk assessment.",
     bokRef:"I.C.1 — Create and implement policies to ensure oversight and accountability across all AI life cycle stages (e.g., ... incident management)."},
    {id:"DII-IIA-012",comp:"II.A",isRetrieval:false,
     stem:"A company launches an AI assistant that learns from user interactions to improve its responses. Users are not informed that conversations will be used for model training, and no disclosure covers this purpose. Which II.A.1 requirement is most directly violated?",
     options:{A:"The transparency and purpose limitation requirements, which obligate organizations to inform users how data will be used and restrict processing to the disclosed purpose",B:"The data minimization requirements, which prohibit collecting more user interaction data than strictly necessary for the core service functionality",C:"The lawful basis requirement, which requires identifying and documenting a valid legal basis before using personal data for model training activities",D:"The choice requirement, which entitles users to opt out of any data processing beyond what is strictly necessary for the contracted service"},
     correct:"A",explanation:"The scenario describes undisclosed use of interaction data for training — a transparency failure (users not informed) and purpose limitation failure (training was not the disclosed purpose). C (lawful basis) is also in II.A.1 but the direct violation is the transparency/purpose limitation requirement. B is II.A.2. D is related but narrower than A.",
     bokRef:"II.A.1 — Understand how transparency, choice, lawful basis and purpose limitation requirements apply to AI."},
    {id:"DII-IIA-013",comp:"II.A",isRetrieval:false,
     stem:"A bank's AI system automatically declines mortgage applications below a risk threshold with no human review. An applicant requests an explanation and asks for a human to review the decision. Under data controller obligations (II.A.3), which right is the applicant most likely invoking?",
     options:{A:"The right to data portability, which allows data subjects to receive personal data in a structured format for comparison with another controller's processing",B:"The right to erasure, which requires deletion of all personal data used by the AI model in processing the applicant's mortgage application upon request",C:"The right to rectification, which entitles the applicant to correct inaccurate personal data that may have contributed to the adverse scoring outcome",D:"The right not to be subject to solely automated decisions, entitling the applicant to obtain human review, express their point of view, and contest the decision"},
     correct:"D",explanation:"II.A.3 explicitly covers automated decision making as a data controller obligation. A solely automated mortgage decline producing significant effects triggers the right in GDPR Article 22. D is the precise right being invoked. C (rectification) is plausible as a secondary claim but is not the primary right — the applicant wants human review, not data correction. A and B are unrelated to the facts.",
     bokRef:"II.A.3 — Understand how obligations on data controllers apply to AI (e.g., regarding privacy impact assessments, use of third-party processors, cross-border data transfers, data subject rights, automated decision making, incident management, breach notification and record keeping)."},
    {id:"DII-IIA-014",comp:"II.A",isRetrieval:false,
     stem:"A healthcare organization builds an AI diagnostic model using 10 years of comprehensive patient records, including full address history, employment status, and recreational activity logs — none of which are used in the final diagnosis algorithm. The privacy team flags a concern. Which II.A.2 principle does this most directly implicate?",
     options:{A:"Privacy by design, which requires conducting a privacy impact assessment before collecting any data for AI model training or development purposes",B:"Data minimization, which requires limiting collection and use of personal data to what is adequate, relevant, and necessary for the specified AI processing purpose",C:"Purpose limitation, which prohibits using personal data collected for clinical care for any secondary use including AI model training or development activities",D:"Transparency, which requires notifying patients about all categories of personal data processed by the AI and the specific purpose for each category"},
     correct:"B",explanation:"II.A.2 covers data minimization. Collecting fields that are never used in the algorithm violates the principle that data must be adequate, relevant, and not excessive relative to the processing purpose. A (PIA) is part of II.A.3 and II.A.2's PbD concept but the direct gap here is minimization, not impact assessment. C is II.A.1 (purpose limitation). D is II.A.1 (transparency).",
     bokRef:"II.A.2 — Understand how data minimization and privacy by design requirements apply to AI."},
    {id:"DII-IIA-015",comp:"II.A",isRetrieval:false,
     stem:"An employment screening company offers an AI service inferring personality traits from facial analysis during video interviews. A client employer wants to use it for hiring decisions. Which regulatory concern does II.A.4 most directly raise?",
     options:{A:"The employer may be functioning as a provider under AI-specific law, triggering mandatory technical documentation and conformity assessment obligations",B:"The AI system processes behavioral video data which may constitute personal data requiring lawful basis identification and data controller registration",C:"The AI system processes biometric data derived from facial features, constituting a sensitive or special category of data requiring heightened protection and legal basis",D:"The AI system may produce discriminatory outcomes against candidates from protected groups by inferring protected attributes from facial analysis"},
     correct:"C",explanation:"II.A.4 specifically covers sensitive or special categories of data — biometrics is the listed example. Facial feature analysis to infer traits is biometric processing, triggering heightened obligations. D (discrimination) maps to II.B.2. A maps to II.C.6. B is technically correct but describes general personal data obligations, not the special category issue II.A.4 addresses.",
     bokRef:"II.A.4 — Understand the requirements that apply to sensitive or special categories of data (e.g., biometrics)."},
    {id:"DII-IIB-016",comp:"II.B",isRetrieval:false,
     stem:"A company trains a large language model on publicly available web content scraped from news sites, creative writing platforms, and code repositories. Content creators claim their copyrighted works were used without authorization. Which II.B.1 obligation is most directly implicated?",
     options:{A:"The obligation to understand how IP laws may prohibit or limit use of copyrighted data for AI training, including claims by content owners for unauthorized scraping and use",B:"The obligation to understand how product liability laws apply to AI outputs that may contain reproductions of copyrighted material causing harm to downstream users",C:"The obligation to understand how consumer protection laws apply to AI systems that present outputs derived from copyrighted sources without disclosure to end users",D:"The obligation to understand how nondiscrimination laws apply to AI systems that generate biased outputs from training data that underrepresents certain demographic groups"},
     correct:"A",explanation:"II.B.1 specifically covers IP laws including restrictions on use of data for AI training. Unauthorized scraping of copyrighted content for model training is the textbook II.B.1 scenario. B maps to II.B.4 (product liability). C maps to II.B.3 (consumer protection). D maps to II.B.2 (nondiscrimination).",
     bokRef:"II.B.1 — Understand how intellectual property laws apply to AI (e.g., prohibiting or limiting use of data for AI training)."},
    {id:"DII-IIB-017",comp:"II.B",isRetrieval:false,
     stem:"An AI-powered customer service chatbot falsely tells consumers that a product has been 'verified by independent experts' and 'shown to reduce energy costs by 40%' when no such verification exists. A consumer protection regulator investigates. Which type of conduct does this describe under II.B.3?",
     options:{A:"Product liability conduct involving a design defect, because the chatbot's false outputs constitute a defective AI product delivered through a consumer-facing channel",B:"Intellectual property infringement, because the chatbot reproduces claims originally created by third parties without obtaining appropriate licensing or attribution",C:"Discriminatory trade practice, because the chatbot selectively delivers misleading information to consumers based on demographic characteristics or purchase history",D:"Unfair or deceptive acts or practices, because the chatbot makes false and misleading product claims that consumers rely on in making purchasing decisions"},
     correct:"D",explanation:"II.B.3 covers consumer protection law specifically prohibiting unfair and deceptive acts or practices. False product claims — stating independent verification that does not exist — is the paradigm UDAP violation. A maps to II.B.4 (product liability) but is a stretch given the facts. B is II.B.1. C misstates the facts.",
     bokRef:"II.B.3 — Understand how consumer protection laws apply to AI (e.g., prohibiting unfair and deceptive acts or practices)."},
    {id:"DII-IIB-018",comp:"II.B",isRetrieval:false,
     stem:"An insurer uses an AI model to price health insurance premiums. Analysis reveals the model assigns higher premiums to applicants from zip codes that are predominantly low-income and minority communities, even after controlling for health risk factors. No explicit protected attribute is used, but zip code acts as a proxy. Which legal framework most directly applies under II.B?",
     options:{A:"Consumer protection law, because the AI model engages in unfair pricing practices by using proxy variables to disadvantage vulnerable consumers in insurance markets",B:"Nondiscrimination law in the insurance context, which prohibits AI-driven pricing decisions that produce disparate impact against protected classes even without explicit use of protected attributes",C:"Data privacy law, because the model uses location data as a proxy for racial and economic characteristics that may constitute sensitive categories of personal information",D:"Product liability law, because the AI pricing model constitutes a defective product with a design defect that systematically produces discriminatory outcomes for defined population groups"},
     correct:"B",explanation:"II.B.2 covers nondiscrimination laws in insurance contexts. Disparate impact — adverse outcomes for protected classes from neutral-seeming AI features (proxy discrimination) — is the central nondiscrimination doctrine. A (consumer protection) is II.B.3 and is less directly applicable than nondiscrimination law. C (privacy) is secondary. D (product liability) is II.B.4 and not the primary framework here.",
     bokRef:"II.B.2 — Understand how nondiscrimination laws apply to AI (e.g., in the employment, credit, lending, housing and insurance contexts)."},
    {id:"DII-IIB-019",comp:"II.B",isRetrieval:false,
     stem:"An autonomous vehicle AI system fails to correctly detect a pedestrian crossing in poor lighting conditions, resulting in an accident. The manufacturer argues the AI meets performance specifications under normal conditions. Which legal framework under II.B most directly applies to the victim's potential claim?",
     options:{A:"Nondiscrimination law, because the AI system's failure may reflect systematic bias from training data that underrepresented poor-lighting or certain pedestrian demographic conditions",B:"Consumer protection law, because the manufacturer's performance specification claims may constitute deceptive representations if nighttime detection performance is inadequate",C:"Product liability law, which may impose liability for design defects when an AI system fails to perform safely under reasonably foreseeable operating conditions including poor lighting",D:"IP law, which may apply if the AI system's detection failure results from third-party training datasets for which the manufacturer lacked adequate licensing rights"},
     correct:"C",explanation:"II.B.4 covers product liability law prohibiting design and manufacturing defects. A vehicle AI that fails in reasonably foreseeable conditions (night, poor lighting) raises a design defect claim — the archetypal II.B.4 scenario. B (consumer protection) has some overlap but product liability is the primary framework for personal injury claims. A and D are not applicable to these facts.",
     bokRef:"II.B.4 — Understand how product liability laws apply to AI (e.g., prohibiting design and manufacturing defects)."},
    {id:"DII-IIC-020",comp:"II.C",isRetrieval:false,
     stem:"A company has determined its AI recruitment screening tool qualifies as high-risk under the EU AI Act. The Head of Compliance asks what primary documentation and risk obligations apply. Which requirement under II.C.2 must the company fulfill?",
     options:{A:"Establish and maintain technical documentation, implement data governance practices, conduct conformity assessments, and maintain records of system operations and decisions",B:"Register the AI system with the national authority and obtain third-party certification from a notified body before placing the system into service in any EU member state",C:"Conduct a bias audit every 90 days and submit results to the relevant national competent authority to demonstrate ongoing compliance with accuracy requirements",D:"Appoint a dedicated AI safety officer with authority to suspend recruitment operations whenever confidence scores fall below the quality management plan threshold"},
     correct:"A",explanation:"II.C.2 covers risk management, data governance, technical documentation, conformity/impact assessments, and record keeping. A covers all these. B (notified body certification) is required only for certain high-risk categories (not all), and 'registering with the national authority' is the EU AI database, not notified body certification. C and D are not II.C.2 requirements.",
     bokRef:"II.C.2 — Understand the key requirements around risk management, data governance, technical documentation, conformity/impact assessments and record keeping."},
    {id:"DII-IIC-021",comp:"II.C",isRetrieval:false,
     stem:"A public authority deploys a high-risk AI system that flags individuals for targeted benefits reviews. Daily flagging lists are acted upon by caseworkers without reviewing underlying evidence. The governance team identifies a compliance gap. Which II.C.3 requirement is most directly unmet?",
     options:{A:"The quality management requirement, which obligates the deployer to maintain a quality management system covering the AI system's operational performance and data management",B:"The transparency and notification requirement, which obligates the deployer to inform individuals when they are subject to AI-generated assessments affecting their benefits",C:"The technical documentation requirement, which obligates the provider to prepare documentation demonstrating the AI system meets all applicable design requirements",D:"The human oversight requirement, which obligates the deployer to ensure caseworkers can effectively oversee, understand, and where necessary override AI-generated outputs"},
     correct:"D",explanation:"II.C.3 covers human oversight, transparency, and quality management. The described gap is caseworkers acting on AI flags without reviewing evidence — they are not exercising effective human oversight. B (notification) is also in II.C.3 but the described gap is oversight failure, not notification failure. A is in II.C.3 but quality management is not what's missing. C maps to II.C.2.",
     bokRef:"II.C.3 — Understand the key requirements around human oversight, transparency and notification, and quality management."},
    {id:"DII-IIC-022",comp:"II.C",isRetrieval:false,
     stem:"A logistics company integrates a third-party AI route optimization system and extensively customizes its decision thresholds and priority rules for its operations. The AI Act authority questions whether the company's obligations extend beyond those of a typical deployer. Which II.C.6 principle most directly applies?",
     options:{A:"Importers and distributors bear identical obligations to providers when they integrate AI systems into enterprise platforms, regardless of the extent of customization performed",B:"A deployer who makes substantial modifications to a high-risk AI system may take on provider obligations, bearing primary documentation and conformity assessment responsibilities",C:"The provider of the underlying AI system retains all compliance obligations regardless of how extensively a downstream deployer customizes the system for their use case",D:"Importers who first place AI systems on the EU market bear the same obligations as the original provider, while distributors verify documentation is in order"},
     correct:"B",explanation:"II.C.6 addresses how requirements differ based on organizational context. A deployer who substantially modifies a high-risk AI system can become a provider for compliance purposes, taking on primary obligations. A is overbroad — importers/distributors don't automatically bear identical obligations. C is wrong — substantial modification shifts obligations. D describes importer/distributor rules correctly but does not address the logistics company's situation.",
     bokRef:"II.C.6 — Understand the differences in requirements based on organizational context (e.g., providers, deployers, importers and distributors)."},
    {id:"DII-IIC-023",comp:"II.C",isRetrieval:false,
     stem:"An AI company develops a product that monitors employee productivity by analyzing keystrokes, mouse movements, and application usage patterns in real time. It markets this to employers as a workforce analytics tool. Under the EU AI Act risk classification framework, what tier does this system most likely fall into?",
     options:{A:"Minimal risk, because productivity monitoring does not directly affect employment decisions and provides only aggregated analytics for managers to consider",B:"Limited risk, because the system uses automated processing to generate employee profiles, requiring only a transparency obligation to inform employees of its use",C:"High risk, because the system makes determinations about employee performance in the employment context, which is listed as a high-risk use case in Annex III",D:"Prohibited, because the system engages in real-time monitoring of employee behavior, which constitutes impermissible emotional or psychological surveillance under the Act"},
     correct:"C",explanation:"II.C.1: Annex III includes AI systems used in employment decisions. A workforce analytics tool that determines performance ratings and influences employment conditions meets this definition. D is the key distractor — real-time biometric remote ID and emotion recognition in workplaces are prohibited, but keystroke/productivity monitoring for analytics is not. A and B understate the risk tier.",
     bokRef:"II.C.1 — Understand the risk classification framework for AI (e.g., prohibited/high/limited/minimal risk) and what systems/uses fall into each category."},
    {id:"DII-IID-024",comp:"II.D",isRetrieval:false,
     stem:"An organization has adopted the NIST AI RMF. The governance team has identified the organizational context, stakeholder needs, risk tolerance, and the AI systems' impact categories. Which NIST AI RMF core function have they completed?",
     options:{A:"MAP, which involves establishing context, identifying risks related to the AI system, and understanding stakeholder needs, risk tolerance, and the system's impact categories",B:"GOVERN, which involves setting organizational policies, assigning roles and accountability, and establishing the overall risk management culture and oversight structures",C:"MEASURE, which involves analyzing and assessing AI risks through technical and non-technical methods including quantitative risk analysis and ongoing performance monitoring",D:"MANAGE, which involves implementing risk treatment decisions, developing response plans, and applying controls to address prioritized risks"},
     correct:"A",explanation:"MAP is the NIST AI RMF function for context and risk identification — establishing who the stakeholders are, what the system does, what harms are conceivable, and what risk tolerance applies. GOVERN (B) sets up the organizational infrastructure before MAP. MEASURE (C) analyzes and prioritizes after MAP. MANAGE (D) responds after MEASURE.",
     bokRef:"II.D.2 — Understand the NIST AI Risk Management Framework and Playbook (e.g., core functions, categories and subcategories)."},
    {id:"DII-IID-025",comp:"II.D",isRetrieval:false,
