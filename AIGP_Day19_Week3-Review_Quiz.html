const QUIZ_DATA = {

  webhookUrl: "https://script.google.com/macros/s/AKfycbyCG5oTGoPsjE9ytN3NJbsAv45GO0_uxb5gjXL7K8trVSiOfG05tQ0LV3wnjtuj7Bir/exec",
  questions: [
    {id:"DIV-IVA-001",pi:"IV.A.1",isRetrieval:false,comp:"IV.A",bokRef:"IV.A.1 — Understand the context of the AI use case (e.g., business objectives, performance requirements, data availability, ethical considerations and workforce readiness)",stem:"A retail company is evaluating whether to deploy an AI system to automate loan eligibility recommendations for its in-store credit product. The governance team has confirmed the business objective and data availability, but has not assessed employee readiness. Which governance gap does this represent under IV.A.1 — Understand the Context of the AI Use Case?",options:{A:"Failure to assess workforce readiness as part of the deployment context evaluation before committing to the AI system",B:"Failure to conduct a vendor contract review before selecting the model type for the use case",C:"Failure to perform a red team exercise to test the system against adversarial loan applications",D:"Failure to establish a post-market monitoring plan before going live with the recommendation system"},correct:"A",explanation:"IV.A.1 — Understand the context of the AI use case requires evaluation of five dimensions: business objectives, performance requirements, data availability, ethical considerations, and workforce readiness. The scenario confirms business objectives and data availability but skips workforce readiness — the assessment of whether frontline staff can safely and correctly use the system. Option B describes IV.B.1 — Identify and evaluate key terms and risks in the vendor or licensing agreement. Option C describes IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety. Option D describes IV.C.4 — Document incidents, issues, risks and post-market monitoring plans."},
    {id:"DIV-IVA-002",pi:"IV.A.2",isRetrieval:false,comp:"IV.A",bokRef:"IV.A.2 — Understand the differences in AI model types (e.g., classic vs. generative, proprietary vs. open source, small vs. large, and language vs. multimodal capabilities)",stem:"An AI governance team is comparing a classic ML fraud detection model with a large language model (LLM) for the same fraud screening use case. The team needs to brief the board on the key governance distinction between these model types. Which statement best reflects the BOK's framing under IV.A.2 — Understand the Differences in AI Model Types?",options:{A:"Classic ML models always require less documentation than generative models because their outputs are simpler",B:"Both model types carry identical governance obligations as long as the use case and data inputs are the same",C:"Classic and generative models differ in opacity, output variability, and the nature of risks they pose, requiring different governance proportionality",D:"Generative models must always be deployed on-premise to manage the higher risk associated with probabilistic outputs"},correct:"C",explanation:"IV.A.2 — Understand the differences in AI model types requires governance officers to understand that classic ML models produce deterministic, auditable outputs with well-understood failure modes, while generative models produce probabilistic, high-variance outputs with hallucination and opacity risks. These differences require different governance controls, monitoring approaches, and risk proportionality. Option A is incorrect because documentation requirements depend on risk context, not model simplicity. Option B incorrectly treats both as governance-equivalent. Option D is a non-BOK constraint with no basis in the performance indicators."},
    {id:"DIV-IVA-003",pi:"IV.A.3",isRetrieval:false,comp:"IV.A",bokRef:"IV.A.3 — Understand the differences in AI deployment options (e.g., cloud vs. on-premise vs. edge, and using the AI model as is or with fine-tuning, retrieval augmented generation, agentic architectures, or other techniques to improve performance and fit)",stem:"A healthcare provider is deciding between cloud API deployment and on-premise deployment for an AI diagnostic assistant. The compliance officer cites patient data sovereignty concerns. Under IV.A.3 — Understand the Differences in AI Deployment Options, what is the primary governance distinction that favors on-premise in this scenario?",options:{A:"On-premise deployment eliminates the need for a conformity assessment because no vendor relationship exists",B:"On-premise deployment gives the organization direct control over data residency and security, reducing third-party data exposure risk",C:"Cloud deployment is prohibited for sensitive health data under all applicable AI regulations globally",D:"On-premise systems require no post-deployment monitoring because the organization controls the full environment"},correct:"B",explanation:"IV.A.3 — Understand the differences in AI deployment options identifies data residency control as the key governance distinction of on-premise vs. cloud. On-premise deployment keeps data within the organization's own infrastructure, directly addressing data sovereignty concerns. Option A is incorrect — conformity assessments depend on AI risk classification and applicable law, not the presence of a vendor. Option C overstates the regulatory position; cloud is permissible in many jurisdictions with appropriate safeguards. Option D is incorrect — IV.C.2 — Conduct continuous monitoring of the AI model and system, and establish a regular schedule for maintenance, updates and retraining — applies regardless of hosting environment."},
    {id:"DIV-IVA-004",pi:"IV.A.4",isRetrieval:false,comp:"IV.A",bokRef:"IV.A.4 — Perform or review an impact assessment on the selected AI system",stem:"A development team argues that an impact assessment conducted during the design phase (covered by III.A.2 — Perform or review an impact assessment on the AI system) eliminates the need for a separate assessment at the point of deployment. Which response best reflects the BOK's position under IV.A.4 — Perform or Review an Impact Assessment on the Selected AI System?",options:{A:"The team is correct — one impact assessment is sufficient if it was thorough and recent",B:"A new assessment is only required if the regulatory environment has changed since the design-phase assessment",C:"A new assessment is only required for high-risk AI systems as classified under the EU AI Act",D:"IV.A.4 requires a separate deployment-stage impact assessment on the selected AI system, because deployment context introduces new stakeholders, integration points, and constraints not present at design time"},correct:"D",explanation:"IV.A.4 — Perform or review an impact assessment on the selected AI system is an explicit deployment-stage performance indicator, distinct from III.A.2 — Perform or review an impact assessment on the AI system, which applies during design and build. The deployment context may introduce new user populations, integration dependencies, data flows, and constraints not known at design time. Options A, B, and C all incorrectly treat the development-phase assessment as sufficient; none of these conditions are stated in the BOK as exceptions to IV.A.4."},
    {id:"DIV-IVA-005",pi:"IV.A.2",isRetrieval:false,comp:"IV.A",bokRef:"IV.A.2 — Understand the differences in AI model types (e.g., classic vs. generative, proprietary vs. open source, small vs. large, and language vs. multimodal capabilities)",stem:"A compliance team is evaluating a proprietary foundational LLM from a major vendor versus an equivalent open-source model. Under IV.A.2 — Understand the Differences in AI Model Types, what is the primary governance distinction the team should document?",options:{A:"Proprietary models carry vendor dependency and limited auditability; open-source models allow inspection but introduce supply chain and fine-tuning risks",B:"Open-source models are always higher governance risk because they lack vendor accountability and contractual protections",C:"Proprietary models must always undergo conformity assessments, while open-source models are exempt as they are not commercial products",D:"Both model types require identical risk assessments because the use case determines risk, not the licensing model"},correct:"A",explanation:"IV.A.2 — Understand the differences in AI model types explicitly lists proprietary vs. open source as a governance-relevant distinction. Proprietary models limit the deployer's ability to audit, inspect, or independently validate model behavior — creating vendor dependency risk. Open-source models allow inspection and modification but introduce supply chain risks (malicious weights or training data) and fine-tuning risks. Option B overstates open-source risk without basis in the BOK. Option C incorrectly creates a blanket exemption for open-source models. Option D is incorrect because the BOK explicitly requires understanding these distinctions."},
    {id:"DIV-IVA-006",pi:"IV.A.3",isRetrieval:false,comp:"IV.A",bokRef:"IV.A.3 — Understand the differences in AI deployment options (e.g., cloud vs. on-premise vs. edge, and using the AI model as is or with fine-tuning, retrieval augmented generation, agentic architectures, or other techniques to improve performance and fit)",stem:"A deployer wants to improve a foundation model's accuracy for their legal contract review use case. They are choosing between fine-tuning the model on their contract corpus versus implementing RAG. Under IV.A.3 — Understand the Differences in AI Deployment Options, what is the key governance distinction between these two approaches?",options:{A:"Fine-tuning eliminates all bias from the original model because it replaces the model's internal representations with domain-specific data",B:"RAG is always the preferable governance choice because it avoids modifying the base model and thus reduces liability",C:"Fine-tuning triggers data governance obligations for the training corpus; RAG requires retrieval source integrity controls — both carry distinct data governance obligations",D:"RAG requires no additional documentation because it does not alter the model's weights or architecture"},correct:"C",explanation:"IV.A.3 — Understand the differences in AI deployment options requires governance officers to understand that fine-tuning and RAG carry different but equally real data governance obligations. Fine-tuning requires assessing lawful rights to use the training corpus (III.B.1 — Establish and follow the requirements for data governance) and documents data lineage (III.B.2 — Establish and document data lineage and provenance). RAG requires retrieval source integrity. Option A is incorrect — fine-tuning inherits biases from the original model and can introduce new ones. Option B incorrectly treats RAG as the default governance-preferred option. Option D is incorrect because RAG introduces its own documentation and monitoring obligations under IV.C.4 — Document incidents, issues, risks and post-market monitoring plans."},
    {id:"DIV-IVA-007",pi:"IV.A.1",isRetrieval:false,comp:"IV.A",bokRef:"IV.A.1 — Understand the context of the AI use case (e.g., business objectives, performance requirements, data availability, ethical considerations and workforce readiness)",stem:"An AI governance officer discovers two weeks before deployment that customer service agents have received no training on the new AI-assisted triage system. The business team argues that the system is intuitive enough for self-directed learning. Which IV.A.1 — Understand the Context of the AI Use Case element has not been addressed?",options:{A:"Data availability assessment for the triage system's input sources",B:"Workforce readiness as part of the context evaluation required before deployment",C:"Ethical considerations review for the customer populations being triaged",D:"Business objectives alignment between the AI system and the customer service function"},correct:"B",explanation:"IV.A.1 — Understand the context of the AI use case includes workforce readiness as one of its five required dimensions. Workforce readiness addresses whether users are trained and operationally prepared to use the AI system safely and correctly. The business team's claim that intuitive design substitutes for training is not a valid governance defense — readiness must be assessed and addressed, not assumed. Options A, C, and D describe other IV.A.1 dimensions but are not the gap described in the scenario."},
    {id:"DIV-IVA-008",pi:"IV.A.4",isRetrieval:false,comp:"IV.A",bokRef:"IV.A.4 — Perform or review an impact assessment on the selected AI system",stem:"A governance officer learns that the AI system selected for deployment is a different model version than the one assessed during the design phase. The project manager argues this is a minor version update and no new assessment is needed. Under IV.A.4 — Perform or Review an Impact Assessment on the Selected AI System, what is the correct governance position?",options:{A:"A new assessment is only required if the model change alters the output format or data inputs",B:"The prior assessment remains valid as long as the use case has not changed, regardless of model version",C:"A new assessment is only needed if the updated model is classified as high-risk under applicable law",D:"IV.A.4 requires an impact assessment on the selected AI system — a different model version is a materially different system, triggering a new or updated assessment"},correct:"D",explanation:"IV.A.4 — Perform or review an impact assessment on the selected AI system requires assessment of the actual system to be deployed. A version change is a change in the selected system, and the prior assessment cannot be carried forward without review — the new version may have different capabilities, failure modes, or bias characteristics. Options A, B, and C all introduce conditions not stated in the BOK. The performance indicator does not include exceptions for minor version changes, unchanged use cases, or risk classification thresholds."},
    {id:"DIV-IVB-009",pi:"IV.B.1",isRetrieval:false,comp:"IV.B",bokRef:"IV.B.1 — Identify and evaluate key terms and risks in the vendor or licensing agreement",stem:"A company signs a vendor contract for an AI system that caps the vendor's liability at three months of subscription fees and explicitly prohibits the deployer from auditing the model's training data or architecture. A governance officer flags this during a post-contract review. Under IV.B.1 — Identify and Evaluate Key Terms and Risks in the Vendor or Licensing Agreement, what should have occurred?",options:{A:"The governance team should have identified and evaluated both the liability cap and the audit rights restriction as key risks before contract execution",B:"Liability caps are standard market practice and do not constitute a governance risk requiring evaluation",C:"The governance team's post-contract review satisfies IV.B.1 because the performance indicator does not specify timing",D:"Audit rights are only required for high-risk AI systems and need not be negotiated for standard enterprise software"},correct:"A",explanation:"IV.B.1 — Identify and evaluate key terms and risks in the vendor or licensing agreement requires the governance team to review the contract before execution. Key terms include liability caps (which shift financial risk to the deployer), audit rights (which affect the deployer's ability to verify compliance), permitted use scope, indemnification, and data handling obligations. Option B incorrectly dismisses liability caps as governance-irrelevant. Option C is incorrect because post-execution reviews have no negotiating leverage. Option D incorrectly limits audit rights to high-risk systems; the BOK does not make this distinction."},
    {id:"DIV-IVB-010",pi:"IV.B.2",isRetrieval:false,comp:"IV.B",bokRef:"IV.B.2 — Identify and understand the risks and opportunities that are unique to a company deploying its own proprietary AI model (e.g., increased obligations and higher potential liability)",stem:"A technology company decides to build and deploy its own proprietary AI model for employee performance evaluation rather than procuring an external solution. The CFO argues this reduces risk by eliminating vendor dependency. Under IV.B.2 — Identify and Understand the Risks Unique to Deploying a Proprietary AI Model, what governance position should the AI officer articulate?",options:{A:"Building proprietary AI eliminates third-party data risks and therefore reduces the overall governance burden compared to vendor solutions",B:"Vendor models expose the deployer to higher liability because the vendor controls the model behavior and outputs",C:"Deploying a proprietary AI model carries increased obligations and higher potential liability because the organization assumes the role of AI provider",D:"Proprietary AI deployment only requires internal documentation and is exempt from external compliance obligations that apply to commercial AI products"},correct:"C",explanation:"IV.B.2 — Identify and understand the risks and opportunities that are unique to a company deploying its own proprietary AI model explicitly states that proprietary deployment carries increased obligations and higher potential liability. When an organization builds its own AI, it absorbs the obligations that a vendor would otherwise hold — including regulatory compliance as an AI provider, documentation, and accountability for model behavior. Option A incorrectly frames proprietary deployment as lower burden. Option B incorrectly assigns higher liability to vendor models. Option D is incorrect — deploying AI internally does not create an exemption from applicable external compliance requirements."},
    {id:"DIV-IVB-011",pi:"IV.B.1",isRetrieval:false,comp:"IV.B",bokRef:"IV.B.1 — Identify and evaluate key terms and risks in the vendor or licensing agreement",stem:"A deployer's vendor contract defines permitted use as 'general business intelligence purposes.' The deployer intends to use the AI system for automated credit scoring decisions that directly affect customer loan eligibility. Under IV.B.1 — Identify and Evaluate Key Terms and Risks in the Vendor or Licensing Agreement, what risk should the governance team flag?",options:{A:"The data retention policy in the contract may conflict with applicable privacy regulations governing credit data",B:"The permitted use scope likely does not cover automated credit decisions, creating legal and contractual risk if the system is deployed for that purpose",C:"Automated credit scoring using AI is categorically prohibited under all vendor agreements as a matter of contractual practice",D:"The governance team should flag this risk only if the AI system is classified as high-risk under the EU AI Act or equivalent regulation"},correct:"B",explanation:"IV.B.1 — Identify and evaluate key terms and risks in the vendor or licensing agreement requires evaluating permitted use scope as a key contract term. 'General business intelligence purposes' is unlikely to cover automated credit scoring — a high-stakes decision that directly affects individual financial eligibility. Using the system outside permitted scope creates contractual breach risk and potentially voids any vendor indemnification. Option A describes a privacy/data retention risk not the primary gap. Option C incorrectly states a categorical prohibition. Option D incorrectly conditions this obligation on a regulatory classification; IV.B.1 applies regardless of risk tier."},
    {id:"DIV-IVB-012",pi:"IV.B.2",isRetrieval:false,comp:"IV.B",bokRef:"IV.B.2 — Identify and understand the risks and opportunities that are unique to a company deploying its own proprietary AI model (e.g., increased obligations and higher potential liability)",stem:"An organization is choosing between licensing an established vendor's AI model and building an equivalent model in-house. The legal team asserts that building in-house avoids the compliance obligations that apply to commercial AI products. Under IV.B.2 — Identify and Understand the Risks Unique to Deploying a Proprietary AI Model, which response is most accurate?",options:{A:"The legal team is correct — internally built AI models are not subject to AI-specific regulations because they are not commercial products",B:"Vendor models create higher liability for the deployer because the deployer cannot control model updates",C:"In-house AI development eliminates third-party supply chain risk, which is the primary driver of compliance obligations",D:"Building and deploying proprietary AI carries increased obligations and higher potential liability, as the organization assumes the position of AI provider rather than deployer under applicable frameworks"},correct:"D",explanation:"IV.B.2 — Identify and understand the risks and opportunities that are unique to a company deploying its own proprietary AI model is explicit: increased obligations and higher potential liability are the defining characteristics of proprietary deployment. When an organization builds its own AI, it occupies the provider role in regulatory frameworks such as the EU AI Act — a role with significantly greater compliance obligations than a pure deployer. Option A is incorrect — AI regulations apply based on the nature of the system and its deployment context, not whether it is commercial. Option B incorrectly frames vendor models as higher liability. Option C is a partial truth that misidentifies supply chain risk as the primary driver."},
    {id:"DIV-IVA-013",pi:"IV.A.1",isRetrieval:false,comp:"IV.A",bokRef:"IV.A.1 — Understand the context of the AI use case (e.g., business objectives, performance requirements, data availability, ethical considerations and workforce readiness)",stem:"A government agency is considering deploying an AI system for benefits eligibility determination. The AI governance lead insists on a full use-case context evaluation before model selection. Under IV.A.1 — Understand the Context of the AI Use Case, which element is most likely to surface concerns specific to a benefits-determination context?",options:{A:"Ethical considerations — specifically the impact on vulnerable populations who depend on benefits decisions for basic welfare",B:"Business objectives — aligning the system's throughput targets with the agency's processing efficiency goals",C:"Data availability — confirming that applicant records are digitized and accessible for model input",D:"Performance requirements — setting accuracy thresholds above which the system may be deployed without human review"},correct:"A",explanation:"IV.A.1 — Understand the context of the AI use case lists ethical considerations as one of the five required evaluation dimensions. In a benefits-determination context, ethical considerations are the most likely to surface high-stakes concerns — the impact on vulnerable individuals whose access to housing, food, or medical support depends on automated decisions. While options B, C, and D are all legitimate IV.A.1 dimensions, none is as distinctively critical in this context as ethical considerations."},
    {id:"DIV-IVC-014",pi:"IV.C.1",isRetrieval:false,comp:"IV.C",bokRef:"IV.C.1 — Apply the policies, procedures, best practices and ethical considerations to the deployment of an AI system (e.g., data governance, risk management, issue management, and user training)",stem:"An AI system is deployed at a financial institution without updating the data governance policy to include the new system's data inputs, retention rules, and access controls. Six months later, a data incident occurs. The governance team claims existing data policies covered the AI system. Under IV.C.1 — Apply the Policies, Procedures, Best Practices and Ethical Considerations to Deployment, what governance failure occurred?",options:{A:"The team failed to establish a continuous monitoring schedule before deployment as required by IV.C.2 — Conduct Continuous Monitoring of the AI Model and System",B:"The team failed to conduct a red team exercise before deployment as required by IV.C.3 — Conduct Periodic Activities to Assess the AI System's Performance, Reliability and Safety",C:"Data governance — as a specific element named in IV.C.1 — Apply Policies to Deployment — was not applied to the AI system, leaving it outside the policy boundary",D:"The team failed to document the incident under IV.C.4 — Document Incidents, Issues, Risks and Post-Market Monitoring Plans at the time of deployment"},correct:"C",explanation:"IV.C.1 — Apply the policies, procedures, best practices and ethical considerations to the deployment of an AI system explicitly names data governance as one of its required elements. Existing policies cannot be assumed to cover a new AI system — they must be explicitly updated and applied. Option A describes IV.C.2 — Conduct continuous monitoring of the AI model and system. Option B describes IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety. Option D describes IV.C.4 — Document incidents, issues, risks and post-market monitoring plans, which is a post-incident obligation, not a deployment obligation."},
    {id:"DIV-IVC-015",pi:"IV.C.2",isRetrieval:false,comp:"IV.C",bokRef:"IV.C.2 — Conduct continuous monitoring of the AI model and system, and establish a regular schedule for maintenance, updates and retraining",stem:"An AI credit risk model deployed 18 months ago begins producing systematically biased outputs as economic conditions shift. The issue is discovered only during a routine internal audit because no automated monitoring was in place. Under IV.C.2 — Conduct Continuous Monitoring of the AI Model and System, what was the primary governance failure?",options:{A:"The organization failed to conduct a red team exercise within 18 months of deployment, as required by IV.C.3 — Conduct Periodic Activities to Assess the AI System's Performance, Reliability and Safety",B:"The organization failed to establish continuous monitoring and a regular schedule for maintenance, updates and retraining — allowing undetected model drift for 18 months",C:"The organization failed to document the bias as an incident under IV.C.4 — Document Incidents, Issues, Risks and Post-Market Monitoring Plans immediately after discovery",D:"The organization failed to forecast secondary use risks under IV.C.5 — Forecast and Reduce Risks of Secondary or Unintended Uses and Downstream Harms"},correct:"B",explanation:"IV.C.2 — Conduct continuous monitoring of the AI model and system, and establish a regular schedule for maintenance, updates and retraining requires automated, ongoing monitoring from deployment. The scenario describes 18 months of undetected model drift — a direct consequence of no monitoring infrastructure. Option A describes IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety, which applies to structured assessments, not the absence of continuous monitoring. Option C describes IV.C.4's post-discovery documentation obligation. Option D describes IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms, which concerns proactive forecasting, not performance degradation from drift."},
    {id:"DIV-IVC-016",pi:"IV.C.3",isRetrieval:false,comp:"IV.C",bokRef:"IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety (e.g., audits, red teaming, threat modeling and security testing)",stem:"Twelve months after deploying an AI-powered content moderation system, the security team proposes a structured exercise in which a dedicated team attempts to elicit harmful outputs, bypass moderation filters, and test the system against adversarial inputs. Under which IV.C performance indicator does this activity fall?",options:{A:"IV.C.2 — Conduct continuous monitoring of the AI model and system, and establish a regular schedule for maintenance, updates and retraining",B:"IV.C.4 — Document incidents, issues, risks and post-market monitoring plans",C:"IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms",D:"IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety, specifically through red teaming and adversarial security testing"},correct:"D",explanation:"IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety explicitly names red teaming and security testing as examples. A structured adversarial exercise attempting to bypass filters is the definition of red teaming. This is distinct from IV.C.2 — Conduct continuous monitoring of the AI model and system, and establish a regular schedule for maintenance, updates and retraining, which is automated and ongoing. Options B and C describe documentation and secondary harm forecasting obligations respectively, not assessment activities."},
    {id:"DIV-IVC-017",pi:"IV.C.6",isRetrieval:false,comp:"IV.C",bokRef:"IV.C.6 — Establish external communication plans",stem:"An AI system used by a logistics company makes a routing error causing a significant delivery failure affecting thousands of customers. The governance team scrambles to draft a customer communication but has no approved template, no designated spokesperson, and no pre-defined escalation path to regulators. Under which IV.C performance indicator was the organization not prepared?",options:{A:"An established external communication plan should already exist before incidents occur, as required by IV.C.6 — Establish External Communication Plans",B:"External communications in an AI incident are the exclusive responsibility of public relations and are outside governance scope",C:"IV.C.6 — Establish External Communication Plans only requires regulator notifications, not customer communications for operational failures",D:"External communication plans should be created reactively after incidents to ensure they are tailored to each specific event"},correct:"A",explanation:"IV.C.6 — Establish external communication plans requires the organization to prepare stakeholder communication strategies before incidents occur. The scenario shows a reactive scramble — no template, no spokesperson, no escalation path — precisely what a pre-established plan prevents. Option B incorrectly excludes governance from external communications. Option C incorrectly limits the scope to regulator notifications. Option D inverts the requirement: plans must be established proactively, not created reactively."},
    {id:"DIV-IVC-018",pi:"IV.C.7",isRetrieval:false,comp:"IV.C",bokRef:"IV.C.7 — Create and implement a policy and controls to deactivate or localize an AI system as necessary (e.g., due to regulatory requirements or performance issues)",stem:"A data protection authority in a new market issues an emergency order requiring all AI processing of citizen data to cease within 48 hours. The company's cloud-based AI system has no documented deactivation protocol, and the engineering team disagrees on which systems to shut down first. Under IV.C.7 — Create and Implement a Policy and Controls to Deactivate or Localize an AI System, what governance gap caused this situation?",options:{A:"IV.C.4 — Document incidents, issues, risks and post-market monitoring plans was not implemented, leaving no record to guide shutdown prioritization",B:"IV.C.2 — Conduct continuous monitoring of the AI model and system was absent, so the team was unaware of which data flows the order applied to",C:"IV.C.7 — Create and implement a policy and controls to deactivate or localize an AI system as necessary was not implemented; no documented deactivation protocol existed for regulatory-ordered shutdown",D:"IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety did not include a regulatory shutdown simulation"},correct:"C",explanation:"IV.C.7 — Create and implement a policy and controls to deactivate or localize an AI system as necessary explicitly covers regulatory-ordered shutdown. The absence of a documented protocol is a textbook IV.C.7 failure. Options A, B, and D describe other valid governance obligations but do not directly address the absence of a deactivation protocol."},
    {id:"DIV-IVC-019",pi:"IV.C.5",isRetrieval:false,comp:"IV.C",bokRef:"IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms",stem:"A hiring AI tool is validated for CV screening. Six months after deployment, line managers begin using the system's candidate scores to rank existing employees for promotion decisions — a use case never assessed or approved. The governance team becomes aware only when an employee files a discrimination complaint. Under IV.C.5 — Forecast and Reduce Risks of Secondary or Unintended Uses and Downstream Harms, what should have prevented this situation?",options:{A:"A system deactivation protocol under IV.C.7 — Create and Implement a Policy and Controls to Deactivate or Localize an AI System triggered by misuse detection",B:"Proactive forecasting of secondary uses such as promotion decisions, paired with acceptable use controls to prevent deployment outside the validated use case",C:"An updated vendor contract under IV.B.1 — Identify and Evaluate Key Terms and Risks in the Vendor or Licensing Agreement prohibiting use outside CV screening",D:"A discrimination risk audit under IV.C.3 — Conduct Periodic Activities to Assess the AI System's Performance, Reliability and Safety conducted before any manager access was granted"},correct:"B",explanation:"IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms requires proactive anticipation of uses beyond the validated scope. Promotion evaluation is a foreseeable secondary use of a hiring AI. Governance controls such as acceptable use policies, role-based access restrictions, and mandatory re-assessment before use expansion would have prevented this. Option A describes a deactivation response to an incident already in progress. Option C addresses vendor contract terms but does not prevent internal misuse. Option D describes a periodic safety audit that would not necessarily catch an undisclosed secondary use."},
    {id:"DIV-IVC-020",pi:"IV.C.1",isRetrieval:false,comp:"IV.C",bokRef:"IV.C.1 — Apply the policies, procedures, best practices and ethical considerations to the deployment of an AI system (e.g., data governance, risk management, issue management, and user training)",stem:"A governance audit of a deployed AI customer service system finds that agents are using the system's outputs as definitive answers without any verification step. Investigation reveals that user training was omitted from deployment planning because the product team considered the interface self-explanatory. Under IV.C.1 — Apply the Policies, Procedures, Best Practices and Ethical Considerations to Deployment, what element was missing?",options:{A:"Risk management — the failure to assess the risk of agent over-reliance on AI outputs",B:"Issue management — the absence of a formal incident channel for agents to report incorrect AI outputs",C:"Data governance — the lack of controls over which data the AI system accessed during customer interactions",D:"User training — as a specific element named in IV.C.1 — Apply Policies to Deployment — that must be applied regardless of interface design judgments"},correct:"D",explanation:"IV.C.1 — Apply the policies, procedures, best practices and ethical considerations to the deployment of an AI system explicitly lists user training as one of its required elements alongside data governance, risk management, and issue management. The product team's judgment that the interface is self-explanatory is not a valid substitute for the governance obligation to train users. Options A, B, and C describe other IV.C.1 elements but were not the element omitted in the scenario."},
    {id:"DIV-IVC-021",pi:"IV.C.4",isRetrieval:false,comp:"IV.C",bokRef:"IV.C.4 — Document incidents, issues, risks and post-market monitoring plans",stem:"An AI-powered loan decision system produces discriminatory outputs on four separate occasions over six months. Each time, an engineer patches the model and the issue is considered closed. No formal incident log is maintained. When a regulator requests evidence of how the organization manages AI risk, the team has nothing to produce. Under IV.C.4 — Document Incidents, Issues, Risks and Post-Market Monitoring Plans, what obligation was not met?",options:{A:"IV.C.4 — Document incidents, issues, risks and post-market monitoring plans requires formal documentation of incidents and a post-market monitoring plan — both of which would have created the evidence the regulator requested",B:"IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety requires that each patch be followed by a full red team assessment",C:"IV.C.6 — Establish external communication plans requires that affected loan applicants be notified after each discriminatory output incident",D:"IV.C.2 — Conduct continuous monitoring of the AI model and system, and establish a regular schedule for maintenance, updates and retraining requires that monitoring logs be retained for regulatory inspection"},correct:"A",explanation:"IV.C.4 — Document incidents, issues, risks and post-market monitoring plans requires formal records of AI incidents, not just technical fixes. An incident log would have captured the four discriminatory output events, their root causes, and corrective actions — providing the regulatory evidence the team could not produce. A post-market monitoring plan would have defined what triggers escalation and how risks are tracked. Options B, C, and D describe other valid governance obligations but the scenario's core failure is the absence of incident documentation under IV.C.4."},
    {id:"DIV-IVC-022",pi:"IV.C.5",isRetrieval:false,comp:"IV.C",bokRef:"IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms",stem:"A financial services firm deploys an AI system for internal credit risk scoring. An affiliated insurance subsidiary begins consuming the credit risk outputs to adjust policy premiums — a use never assessed or authorized by the governance team. Customers later face higher premiums without understanding why. Under IV.C.5 — Forecast and Reduce Risks of Secondary or Unintended Uses and Downstream Harms, what governance failure is most directly implicated?",options:{A:"IV.C.2 — Conduct continuous monitoring of the AI model and system failed to detect the unauthorized data flow to the insurance subsidiary",B:"IV.C.4 — Document incidents, issues, risks and post-market monitoring plans did not capture the downstream premium impact as an incident",C:"IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms was not implemented — the downstream use by the insurance subsidiary was foreseeable and should have been anticipated and controlled",D:"IV.C.7 — Create and implement a policy and controls to deactivate or localize an AI system did not include controls to restrict access to affiliated entities"},correct:"C",explanation:"IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms is the directly applicable PI. The scenario describes downstream harm: an affiliated entity consuming AI outputs for premium adjustment — a purpose never assessed. This is precisely the harm IV.C.5 requires deployers to proactively anticipate and prevent. Options A and B describe monitoring and documentation obligations that are secondary to the root cause. Option D describes deactivation controls, which address a different scenario."},
    {id:"DIV-IVC-023",pi:"IV.C.3",isRetrieval:false,comp:"IV.C",bokRef:"IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety (e.g., audits, red teaming, threat modeling and security testing)",stem:"Nine months after deploying an AI fraud detection system, the security governance team schedules a structured review to map potential adversarial attack surfaces — including prompt injection, model inversion, and data poisoning risks. This is best classified under which IV.C performance indicator?",options:{A:"IV.C.2 — Conduct continuous monitoring of the AI model and system, and establish a regular schedule for maintenance, updates and retraining",B:"IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety, specifically through threat modeling",C:"IV.C.4 — Document incidents, issues, risks and post-market monitoring plans, specifically the post-market monitoring plan component",D:"IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms through adversarial scenario planning"},correct:"B",explanation:"IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety explicitly lists threat modeling as an example activity. Mapping adversarial attack surfaces (prompt injection, model inversion, data poisoning) is textbook threat modeling — a structured, periodic, resource-intensive activity. IV.C.2 — Conduct continuous monitoring of the AI model and system, and establish a regular schedule for maintenance, updates and retraining is ongoing and automated; a scheduled structured review is a IV.C.3 activity. Option C describes the documentation obligation. Option D describes proactive secondary harm forecasting, not adversarial security risks."},
    {id:"DIV-IVC-024",pi:"IV.C.7",isRetrieval:false,comp:"IV.C",bokRef:"IV.C.7 — Create and implement a policy and controls to deactivate or localize an AI system as necessary (e.g., due to regulatory requirements or performance issues)",stem:"A new data sovereignty law in a target market requires all AI inference to occur within national borders. The organization's AI system runs exclusively on a centralized cloud infrastructure with no regional deployment capability. Under IV.C.7 — Create and Implement a Policy and Controls to Deactivate or Localize an AI System, what governance gap does this expose?",options:{A:"IV.C.1 — Apply the policies, procedures, best practices and ethical considerations to the deployment of an AI system, specifically data governance requirements for cross-border data flows",B:"IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms in the new jurisdiction",C:"IV.C.4 — Document incidents, issues, risks and post-market monitoring plans, specifically risks from operating in a jurisdiction without data sovereignty compliance",D:"IV.C.7 — Create and implement a policy and controls to deactivate or localize an AI system as necessary — no localization capability exists to comply with the regulatory requirement"},correct:"D",explanation:"IV.C.7 — Create and implement a policy and controls to deactivate or localize an AI system as necessary explicitly covers localization as a response to regulatory requirements. Localization means restricting AI processing to a specific geographic region — exactly what the data sovereignty law demands. The absence of any localization capability is a direct IV.C.7 gap. Options A, B, and C describe related governance considerations but none directly addresses the inability to comply with a regulatory localization order."},
    {id:"DIV-IVC-025",pi:"IV.C.2",isRetrieval:false,comp:"IV.C",bokRef:"IV.C.2 — Conduct continuous monitoring of the AI model and system, and establish a regular schedule for maintenance, updates and retraining",stem:"An AI system for predicting hospital readmission risk has been live for 14 months with no scheduled retraining. The clinical data distribution has shifted significantly due to changes in patient demographics and treatment protocols. Performance has degraded but no alert has been triggered because no monitoring thresholds were defined at deployment. Under IV.C.2 — Conduct Continuous Monitoring of the AI Model and System, what was the foundational governance failure?",options:{A:"A regular schedule for maintenance, updates and retraining was never established — allowing undetected data drift to degrade model performance without a defined trigger for corrective action",B:"A one-time impact assessment should have been conducted annually to assess whether the model remained fit for clinical use",C:"A vendor approval process should have been required before any retraining cycle to ensure model changes were validated externally",D:"A deactivation threshold should have been defined under IV.C.7 — Create and Implement a Policy and Controls to Deactivate or Localize an AI System to trigger shutdown when accuracy fell below a minimum threshold"},correct:"A",explanation:"IV.C.2 — Conduct continuous monitoring of the AI model and system, and establish a regular schedule for maintenance, updates and retraining requires both continuous monitoring infrastructure (with defined thresholds that trigger alerts) and a scheduled retraining cadence. The scenario describes 14 months of drift without detection because neither monitoring thresholds nor a retraining schedule were established. Option B incorrectly substitutes a periodic impact assessment for continuous monitoring. Option C introduces a vendor approval requirement not stated in the BOK. Option D describes IV.C.7 — Create and implement a policy and controls to deactivate or localize an AI system, which addresses shutdown, not monitoring and retraining."},
    {id:"DIV-IVC-026",pi:"IV.C.4",isRetrieval:true,comp:"IV.C",bokRef:"IV.C.4 — Document incidents, issues, risks and post-market monitoring plans",stem:"A governance team manages AI incident reports by sending emails to a shared mailbox with no structured logging, no assigned severity classification, and no post-market monitoring plan. When an external auditor requests evidence of post-deployment risk management, the team cannot produce organized documentation. Under IV.C.4 — Document Incidents, Issues, Risks and Post-Market Monitoring Plans, what does the BOK require?",options:{A:"A periodic red team report submitted quarterly as evidence that the team is actively testing the AI system for risks",B:"An updated vendor contract requiring the vendor to maintain incident logs on the deployer's behalf",C:"Formal documentation of incidents, issues, and risks — plus a post-market monitoring plan that defines what is monitored, at what frequency, and what thresholds trigger escalation",D:"A deactivation log that records every time the AI system was taken offline for maintenance or performance issues"},correct:"C",explanation:"IV.C.4 — Document incidents, issues, risks and post-market monitoring plans requires two distinct deliverables: (1) a formal incident and risk registry capturing what went wrong, severity, and corrective actions taken; and (2) a post-market monitoring plan documenting monitoring scope, cadence, and escalation triggers. Option A describes IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety, not documentation. Option B incorrectly assigns the deployer's documentation obligation to the vendor. Option D describes deactivation records relating to IV.C.7 — Create and implement a policy and controls to deactivate or localize an AI system, not IV.C.4."},
    {id:"DIV-IVC-027",pi:"IV.C.4",isRetrieval:true,comp:"IV.C",bokRef:"IV.C.4 — Document incidents, issues, risks and post-market monitoring plans",stem:"An auditor reviewing a deployed AI system asks for evidence of post-market monitoring compliance. The governance team presents real-time performance dashboards and monitoring alerts. The auditor states that while IV.C.2 — Conduct Continuous Monitoring appears satisfied, IV.C.4 — Document Incidents, Issues, Risks and Post-Market Monitoring Plans is not. Why is the auditor correct?",options:{A:"Dashboards satisfy IV.C.4 as long as they are retained for at least 12 months and accessible to regulators on request",B:"The team lacks a structured incident registry and a post-market monitoring plan — IV.C.4 requires documented evidence of how incidents and risks are recorded and managed over time, not just live monitoring views",C:"IV.C.4 — Document Incidents, Issues, Risks and Post-Market Monitoring Plans only applies to high-risk AI systems under applicable law, so the auditor may be applying the wrong standard",D:"The dashboards would satisfy IV.C.4 if supplemented with a vendor-signed attestation confirming incident-free operation during the review period"},correct:"B",explanation:"IV.C.4 — Document incidents, issues, risks and post-market monitoring plans is distinct from IV.C.2 — Conduct continuous monitoring of the AI model and system. Dashboards show current state and trigger alerts — they are the operational outputs of IV.C.2. IV.C.4 requires structured documentation: a formal incident registry recording what went wrong and how it was resolved, and a post-market monitoring plan defining monitoring scope, frequency, and escalation paths. These are the durable records that enable compliance demonstration and regulatory evidence production. Options A and D incorrectly treat dashboards and vendor attestations as IV.C.4-compliant. Option C incorrectly conditions IV.C.4 on a regulatory risk classification."},
    {id:"DIV-IVC-028",pi:"IV.C.4",isRetrieval:true,comp:"IV.C",bokRef:"IV.C.4 — Document incidents, issues, risks and post-market monitoring plans",stem:"An AI system triggers a near-miss event: a recommendation that, if acted upon, would have caused significant customer financial harm. A developer catches the error and patches the model within 24 hours. No formal record is created because the issue was resolved before any customer was affected. Eight months later, an identical failure mode recurs — this time causing harm. Under IV.C.4 — Document Incidents, Issues, Risks and Post-Market Monitoring Plans, what governance principle was violated after the near-miss?",options:{A:"The team should have conducted a red team exercise immediately after the near-miss under IV.C.3 — Conduct Periodic Activities to Assess the AI System's Performance, Reliability and Safety",B:"The team should have forecasted that the near-miss could recur under IV.C.5 — Forecast and Reduce Risks of Secondary or Unintended Uses and Downstream Harms",C:"The team should have notified affected customers under IV.C.6 — Establish External Communication Plans, even though no harm occurred",D:"Failing to document the near-miss under IV.C.4 — Document Incidents, Issues, Risks and Post-Market Monitoring Plans prevented pattern recognition and systemic risk management — allowing the same failure mode to recur undetected"},correct:"D",explanation:"IV.C.4 — Document incidents, issues, risks and post-market monitoring plans requires documentation of incidents, issues, and risks — including near-misses that did not result in harm. Near-miss documentation enables pattern recognition, root cause analysis, and escalation before a repeat event causes harm. The scenario demonstrates precisely why: the undocumented near-miss reappeared eight months later with real consequences. Option A describes IV.C.3 — Conduct periodic activities to assess the AI system's performance, reliability and safety, which may be appropriate but does not substitute for documentation. Option B describes IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms, not the primary gap here. Option C misapplies IV.C.6 — Establish external communication plans, which governs pre-established communication plans, not mandatory disclosure of non-harmful near-misses."},
    {id:"DIV-IVC-029",pi:"IV.C.5",isRetrieval:true,comp:"IV.C",bokRef:"IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms",stem:"An AI recruitment screening tool is validated to shortlist external job candidates based on CV analysis. After 10 months, managers begin applying the tool's scoring outputs to assess current employees' suitability for internal promotions — a use case the model was never designed or validated for. The governance policy did not anticipate internal use. Under IV.C.5 — Forecast and Reduce Risks of Secondary or Unintended Uses and Downstream Harms, what obligation was not met?",options:{A:"Proactively forecasting and establishing controls to prevent secondary or unintended uses — internal promotion evaluation was a foreseeable secondary use that should have been anticipated and governed",B:"Establishing an external communication plan for any expanded use case under IV.C.6 — Establish External Communication Plans",C:"Conducting a conformity assessment each time the model is applied to a new population or use case under applicable regulation",D:"Updating the vendor contract under IV.B.1 — Identify and Evaluate Key Terms and Risks in the Vendor or Licensing Agreement when the internal use was identified"},correct:"A",explanation:"IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms requires proactive governance — not reactive response after secondary use has already occurred. Internal promotion evaluation is a foreseeable secondary use of a hiring AI: it involves the same evaluation logic applied to a new population (current employees) in a consequential decision context (career progression). Governance controls that should have been in place include acceptable use policies restricting the tool to external candidate screening, role-based access controls, and a requirement to conduct a new impact assessment before any use expansion. Options B, C, and D describe related governance actions but none is the primary obligation violated."},
    {id:"DIV-IVC-030",pi:"IV.C.5",isRetrieval:true,comp:"IV.C",bokRef:"IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms",stem:"An AI content moderation tool is licensed by a media company to detect harmful content. The media company allows its enterprise clients to access the tool via API without requiring governance review or impact assessment. One client uses the API to automatically suppress political commentary that the client finds unfavorable, causing harm to freedom of expression. Under IV.C.5 — Forecast and Reduce Risks of Secondary or Unintended Uses and Downstream Harms, what obligation did the media company fail to fulfill?",options:{A:"Documenting the downstream clients as third-party processors under II.A.3 — Understand How Obligations on Data Controllers Apply to AI",B:"Conducting a red team exercise on the downstream API integration under IV.C.3 — Conduct Periodic Activities to Assess the AI System's Performance, Reliability and Safety",C:"Forecasting and reducing risks of downstream harm from clients applying the moderation tool to suppress legitimate speech — a foreseeable secondary use that required governance controls before API access was granted",D:"Establishing an external communication plan for affected users under IV.C.6 — Establish External Communication Plans before enabling third-party API access"},correct:"C",explanation:"IV.C.5 — Forecast and reduce risks of secondary or unintended uses and downstream harms requires the deployer to proactively anticipate how third parties accessing its AI outputs or API may use them in ways that cause downstream harm. Political speech suppression is a foreseeable misuse of a content moderation tool. Governance controls that should have been in place include acceptable use restrictions in API terms, impact assessments for each downstream client use case, and monitoring of API usage patterns. Option A describes a privacy law data controller obligation, secondary to the primary IV.C.5 failure. Option B describes a periodic security assessment, which is appropriate but does not address the root cause. Option D describes communication planning, not the obligation violated by enabling unreviewed API access."}
