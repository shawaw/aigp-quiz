<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIGP Quiz — Day 1 · AI Foundations</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark: #1a5c3a;
    --green-light: #e8f5ee;
    --green-mid: #2d7a52;
    --text-primary: #1a1a1a;
    --text-secondary: #4a4a4a;
    --text-muted: #6b6b6b;
    --border: #dde3e0;
    --bg-page: #f7f9f8;
    --bg-card: #ffffff;
    --blue: #1a4a7a;
    --blue-light: #e8f0f8;
    --red: #7a1a1a;
    --red-light: #fceae8;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    line-height: 1.65;
    color: var(--text-primary);
    background: var(--bg-page);
    padding: 32px 20px 80px;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .quiz-header {
    background: var(--green-dark);
    color: white;
    border-radius: 10px;
    padding: 22px 28px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .quiz-header-left h1 {
    font-size: 18px;
    font-weight: 700;
  }

  .quiz-header-left p {
    font-size: 13px;
    opacity: 0.8;
    margin-top: 3px;
  }

  .session-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10.5px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 5px 12px;
    border-radius: 6px;
    white-space: nowrap;
  }

  /* ── Progress ── */
  .progress-wrap {
    margin-bottom: 24px;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }

  .progress-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--green-mid);
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  /* ── Question card ── */
  .question-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    margin-bottom: 20px;
  }

  .q-meta {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .comp-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    background: var(--green-light);
    color: var(--green-dark);
    border: 1px solid var(--green-mid);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .q-num-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
  }

  .q-stem {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.65;
    margin-bottom: 22px;
  }

  /* ── Answer options ── */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }

  .option:hover:not(.disabled) {
    border-color: var(--green-mid);
    background: var(--green-light);
  }

  .option.selected {
    border-color: var(--blue);
    background: var(--blue-light);
  }

  .option.correct {
    border-color: var(--green-mid);
    background: var(--green-light);
  }

  .option.incorrect {
    border-color: var(--red);
    background: var(--red-light);
  }

  .option.disabled { cursor: default; }

  .opt-letter {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    flex-shrink: 0;
    width: 22px;
    margin-top: 1px;
  }

  .option.selected .opt-letter { color: var(--blue); }
  .option.correct .opt-letter { color: var(--green-dark); font-weight: 700; }
  .option.incorrect .opt-letter { color: var(--red); font-weight: 700; }

  .opt-text {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.55;
  }

  /* ── Nav ── */
  .nav-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .btn {
    padding: 12px 28px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    transition: opacity 0.15s;
  }

  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .btn-primary {
    background: var(--green-dark);
    color: white;
  }

  .btn-primary:hover:not(:disabled) { opacity: 0.85; }

  .btn-submit {
    background: var(--blue);
    color: white;
  }

  .btn-submit:hover:not(:disabled) { opacity: 0.85; }

  /* ── Results ── */
  #results-view { display: none; }

  .results-header {
    background: var(--green-dark);
    color: white;
    border-radius: 10px;
    padding: 28px;
    margin-bottom: 24px;
    text-align: center;
  }

  .score-big {
    font-size: 56px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 8px;
  }

  .score-label {
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 20px;
  }

  .results-stats {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-val {
    font-size: 22px;
    font-weight: 700;
    display: block;
  }

  .stat-label {
    font-size: 12px;
    opacity: 0.75;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ── Review per question ── */
  .review-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .review-header {
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .review-header .q-short {
    font-size: 14px;
    color: var(--text-primary);
    flex: 1;
  }

  .result-chip {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    flex-shrink: 0;
    font-weight: 600;
  }

  .result-chip.correct { background: var(--green-light); color: var(--green-dark); border: 1px solid var(--green-mid); }
  .result-chip.incorrect { background: var(--red-light); color: var(--red); border: 1px solid #e0a0a0; }
  .result-chip.skipped { background: #f5f5f5; color: #888; border: 1px solid #ccc; }

  .review-body {
    padding: 18px 18px 20px;
    border-top: 1px solid var(--border);
    display: none;
    background: #fdfefe;
  }

  .review-body.open { display: block; }

  .answer-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .answer-tag {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 6px;
  }

  .answer-tag.yours-correct { background: var(--green-light); color: var(--green-dark); }
  .answer-tag.yours-wrong { background: var(--red-light); color: var(--red); }
  .answer-tag.correct-ans { background: var(--green-light); color: var(--green-dark); border: 1px solid var(--green-mid); }

  .explanation-text {
    font-size: 14.5px;
    color: var(--text-secondary);
    line-height: 1.65;
    margin-bottom: 14px;
  }

  .bok-ref {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: var(--green-light);
    color: var(--green-dark);
    border: 1px solid var(--green-mid);
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 4px;
  }

  .tricky-flag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    background: #fff3e0;
    color: #a05a00;
    border: 1px solid #e0b070;
    padding: 3px 10px;
    border-radius: 20px;
    margin-left: 6px;
  }

  /* ── Save confirmation ── */
  .save-confirm {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 22px;
    margin-top: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12.5px;
    color: var(--text-muted);
    line-height: 1.7;
  }

  .save-confirm strong { color: var(--green-dark); font-weight: 600; }

  .btn-export {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    margin-top: 12px;
    transition: background 0.15s;
  }

  .btn-export:hover { background: var(--bg-page); }

  .chevron-icon { transition: transform 0.2s; }
  .chevron-icon.open { transform: rotate(180deg); }
</style>
</head>
<body>
<div class="container">

  <!-- Quiz view -->
  <div id="quiz-view">
    <div class="quiz-header">
      <div class="quiz-header-left">
        <h1>AIGP Quiz — Day 1</h1>
        <p>Domain I · Competency I.A — AI Foundations</p>
      </div>
      <div class="session-badge" id="session-badge">Loading...</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="progress-label">Question 1 of 15</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card" id="question-card">
      <div class="q-meta">
        <span class="q-num-chip" id="q-num-chip">Q1 of 15</span>
        <span class="comp-chip">I.A</span>
      </div>
      <div class="q-stem" id="q-stem"></div>
      <div class="options" id="options-container"></div>
    </div>

    <div class="nav-row">
      <button class="btn btn-primary" id="next-btn" onclick="advance()" disabled>Next →</button>
    </div>
  </div>

  <!-- Results view -->
  <div id="results-view">
    <div class="results-header">
      <div class="score-big" id="score-pct">—</div>
      <div class="score-label">AIGP Quiz — Day 1 · Competency I.A</div>
      <div class="results-stats">
        <div class="stat">
          <span class="stat-val" id="stat-correct">—</span>
          <span class="stat-label">Correct</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="stat-wrong">—</span>
          <span class="stat-label">Incorrect</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="stat-skipped">—</span>
          <span class="stat-label">Skipped</span>
        </div>
        <div class="stat">
          <span class="stat-val">15</span>
          <span class="stat-label">Total</span>
        </div>
      </div>
    </div>

    <div id="review-container"></div>

    <div class="save-confirm" id="save-confirm">
      Saving results...
    </div>

    <button class="btn-export" onclick="exportHistory()">Export quiz history (JSON)</button>
  </div>

</div>

<script>
// ─── Question bank ───────────────────────────────────────────────────────────
const QUESTIONS = [
  {
    id: "DI-IA-001",
    comp: "I.A",
    stem: "A financial services firm deploys a machine learning model to approve or reject credit card applications. The model uses 47 input variables, and the vendor states that no individual explanation can be given for any decision. A regulator asks the firm to justify a specific rejection. Which unique AI characteristic is most directly implicated in the firm's inability to comply?",
    options: [
      { letter: "A", text: "Speed and scale — the model processes too many applications per second to log individual decisions." },
      { letter: "B", text: "Opacity — the model's internal reasoning cannot be traced to produce a human-legible explanation of a specific outcome." },
      { letter: "C", text: "Autonomy — the model makes decisions without human authorization for each case." },
      { letter: "D", text: "Data dependency — the model's training data is proprietary and cannot be disclosed to the regulator." }
    ],
    correct: "B",
    explanation: "The correct answer is B. Opacity refers specifically to the inability to trace AI reasoning — the 'black box' problem. In credit decisions, this creates a direct compliance gap: regulators and, in many jurisdictions, data subjects have a right to explanation of automated decisions. Opacity is one of the seven unique AI characteristics the BOK identifies as requiring comprehensive governance. A is wrong — speed and scale relates to the volume of decisions and difficulty of detecting mass harm, not the inability to explain an individual decision. C is wrong — autonomy refers to the AI acting without a human for each decision, but that is a distinct characteristic from the inability to explain the decision's logic. D is wrong — data dependency relates to how training data quality bounds model performance, not the inability to explain outputs.",
    bokRef: "BOK I.A — Unique characteristics of AI (opacity)"
  },
  {
    id: "DI-IA-002",
    comp: "I.A",
    stem: "A city's public housing authority uses an AI prioritization system to allocate available units. Analysis reveals that families from neighborhoods with historically low English proficiency are 40% less likely to receive priority allocation, despite equivalent housing need scores. The system was trained on ten years of historical allocation decisions. Which BOK risk category best characterizes this outcome?",
    options: [
      { letter: "A", text: "Complexity and scalability risk — the model is too complex to produce consistent results across all demographic groups." },
      { letter: "B", text: "Misalignment with objectives — the model is optimizing for a proxy metric rather than actual housing need." },
      { letter: "C", text: "Ethics and bias risk — the model is replicating historical discriminatory patterns from training data, causing group harm." },
      { letter: "D", text: "Autonomy risk — the model is making allocation decisions that should require human judgment." }
    ],
    correct: "C",
    explanation: "The correct answer is C. Ethics and bias risk is the BOK category covering AI outcomes that reflect, amplify, or introduce discriminatory patterns. Training on historical allocation data that itself reflected discriminatory practices produces a model that perpetuates that discrimination. The harm level is group harm — a community defined by linguistic characteristics is systematically disadvantaged. A is partially relevant but 'complexity and scalability' in the BOK refers to the difficulty of predicting behavior at scale and the amplification of errors — it is not the primary characterization of bias reproduction. B is wrong — misalignment with objectives means the model optimizes for a wrong proxy metric; here, the model may be correctly optimizing its stated metric but the metric itself encoded bias. D is not a BOK-named risk category; autonomy is a characteristic, not a risk classification.",
    bokRef: "BOK I.A — Types of risks and harms posed by AI (ethics and bias risk)"
  },
  {
    id: "DI-IA-003",
    comp: "I.A",
    stem: "An e-commerce company uses a generative AI chatbot to handle customer service queries. The chatbot occasionally generates plausible-sounding but factually incorrect product specifications, which customers rely on when making purchase decisions. Which unique AI characteristic is the primary governance concern here?",
    options: [
      { letter: "A", text: "Data dependency — the chatbot's training data did not include accurate product specifications." },
      { letter: "B", text: "Probabilistic outputs — generative AI produces outputs that are not deterministically correct, and the same query may yield different responses." },
      { letter: "C", text: "Speed and scale — the chatbot can spread incorrect information to thousands of customers simultaneously." },
      { letter: "D", text: "Complexity — the model's architecture is too complex for the engineering team to debug." }
    ],
    correct: "B",
    explanation: "The correct answer is B. Probabilistic outputs is the defining characteristic here: unlike a rule-based system that would return a deterministic product specification, a generative AI model produces statistically plausible outputs that may not be factually correct. This is distinct from a data gap (A) — even with perfect training data, generative models can 'hallucinate'. C is also true but describes a secondary consequence (scale of distribution), not the primary characteristic causing incorrect outputs. D relates to debugging challenges, not to the fundamental nature of AI outputs. The governance implication of probabilistic outputs is that continuous monitoring and human review mechanisms — not one-time testing — are required.",
    bokRef: "BOK I.A — Unique characteristics of AI (probabilistic versus deterministic outputs)"
  },
  {
    id: "DI-IA-004",
    comp: "I.A",
    stem: "A hospital system is evaluating two AI diagnostic tools. Tool A is a deep learning model with 94% accuracy but cannot explain why it flags specific images. Tool B is a decision-tree model with 87% accuracy that produces a step-by-step rationale for each flag. The governance officer must advise which tool better satisfies the responsible AI principle of transparency and explainability for use in clinical decisions. What is the most defensible recommendation?",
    options: [
      { letter: "A", text: "Tool A, because higher accuracy directly corresponds to better patient outcomes and outweighs the explainability gap." },
      { letter: "B", text: "Tool B, because explainability is a technical requirement and an unexplainable model cannot be deployed in any clinical context." },
      { letter: "C", text: "Tool A, provided the hospital implements organizational transparency measures — disclosing that AI is used and enabling clinician override — even if the model itself is not explainable." },
      { letter: "D", text: "Neither tool, because no AI system meets the standard for clinical deployment without regulatory certification." }
    ],
    correct: "C",
    explanation: "The correct answer is C. This question tests the critical distinction between explainability (a technical model property) and transparency (a governance commitment). An unexplainable model can still be deployed transparently if the organization discloses AI use, ensures clinicians understand the model's limitations, and implements meaningful human oversight (clinician review and override). Tool A's higher accuracy may be clinically justified, provided governance controls compensate for the explainability gap. B is wrong — it conflates model explainability with the broader transparency principle; many deployed clinical AI systems are not individually explainable but are governed transparently. A is wrong because accuracy alone does not satisfy governance requirements. D is a false premise that goes beyond what the BOK or the scenario establishes.",
    bokRef: "BOK I.A — Common principles of responsible AI (transparency and explainability)"
  },
  {
    id: "DI-IA-005",
    comp: "I.A",
    stem: "A recruitment AI tool shortlists candidates for interviews. The system was built by a third-party vendor and is described as a 'black box' model. Six months after deployment, the HR director notices that female candidates are shortlisted at a 28% lower rate than male candidates for technical roles. The AI governance officer is asked to classify the harm. Which classification is most accurate according to the BOK?",
    options: [
      { letter: "A", text: "Individual harm at the organizational level, because the company faces legal liability." },
      { letter: "B", text: "Group harm caused by ethics and bias risk, with secondary organizational harm from legal and reputational exposure." },
      { letter: "C", text: "Societal harm, because gender bias in AI recruitment systems affects the broader labor market." },
      { letter: "D", text: "Complexity and scalability risk, because the model's behavior is difficult to predict at scale." }
    ],
    correct: "B",
    explanation: "The correct answer is B. The BOK classifies AI harms by affected party. The primary harm here is group harm — a category defined by gender is systematically disadvantaged. This is caused by ethics and bias risk (the BOK's risk category for discriminatory AI outcomes). The secondary harm is organizational — the company faces legal liability under nondiscrimination law and reputational exposure. A is wrong — individual harm refers to specific individuals, not the company's liability. C is not wrong as a broader observation, but the BOK's harm taxonomy distinguishes group harm (specific community disadvantaged) from societal harm (democratic processes, public safety, power concentration); a single company's recruitment tool, while serious, is best classified at the group level. D misapplies a characteristic as a harm category.",
    bokRef: "BOK I.A — Types of risks and harms posed by AI (ethics and bias risk; group harm)"
  },
  {
    id: "DI-IA-006",
    comp: "I.A",
    stem: "A logistics company deploys an agentic AI system to manage supply chain scheduling. The system monitors freight conditions, renegotiates delivery contracts with partners, and reallocates inventory across warehouses — all without human authorization for individual decisions. Which governance requirement is most directly triggered by the autonomy characteristic of this system?",
    options: [
      { letter: "A", text: "Data lineage documentation — the system's training data must be tracked to ensure inventory decisions are grounded in accurate information." },
      { letter: "B", text: "Explainability requirements — the company must be able to explain each contract renegotiation to partners and regulators." },
      { letter: "C", text: "Human oversight controls — the system's autonomous consequential actions must be bounded by human escalation thresholds and override capability." },
      { letter: "D", text: "Bias testing — the system's scheduling decisions must be tested for discriminatory treatment of freight partners." }
    ],
    correct: "C",
    explanation: "The correct answer is C. Autonomy is the AI characteristic describing systems that act without direct human authorization for each decision. The BOK's governance response to autonomy is human oversight controls — specifically, mechanisms that bound what an autonomous system can do independently (escalation thresholds) and allow humans to intervene or override. This is expressed in the responsible AI principle of human-centricity and is a core requirement in agentic AI governance. A relates to data dependency, not autonomy. B relates to opacity and explainability. D relates to fairness and bias — a distinct concern from autonomous operation.",
    bokRef: "BOK I.A — Unique characteristics of AI (autonomy); Common principles (human-centricity, accountability)"
  },
  {
    id: "DI-IA-007",
    comp: "I.A",
    stem: "An insurer deploys a fraud detection AI model that was validated and deployed 18 months ago. The model's false-positive rate has gradually increased from 2% to 11% over this period, causing legitimate claims to be denied incorrectly. An investigation finds no change in the model — but the underlying insurance claim patterns have shifted significantly due to economic conditions. Which characteristic primarily explains why initial validation was insufficient to ensure ongoing reliability?",
    options: [
      { letter: "A", text: "Complexity — the model is too complex to remain reliable under changing conditions." },
      { letter: "B", text: "Probabilistic outputs — the model's outputs naturally vary over time without any external cause." },
      { letter: "C", text: "Data dependency — the model's performance is bounded by the data it was trained on; as real-world patterns drift from training patterns, performance degrades." },
      { letter: "D", text: "Opacity — the model cannot explain why it is producing more false positives, making the problem undetectable." }
    ],
    correct: "C",
    explanation: "The correct answer is C. This scenario describes model drift — when the real-world data distribution shifts away from the training distribution, model performance degrades. This is a direct consequence of data dependency: AI performance is fundamentally bounded by the conditions that produced the training data. When those conditions change, a model trained on historical patterns will misclassify new patterns. The governance implication is that one-time validation is insufficient; continuous monitoring and periodic retraining are required. A is a contributing factor (complex models may be less interpretable when debugging drift) but not the primary cause. B is partly relevant — probabilistic outputs do vary — but the specific cause here is environmental shift, not random variation. D is wrong — opacity makes debugging harder but is not the primary cause of the performance degradation.",
    bokRef: "BOK I.A — Unique characteristics of AI (data dependency)"
  },
  {
    id: "DI-IA-008",
    comp: "I.A",
    stem: "A governance officer is preparing an AI governance framework for a government agency. The agency's legal counsel argues that since the agency has zero tolerance for bias, the fairness principle requires the AI system to produce statistically identical outcomes across all demographic groups. The governance officer must advise whether this interpretation is accurate. What is the most precise response grounded in the responsible AI principle of fairness?",
    options: [
      { letter: "A", text: "The legal counsel is correct — fairness requires statistical parity across demographic groups as an absolute standard." },
      { letter: "B", text: "Fairness requires the absence of unlawful discrimination and unjustified differential treatment; statistical parity is one possible fairness metric but not the only or universal standard." },
      { letter: "C", text: "Fairness is aspirational and does not impose any specific measurable requirement on AI outcomes." },
      { letter: "D", text: "Fairness only applies to AI systems that use protected characteristics as direct inputs; if those inputs are excluded, the fairness obligation is satisfied." }
    ],
    correct: "B",

// ─── State ───────────────────────────────────────────────────────────────────
let current = 0;
let answers = new Array(QUESTIONS.length).fill(null);
let sessionId = '';

function generateSessionId() {
  return 'S' + Date.now();
}

function init() {
  sessionId = generateSessionId();
  document.getElementById('session-badge').textContent = sessionId;
  renderQuestion();
}

// ─── Render question ─────────────────────────────────────────────────────────
function renderQuestion() {
  const q = QUESTIONS[current];
  const total = QUESTIONS.length;

  // Progress
  const pct = Math.round((current / total) * 100);
  document.getElementById('progress-label').textContent = `Question ${current + 1} of ${total}`;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  // Question meta
  document.getElementById('q-num-chip').textContent = `Q${current + 1} of ${total}`;
  document.getElementById('q-stem').textContent = q.stem;

  // Options
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  q.options.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'option';
    div.dataset.letter = opt.letter;
    div.innerHTML = `<span class="opt-letter">${opt.letter}</span><span class="opt-text">${opt.text}</span>`;
    div.onclick = () => selectOption(opt.letter);
    if (answers[current] === opt.letter) {
      div.classList.add('selected');
    }
    container.appendChild(div);
  });

  // Next/Submit button
  const nextBtn = document.getElementById('next-btn');
  if (current === total - 1) {
    nextBtn.textContent = 'Submit & review results';
    nextBtn.className = 'btn btn-submit';
  } else {
    nextBtn.textContent = 'Next →';
    nextBtn.className = 'btn btn-primary';
  }
  nextBtn.disabled = answers[current] === null;
}

function selectOption(letter) {
  if (answers[current] !== null) return; // already answered — allow re-selection pre-submit
  answers[current] = letter;

  // Update UI
  const options = document.querySelectorAll('.option');
  options.forEach(opt => {
    opt.classList.remove('selected');
    if (opt.dataset.letter === letter) opt.classList.add('selected');
  });

  document.getElementById('next-btn').disabled = false;
}

// ─── Advance ─────────────────────────────────────────────────────────────────
function advance() {
  if (current < QUESTIONS.length - 1) {
    current++;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showResults();
  }
}

// ─── Results ─────────────────────────────────────────────────────────────────
function showResults() {
  document.getElementById('quiz-view').style.display = 'none';
  document.getElementById('results-view').style.display = 'block';

  let correct = 0, wrong = 0, skipped = 0;
  QUESTIONS.forEach((q, i) => {
    const ans = answers[i];
    if (ans === null) skipped++;
    else if (ans === q.correct) correct++;
    else wrong++;
  });

  const score = Math.round((correct / QUESTIONS.length) * 100);
  document.getElementById('score-pct').textContent = score + '%';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-skipped').textContent = skipped;

  // Render review
  const container = document.getElementById('review-container');
  container.innerHTML = '';

  QUESTIONS.forEach((q, i) => {
    const userAns = answers[i];
    const isCorrect = userAns === q.correct;
    const isSkipped = userAns === null;

    const chipClass = isSkipped ? 'skipped' : (isCorrect ? 'correct' : 'incorrect');
    const chipText = isSkipped ? 'SKIPPED' : (isCorrect ? 'CORRECT' : 'INCORRECT');

    // Check localStorage for tricky flag
    let trickyHtml = '';
    try {
      const history = JSON.parse(localStorage.getItem('aigp_quiz_history') || '[]');
      let missCount = 0;
      history.forEach(session => {
        if (session.questions) {
          session.questions.forEach(sq => {
            if (sq.id === q.id && !sq.correct && !sq.skipped) missCount++;
          });
        }
      });
      if (!isCorrect && !isSkipped) missCount++; // count current
      if (missCount >= 2) {
        trickyHtml = `<span class="tricky-flag">⚑ Tricky — missed ${missCount}×</span>`;
      }
    } catch(e) {}

    let answerRows = '';
    if (!isSkipped) {
      const yourClass = isCorrect ? 'yours-correct' : 'yours-wrong';
      answerRows += `<span class="answer-tag ${yourClass}">Your answer: ${userAns}</span>`;
    }
    if (!isCorrect) {
      answerRows += `<span class="answer-tag correct-ans">Correct: ${q.correct}</span>`;
    }

    const item = document.createElement('div');
    item.className = 'review-item';
    item.innerHTML = `
      <div class="review-header" onclick="toggleReview(this)">
        <span class="q-short">Q${i+1} · ${q.stem.substring(0, 90)}…</span>
        <span class="result-chip ${chipClass}">${chipText}</span>
        <span class="chevron-icon">▾</span>
      </div>
      <div class="review-body">
        <div class="answer-row">${answerRows}${trickyHtml}</div>
        <p class="explanation-text">${q.explanation}</p>
        <span class="bok-ref">${q.bokRef}</span>
      </div>
    `;
    container.appendChild(item);
  });

  // Save to localStorage
  saveSession(correct, wrong, skipped, score);
}

function toggleReview(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.chevron-icon');
  body.classList.toggle('open');
  chevron.classList.toggle('open');
}

// ─── Save ────────────────────────────────────────────────────────────────────
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbyCG5oTGoPsjE9ytN3NJbsAv45GO0_uxb5gjXL7K8trVSiOfG05tQ0LV3wnjtuj7Bir/exec';

function saveSession(correct, wrong, skipped, score) {
  const now = new Date().toISOString();
  const sessionData = {
    sessionId: sessionId,
    title: "AIGP Quiz — Day 1 · Competency I.A",
    week: 1,
    day: 1,
    filename: "AIGP_270526_Day1_AI-Foundations_Quiz.html",
    ts: now,
    score: score,
    correct: correct,
    incorrect: wrong,
    skipped: skipped,
    total: QUESTIONS.length,
    questions: QUESTIONS.map((q, i) => ({
      id: q.id,
      day: 1,
      week: 1,
      domain: "Domain I",
      comp: "I.A",
      isRetrieval: false,
      correct: answers[i] === q.correct,
      skipped: answers[i] === null,
      userAns: answers[i] || null,
      correctAns: q.correct,
      qText: q.stem.substring(0, 80)
    }))
  };

  // ── 1. localStorage (primary, always attempted) ──────────────────────────
  let attemptNum = 1;
  try {
    const existing = JSON.parse(localStorage.getItem('aigp_quiz_history') || '[]');
    existing.push(sessionData);
    localStorage.setItem('aigp_quiz_history', JSON.stringify(existing));
    attemptNum = existing.length;
  } catch(e) {
    console.warn('localStorage save failed:', e);
  }

  // ── 2. Webhook POST to Google Sheets (async, non-blocking) ───────────────
  // Build one row per question in the schema:
  // sessionId, date, day, week, comp, score, correct, incorrect, skipped,
  // questionId, userAns, correctAns, isRetrieval, isCorrect
  const rows = sessionData.questions.map(q => ({
    sessionId:   sessionId,
    date:        now,
    day:         1,
    week:        1,
    comp:        q.comp,
    score:       score,
    correct:     correct,
    incorrect:   wrong,
    skipped:     skipped,
    questionId:  q.id,
    userAns:     q.userAns || '',
    correctAns:  q.correctAns,
    isRetrieval: q.isRetrieval,
    isCorrect:   q.correct
  }));

  const confirmEl = document.getElementById('save-confirm');
  confirmEl.innerHTML = `<strong>Results saved locally.</strong><br>Attempt #${attemptNum} · Session ${sessionId}<br>Syncing to Google Sheets…`;

  fetch(WEBHOOK_URL, {
    method: 'POST',
    mode: 'no-cors', // Apps Script web app requires no-cors
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(rows)
  })
  .then(() => {
    confirmEl.innerHTML = `
      <strong>Results saved &amp; synced.</strong><br>
      Attempt #${attemptNum} · Session ${sessionId}<br>
      Saved: ${new Date().toLocaleString('en-SG')}<br>
      <span style="color:#2e7d32;">✓ Google Sheets updated</span>
    `;
  })
  .catch(err => {
    console.warn('Webhook POST failed (results still in localStorage):', err);
    confirmEl.innerHTML = `
      <strong>Results saved locally.</strong><br>
      Attempt #${attemptNum} · Session ${sessionId}<br>
      Saved: ${new Date().toLocaleString('en-SG')}<br>
      <span style="color:#b71c1c;">⚠ Sheet sync failed — will retry on next attempt</span>
    `;
  });
}

function exportHistory() {
  try {
    const history = localStorage.getItem('aigp_quiz_history') || '[]';
    const blob = new Blob([history], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'aigp_quiz_history.json';
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('Export failed: ' + e.message);
  }
}

// ─── Boot ────────────────────────────────────────────────────────────────────
init();
</script>
