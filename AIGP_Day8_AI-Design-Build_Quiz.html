<title>AIGP Quiz — Day 8 · AI Design &amp; Build</title>

<body>
<div id="quiz-root"></div>
<script src="quiz-engine.js?v=1.4"></script>
<script>
initQuiz({
  day:8,week:2,comp:"III.A",topic:"AI Design & Build",
  filename:"AIGP_Day8_AI-Design-Build_Quiz.html",
  webhookUrl:"https://script.google.com/macros/s/AKfycbyCG5oTGoPsjE9ytN3NJbsAv45GO0_uxb5gjXL7K8trVSiOfG05tQ0LV3wnjtuj7Bir/exec",
  questions:[
{id:"DIII-IIIA-001",comp:"III.A",isRetrieval:false,
stem:"Before any technical design begins on a bank's AI loan-approval system, the governance lead asks the product owner to document the problem the system will solve, the intended users, and expected outcomes. This activity primarily satisfies which III.A obligation?",
options:{A:"Performing a data quality check to confirm training data is fit-for-purpose",B:"Defining the business context and use case of the AI system",C:"Conducting an impact assessment to evaluate harms to affected individuals",D:"Establishing the post-deployment monitoring schedule for the system"},
correct:"B",
explanation:"B is correct: documenting the problem, users, and outcomes is III.A.1 — use-case definition. A is III.B data governance. C is III.A.2. D is III.C.",
bokRef:"III.A.1 — Define the business context and use case of the AI system."},
{id:"DIII-IIIA-002",comp:"III.A",isRetrieval:false,
stem:"A healthcare project sponsor specifies the clinical population to be served, the diagnostic task the model will perform, and the regulatory environment. The governance officer confirms these details before requirements gathering begins. This step most directly fulfills which III.A obligation?",
options:{A:"Defining the business context and use case of the AI system",B:"Applying best practices to architecture and model selection",C:"Documenting the designing process to establish a compliance record",D:"Performing an impact assessment to evaluate risks to patients"},
correct:"A",
explanation:"A is correct: specifying population, task, and regulatory context is use-case definition under III.A.1. B is a sub-element of III.A.3. C is III.A.5. D is III.A.2.",
bokRef:"III.A.1 — Define the business context and use case of the AI system."},
{id:"DIII-IIIA-003",comp:"III.A",isRetrieval:false,
stem:"At an AI initiative kickoff, the governance lead documents the specific operational problem, the sponsoring business unit, applicable regulatory constraints, and success metrics aligned to organisational objectives. This package is best described as which foundational III.A deliverable?",
options:{A:"A risk mitigation hierarchy ranking controls by effectiveness for the design phase",B:"An impact assessment covering privacy and fairness harms to affected individuals",C:"A training and testing plan that validates model performance against defined metrics",D:"The business context and use case definition required before design work begins"},
correct:"D",
explanation:"D is correct: the problem, sponsor, constraints, and success metrics constitute the business context and use case under III.A.1. A is a III.A.4 tool. B is III.A.2. C is III.B.3.",
bokRef:"III.A.1 — Define the business context and use case of the AI system."},
{id:"DIII-IIIA-004",comp:"III.A",isRetrieval:false,
stem:"A financial services firm is building a credit-scoring model that will make automated lending decisions for retail customers. The governance team debates whether a formal impact assessment is required at this stage. Which response most accurately reflects the III.A obligation?",
options:{A:"Impact assessments are only required when the system processes biometric data",B:"Impact assessments are discretionary if legal counsel sees no obvious violation",C:"An impact assessment should be performed because the system makes automated decisions affecting individuals",D:"An impact assessment is only needed at deployment, not during design and build"},
correct:"C",
explanation:"C is correct: III.A.2 requires an impact assessment during design, especially for automated decisions affecting individuals. A incorrectly limits the trigger to biometrics. B incorrectly makes it discretionary. D incorrectly defers it to deployment.",
bokRef:"III.A.2 — Perform or review an impact assessment on the AI system."},
{id:"DIII-IIIA-005",comp:"III.A",isRetrieval:false,
stem:"A third-party consultant delivers a completed impact assessment. Rather than signing off without scrutiny, the AI governance lead re-examines the risk categories identified, mitigations proposed, and residual risks left unaddressed. This action most directly fulfills which III.A obligation?",
options:{A:"Defining the business context to confirm scope before committing to a technical approach",B:"Reviewing an impact assessment on the AI system",C:"Documenting the designing process to establish a compliance record for auditors",D:"Prioritising risks using a probability/severity harms matrix during design"},
correct:"B",
explanation:"B is correct: III.A.2 requires performing or reviewing the assessment — passive receipt is insufficient. Active scrutiny of findings, mitigations, and residual risks satisfies the review obligation. A is III.A.1. C is III.A.5. D is a III.A.4 tool.",
bokRef:"III.A.2 — Perform or review an impact assessment on the AI system."},
{id:"DIII-IIIA-006",comp:"III.A",isRetrieval:false,
stem:"A governance officer documents potential harms to applicants from a new AI hiring tool, the likelihood of discriminatory outcomes, and the effectiveness of proposed safeguards — all before the system architecture is finalised. Which III.A obligation does this most directly satisfy?",
options:{A:"Performing an impact assessment on the AI system before architectural decisions are made",B:"Applying ethical considerations to architecture and model selection during design",C:"Establishing performance metrics and thresholds that trigger human escalation at runtime",D:"Documenting the design process to create a compliance record and manage risks"},
correct:"A",
explanation:"A is correct: evaluating harms, likelihood, and safeguard effectiveness before architecture is fixed is the impact assessment obligation under III.A.2. B is the architecture sub-element of III.A.3. C is metric/threshold evaluation in III.A.3. D is III.A.5.",
bokRef:"III.A.2 — Perform or review an impact assessment on the AI system."},
{id:"DIII-IIIA-007",comp:"III.A",isRetrieval:false,
stem:"After a completed impact assessment identifies a high-severity racial bias risk in a facial recognition system, the governance team must decide how to proceed with design. Which action is most consistent with the III.A.2 obligation?",
options:{A:"Proceed with current design and address the bias risk through post-deployment monitoring",B:"Escalate the finding to the data science team and remove it from the governance log",C:"Use the impact assessment findings to inform design decisions and apply mitigations before proceeding",D:"Defer the impact assessment review until model training is complete and data is available"},
correct:"C",
explanation:"C is correct: III.A.2 requires findings to feed back into design decisions — the assessment's purpose is to shape the build. A defers mitigation. B discards the finding. D defers the assessment past its required timing.",
bokRef:"III.A.2 — Perform or review an impact assessment on the AI system."},
{id:"DIII-IIIA-008",comp:"III.A",isRetrieval:false,
stem:"A governance lead flags that a proposed LLM for handling financial redress complaints may be too opaque to satisfy the organisation's human oversight policy. This concern most directly relates to which design-phase obligation under III.A?",
options:{A:"Documenting the designing process to produce compliance records for regulatory inspection",B:"Performing an impact assessment to identify fairness risks in the complaint-handling context",C:"Defining the business context and intended use case before committing to any approach",D:"Applying best practices and ethical considerations to architecture and model selection"},
correct:"D",
explanation:"D is correct: concerns about model opacity conflicting with oversight policy are governance judgments about architecture and model selection — a named sub-element of III.A.3. A is III.A.5. B is III.A.2. C is III.A.1.",
bokRef:"III.A.3 — Apply the policies, procedures, best practices and ethical considerations to designing and building the AI system (e.g., architecture and model selection, human oversight)."},
{id:"DIII-IIIA-009",comp:"III.A",isRetrieval:false,
stem:"Governance policy requires that no automated customer penalty decision executes without a qualified human reviewer confirming the output. The product team proposes a fully automated penalty flow for a fraud-detection system. The governance lead must reject this on the basis of which III.A obligation?",
options:{A:"Identifying external risks via stakeholder mapping and use-case evaluation exercises",B:"Applying the human oversight requirement to the design of the AI system",C:"Documenting the build process to manage operational risk and maintain a compliance record",D:"Establishing business context and use case before any model architecture is selected"},
correct:"B",
explanation:"B is correct: requiring human review before automated penalties enforces the human oversight obligation — an explicit sub-element of III.A.3. A is III.A.4 risk tools. C is III.A.5. D is III.A.1.",
bokRef:"III.A.3 — Apply the policies, procedures, best practices and ethical considerations to designing and building the AI system (e.g., human oversight)."},
{id:"DIII-IIIA-010",comp:"III.A",isRetrieval:false,
stem:"During design of an AI medical triage system, the governance team sets the minimum precision threshold below which the system may not operate autonomously, and defines which metrics will trigger human escalation. This activity most directly satisfies which III.A obligation?",
options:{A:"Applying best practices to designing the AI system, specifically metric and threshold evaluation",B:"Documenting the design to establish a compliance audit trail for regulators and auditors",C:"Performing or reviewing an impact assessment before system architecture is finalised",D:"Identifying and managing risks using a pre-deployment pilot and benchmarking approach"},
correct:"A",
explanation:"A is correct: defining precision thresholds and escalation metrics is metric and threshold evaluation — listed explicitly in the III.A.3 parenthetical. B is III.A.5. C is III.A.2. D is III.A.4.",
bokRef:"III.A.3 — Apply the policies, procedures, best practices and ethical considerations to designing and building the AI system (e.g., metric and threshold evaluation)."},
{id:"DIII-IIIA-011",comp:"III.A",isRetrieval:false,
stem:"Before development begins on an AI recruitment screening tool, the governance team invites HR managers, legal counsel, diversity officers, and civil society representatives to review the proposed design and provide feedback. This process most directly satisfies which III.A obligation?",
options:{A:"Performing an impact assessment to identify discrimination risks in the automated hiring context",B:"Applying ethical best practices to data analysis and model training during development",C:"Applying best practices to designing the AI system, specifically stakeholder engagement and feedback",D:"Documenting the design and build process to establish a governance record for compliance"},
correct:"C",
explanation:"C is correct: soliciting design input from diverse stakeholders is stakeholder engagement and feedback — listed explicitly in the III.A.3 parenthetical. A is III.A.2. B is III.B. D is III.A.5.",
bokRef:"III.A.3 — Apply the policies, procedures, best practices and ethical considerations to designing and building the AI system (e.g., stakeholder engagement and feedback)."},
{id:"DIII-IIIA-012",comp:"III.A",isRetrieval:false,
stem:"A governance lead asks: 'Was the intended purpose of this AI system documented at the outset, and are design choices explicitly justified against that stated purpose and the organisation's ethical principles?' These questions are most aligned with which III.A obligation?",
options:{A:"Identifying risks using a probability/severity harms matrix and risk mitigation hierarchy",B:"Reviewing impact assessments conducted by third parties and confirming mitigations are adequate",C:"Establishing operational controls including access policies and fallback procedures for the system",D:"Applying ethical considerations to designing the AI system, including documenting the purpose of AI"},
correct:"D",
explanation:"D is correct: requiring the purpose to be documented and design choices justified against ethical principles is the purpose-of-AI obligation — listed in the III.A.3 parenthetical. A is III.A.4. B is III.A.2. C is the operational controls sub-element of III.A.3 (narrower).",
bokRef:"III.A.3 — Apply the policies, procedures, best practices and ethical considerations to designing and building the AI system (e.g., purpose of AI, ethical considerations)."},
{id:"DIII-IIIA-013",comp:"III.A",isRetrieval:false,
stem:"During design of an AI insurance claims chatbot, the governance team defines access control policies, rate-limiting rules, fallback procedures for model failures, and user consent mechanisms. These artefacts best fulfill which III.A obligation?",
options:{A:"Applying best practices to designing the AI system, specifically establishing operational controls",B:"Documenting the design and build process to create a compliance record and manage ongoing risks",C:"Identifying and managing internal risks using a pre-deployment pilot and benchmarking evaluation",D:"Defining the business context and use case to scope requirements before technical design begins"},
correct:"A",
explanation:"A is correct: access controls, rate limits, fallback procedures, and consent mechanisms are operational controls — listed in the III.A.3 parenthetical. B is III.A.5. C is III.A.4 tools. D is III.A.1.",
bokRef:"III.A.3 — Apply the policies, procedures, best practices and ethical considerations to designing and building the AI system (e.g., operational controls)."},
{id:"DIII-IIIA-014",comp:"III.A",isRetrieval:false,
stem:"A governance team assessing a new AI content moderation system plots each identified risk on a two-axis grid mapping likelihood of harm against potential severity for affected users. The resulting prioritised register drives mitigation resource allocation. This is which III.A risk management technique?",
options:{A:"A risk mitigation hierarchy that ranks control measures by effectiveness and cost",B:"A probability/severity harms matrix for identifying and prioritising design-phase risks",C:"A stakeholder mapping exercise identifying parties affected by the system and their exposure",D:"A pre-deployment pilot benchmarking the system against real-world operational conditions"},
correct:"B",
explanation:"B is correct: a two-axis likelihood-vs-severity grid is the probability/severity harms matrix named in III.A.4. A is the risk mitigation hierarchy (different tool). C is stakeholder mapping. D is a pre-deployment pilot.",
bokRef:"III.A.4 — Identify and manage the internal and external risks and contributing factors related to designing and building the AI model and system (e.g., using probability/severity harms matrix)."},
{id:"DIII-IIIA-015",comp:"III.A",isRetrieval:false,
stem:"After identifying a fairness risk in an AI hiring system, the governance team evaluates responses in sequence: first eliminate the risk by redesign; if not possible, reduce it via engineering controls; only then manage residual risk with process safeguards. This structured approach reflects which III.A tool?",
options:{A:"A probability/severity harms matrix prioritising risks by likelihood and potential impact",B:"A pre-deployment pilot benchmarking the system before it is released to production",C:"A risk mitigation hierarchy applied to manage risks in the AI design and build phase",D:"A use-case evaluation testing whether the system's purpose remains aligned to objectives"},
correct:"C",
explanation:"C is correct: the eliminate-reduce-safeguard decision sequence is the risk mitigation hierarchy named in III.A.4. A is the probability/severity matrix. B is a pre-deployment pilot. D is use-case evaluation.",
bokRef:"III.A.4 — Identify and manage the internal and external risks and contributing factors related to designing and building the AI model and system (e.g., using a risk mitigation hierarchy)."},
{id:"DIII-IIIA-016",comp:"III.A",isRetrieval:false,
stem:"Before finalising the design of an AI benefits eligibility system, the governance team identifies all affected parties — applicants, case workers, oversight bodies, data providers, and advocacy groups — recording each party's interests, influence, and potential exposure to harm. This exercise most directly fulfills which III.A obligation?",
options:{A:"Performing an impact assessment that analyses harms and proposes mitigation measures for each risk",B:"Applying stakeholder engagement and feedback procedures to gather design input before build",C:"Conducting a use-case evaluation to confirm the system aligns with current organisational objectives",D:"Stakeholder mapping as part of identifying and managing risks related to designing and building the system"},
correct:"D",
explanation:"D is correct: identifying affected parties and recording their interests and exposure is stakeholder mapping — a named tool in III.A.4. A is III.A.2. B is stakeholder engagement (III.A.3 sub-element for design feedback). C is use-case evaluation, also in III.A.4 but distinct.",
bokRef:"III.A.4 — Identify and manage the internal and external risks and contributing factors related to designing and building the AI model and system (e.g., stakeholder mapping)."},
{id:"DIII-IIIA-017",comp:"III.A",isRetrieval:false,
stem:"Before full production rollout of an AI fraud-detection model, the governance team releases it to a controlled subset of real transactions for 30 days, monitors performance against operational benchmarks, and records unexpected failure modes. This governance activity primarily satisfies which III.A obligation?",
options:{A:"Identifying and managing risks through pre-deployment pilots and testing before production release",B:"Documenting the build process to produce compliance records for regulatory inspection",C:"Applying best practices to architecture and model selection during the design phase",D:"Conducting an impact assessment to evaluate risks to affected individuals and the organisation"},
correct:"A",
explanation:"A is correct: a controlled limited release monitoring performance before full rollout is a pre-deployment pilot — named in III.A.4. B is III.A.5. C is III.A.3. D is III.A.2.",
bokRef:"III.A.4 — Identify and manage the internal and external risks and contributing factors related to designing and building the AI model and system (e.g., benchmarking, and pre-deployment pilots and testing)."},
{id:"DIII-IIIA-018",comp:"III.A",isRetrieval:false,
stem:"As an AI system moves through design and build, the governance team maintains a log capturing key decisions and justifications, architectural changes and rationale, risk findings and responses, and approvals at each stage. This practice is best aligned with which III.A obligation?",
options:{A:"Applying best practices to operational controls and human oversight mechanisms during build",B:"Documenting the designing and building process to establish compliance and manage risks",C:"Performing an impact assessment to identify and address harms before the system is deployed",D:"Defining the business context and use case before committing to any technical approach"},
correct:"B",
explanation:"B is correct: a contemporaneous design log covering decisions, changes, risk findings, and approvals is the documentation obligation under III.A.5. A is the operational controls sub-element of III.A.3. C is III.A.2. D is III.A.1.",
bokRef:"III.A.5 — Document the designing and building process (e.g., to establish compliance and manage risks)."},
{id:"DIII-IIIA-019",comp:"III.A",isRetrieval:false,
stem:"A regulator requests evidence that proper governance occurred during an AI system's design phase. The governance team produces records of impact assessments, design decisions, risk mitigations, and stakeholder consultations in a structured audit trail. Under which III.A obligation were these records created?",
options:{A:"Performing an impact assessment to identify and evaluate risks before the system was designed",B:"Applying ethical considerations and best practices to design and build activities",C:"Documenting the designing and building process to establish compliance and manage risks",D:"Identifying and managing risks using pre-deployment pilots and use-case evaluations"},
correct:"C",
explanation:"C is correct: producing a structured audit trail of assessments, decisions, mitigations, and consultations for regulators is the documentation obligation under III.A.5. A describes the content of III.A.2, not the documentation act. B is III.A.3. D is III.A.4 tools.",
bokRef:"III.A.5 — Document the designing and building process (e.g., to establish compliance and manage risks)."},
{id:"DIII-IIIA-020",comp:"III.A",isRetrieval:false,
stem:"A governance team records every risk identified during design: probability assigned, severity rating, mitigation selected, and residual risk accepted by the accountable owner. This documentation demonstrates due diligence and creates a baseline for ongoing risk management. Under III.A, this satisfies which obligation?",
options:{A:"Performing an impact assessment on the AI system to evaluate risks to affected individuals",B:"Identifying risks using a probability/severity harms matrix as a design-phase tool",C:"Applying best practices to the design process, including operational controls and oversight mechanisms",D:"Documenting the designing and building process to establish compliance and manage risks over time"},
correct:"D",
explanation:"D is correct: recording probability, severity, mitigations, and accepted residual risks as a design-phase log is III.A.5 documentation. A describes the assessment act (III.A.2), not the documentation. B describes the prioritisation tool (III.A.4). C is III.A.3.",
bokRef:"III.A.5 — Document the designing and building process (e.g., to establish compliance and manage risks)."},
{id:"DII-IIC-021",comp:"II.C",isRetrieval:true,
stem:"Under the EU AI Act, a biometric categorisation system that infers sensitive attributes such as race and religious beliefs from publicly available images is being evaluated for deployment. Which classification most accurately applies?",
options:{A:"The system is prohibited because biometric categorisation inferring protected characteristics violates fundamental rights under the prohibited-use category",B:"The system is high-risk because it involves biometric data, requiring conformity assessment and EU database registration",C:"The system is limited-risk subject only to transparency obligations such as disclosing AI involvement to users",D:"The system is minimal-risk and may be deployed under voluntary codes of conduct without specific obligations"},
correct:"A",
explanation:"A is correct: the EU AI Act prohibits AI that categorises individuals by biometrics to infer protected characteristics such as race or religion. B is wrong — this use is prohibited, not just high-risk. C and D understate the classification.",
bokRef:"II.C.1 — Understand the risk classification framework for AI (e.g., prohibited/high/limited/minimal risk) and what systems/uses fall into each category."},
{id:"DII-IIC-022",comp:"II.C",isRetrieval:true,
stem:"A government agency plans to deploy an AI system for automated assessment of social benefit eligibility, directly affecting individuals' access to social security payments. Which EU AI Act classification applies and what is the primary governance implication?",
options:{A:"The system is prohibited, requiring immediate cessation of development and destruction of related data",B:"The system is limited-risk, requiring only that users be informed they are interacting with an AI system",C:"The system is high-risk, requiring risk management, technical documentation, and human oversight before deployment",D:"The system is minimal-risk because public authorities are exempt from standard AI Act obligations"},
correct:"C",
explanation:"C is correct: AI used for access to essential social benefits is classified high-risk under the EU AI Act, requiring risk management, technical documentation, conformity assessment, and human oversight. A is wrong — the system is not prohibited. B understates obligations. D is wrong — public authorities are not exempt.",
bokRef:"II.C.1 — Understand the risk classification framework for AI (e.g., prohibited/high/limited/minimal risk) and what systems/uses fall into each category."},
{id:"DII-IIC-023",comp:"II.C",isRetrieval:true,
stem:"A retailer's AI chatbot recommends products based on browsing history and includes a feature detecting user emotional state from text to personalise tone. Which EU AI Act classification most accurately applies to this overall system?",
options:{A:"The system is high-risk because it processes personal data to make recommendations influencing consumer decisions",B:"The system is limited-risk, subject to transparency obligations as a conversational AI potentially using emotion recognition",C:"The system is prohibited because the EU AI Act categorically bans all commercial applications of emotion recognition",D:"The system is minimal-risk because it operates commercially and does not affect decisions concerning fundamental rights"},
correct:"B",
explanation:"B is correct: conversational AI chatbots are limited-risk under the EU AI Act and must comply with transparency obligations. Emotion recognition in limited commercial contexts adds transparency requirements, not prohibition. A is wrong — product recommendations do not create high-risk status. C is wrong — the Act does not categorically ban commercial emotion recognition. D understates the transparency obligations.",
bokRef:"II.C.1 — Understand the risk classification framework for AI (e.g., prohibited/high/limited/minimal risk) and what systems/uses fall into each category."},
{id:"DII-IIB-024",comp:"II.B",isRetrieval:true,
stem:"An employer's AI hiring tool consistently scores female candidates lower than equivalent male candidates. An audit confirms the disparity. Under nondiscrimination law principles applicable to AI, what is the employer's primary legal exposure?",
options:{A:"Liability requires proof that the AI vendor intentionally programmed the discriminatory outcome into the system",B:"Liability flows exclusively to the AI vendor under product liability law because employment law does not cover algorithmic tools",C:"The employer must provide explanations for individual decisions but faces no broader liability if the AI was third-party supplied",D:"The employer may face disparate-impact discrimination liability because employment nondiscrimination law applies regardless of whether bias comes from human or algorithmic decision-making"},
correct:"D",
explanation:"D is correct: disparate-impact theory means the employer is liable for discriminatory outcomes against a protected class regardless of intent or whether the AI was developed externally. A is wrong — intent is not required for disparate impact. B is wrong — the deploying employer retains compliance responsibility. C understates the employer's exposure.",
bokRef:"II.B.2 — Understand how nondiscrimination laws apply to AI (e.g., in the employment, credit, lending, housing and insurance contexts)."},
{id:"DII-IIB-025",comp:"II.B",isRetrieval:true,
stem:"A mortgage lender's AI model approves applications at a significantly lower rate for majority-minority zip codes, even after controlling for creditworthiness indicators. Under applicable nondiscrimination law, what is the key governance concern?",
options:{A:"The model is only problematic if race is used explicitly as an input; proxy variables do not trigger nondiscrimination obligations",B:"The lender's liability is limited by its AI vendor agreement because the model was not developed in-house",C:"The model may produce unlawful disparate impact under fair lending laws even without using race directly, and the lender is responsible for auditing and remediating it",D:"The lender is only required to notify regulators of the disparity and need not remediate unless a formal complaint is filed"},
correct:"C",
explanation:"C is correct: fair lending laws apply a disparate-impact standard — using zip code as a proxy for race can create unlawful outcomes even without explicit use of race. The deploying lender bears the compliance obligation. A is wrong — proxy variables can trigger liability. B is wrong — the deploying lender retains responsibility. D understates the remediation obligation.",
bokRef:"II.B.2 — Understand how nondiscrimination laws apply to AI (e.g., in the employment, credit, lending, housing and insurance contexts)."}
  ]
});
</script>
</body></html>
