      id: "DII-IIA-008", comp: "II.A", isRetrieval: false,

      explanation: "B is correct. Art. 22(3) and Recitals 63 and 71 require meaningful information about the logic, significance, and envisaged consequences — framed accessibly for the data subject. Raw feature weights are not meaningful to a non-technical person and do not explain consequences. C overclaims the right — there is no right to a full training data audit. D is wrong — the right to explanation under Art. 22 applies to pre-contract decisions with significant effects. BOK PI: II.A.5.",
